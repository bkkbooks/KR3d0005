body:
  text: 農書卷二元王禎撰農桑通訣二墾耕篇第四易大傳曰神農氏作斫木為耜揉木為耒耒耨之利以教天下周書云神農之時天雨粟神農耕而種之始作陶冶斤斧為耒耜以墾草莽然後五穀興此農事之始也當堯之時洪水泛濫草木暢茂五穀不登禹乃隨山刋木益烈山澤而焚之然後九州之土皆可種藝耕作於是后稷教民稼穡樹藝五穀農功之興其有次第如此墾耕者其農功之第一義歟墾除荒也耕犂也古文耕作耕蓋古井田之制今從耒井聲故作耕前漢趙過為搜粟都尉田多墾闢即今俗謂開荒也凡墾闢荒地春曰燎荒如平原草萊深者至春燒荒趂地氣通潤草芽欲發根荄柔脆易為開墾夏曰䅖青夏月草茂時開謂之䅖青可當草糞但根鬚壯密須藉强牛乃可蓋莫若春為上秋曰芟夷其次秋暮草木叢密時先用鏺刀遍地芟倒暴乾放火至春而開根朽省功崔實四民月令曰正月土氣上騰土長冒橛說者云陳根可拔急菑强土黑壚之田二月隂凍畢釋可菑美田緩土及河渚小處三月杏花盛可菑沙白輕土之田五月六月可菑麥田也如泊下蘆葦地內必用􅟮力意切刀引之犁鑱隨耕起墢音伐特易牛乃省力沿山或老荒地內樹木多者必須用钁劚去餘有不盡耕科俗謂之埋頭根也當使熟䥫煆成鑱尖套於退舊生鐡鑱上縱遇根株不至擘缺妨誤工力或地假廣濶不可遍劚則就斫枝莖覆於本根上候乾焚之其根即死而易朽又有經暑雨後用牛曳碌碡或輥子於所斫根查上和泥碾之乾則掙爭去聲死一二嵗後皆可耕種其林木大者則􅞑烏更切殺之謂剝斷樹皮其樹立死葉死不扇便任種蒔三嵗後根株莖朽以火燒之則通為熟田矣周禮剃氏掌殺草春始生而萌之夏日至而夷之秋繩去聲而芟之冬日至而耜之書剃作夷謂芟草也又柞氏掌攻草木及林麓夏日至令刋陽木而火之冬日至剝隂木而水之注云刋剝背斫去次地之皮即此謂除木也詩曰載芟載柞其耕澤澤蓋謂芟草除木而後可耕也大凡開荒必趂雨後又要調停犂道淺深粗細淺則務盡草根深則不至塞墢粗則貪生費力細則貪熟少功唯得中則可耕荒畢以鐡齒􅘜􅜒過漫種黍稷或脂麻緑豆耙勞再遍明年乃中為穀田今漢沔淮潁上率多創開荒地當年多種脂麻等種有收至盈溢倉箱速富者如舊稻塍內開耕畢便撒稻種直至成熟不須薅呼髙反拔緣新開地內草根既死無草可生若諸色種子年年揀淨别無稗莠數年之間可無荒薉所收常倍於熟田蓋曠間既久地力有餘苖稼鬯音暢茂子粒蕃息也諺云坐賈行商不如開荒言其獲利多也除荒開墾之功如此若夫耕犂之事又有本末上古聖人制耒耜以教耕耨三代以上皆耦耕謂兩人合二耜而耕之詩曰亦服爾耕十千維耦者此也春秋之時后稷之裔孫叔均始作牛耕至漢趙過增其制度三犂一牛則力省而功倍今之耕者大率祖此周禮遂人治野以時器勸氓音萌言農夫之耕當先利其器也故詩曰三之日于耜四之日舉趾又曰有略其耜俶載南畝周禮車人為耒庛庛有三等見農器譜耒耜門今易耒耜而為犂不問地之堅强輕弱莫不任使欲淺欲深求之犁箭箭一而已欲廉欲猛取之犁梢梢一而已然則犁之為器豈不簡易而利用哉耕地之法未耕曰生已耕曰熟初耕曰塌音塔再耕曰轉生者欲深而猛熟者欲淺而廉此其略也天氣有隂陽寒燠之異地勢有髙下燥濕之别順天之時因地之宜存乎其人按月令孟春之月天子以元日祈穀於上帝乃擇元辰天子親載耒耜帥三公九卿諸侯大夫躬耕帝藉命田司善相邱陵阪險原隰土地所宜五穀所殖以教導民田事既飭先定凖直農乃不惑仲春之月耕者少舍此言農以春耕為先務也齊民要術云凡耕髙下田不問春秋必須燥濕得所為佳若水旱不調寧燥無濕燥耕雖塊一經得雨地則粉解濕耕堅垎數年不佳諺曰濕耕澤鋤不如歸去言無益而有損濕耕者白背速􅘜􅜒之亦無傷否則大惡也秋耕欲深夏耕欲淺秋耕䅖青為上比至冬月青草復生其美與豆同初耕欲深轉地欲淺耕不深則地不熟轉不淺則動生土菅茅之地宜縱牛羊踐之七月耕之則死汜勝之曰凡耕之本在於趣時春凍解地氣始通土一和解夏至天氣始暑隂氣始盛土復解夏至後九十日晝夜分天地氣和以此時耕一而當五名曰膏澤皆得時功韓氏直說云凡地除種麥外並宜秋耕秋耕之地荒草自少極省鋤工如牛力不及不能盡秋耕者除種粟地外其餘黍豆等地春耕亦可大抵秋耕宜早春耕宜遲秋耕宜早者乘天氣未寒時將陽和之氣掩在地中其苗易榮過秋天氣寒冷有霜時必待日髙方可耕地恐掩寒氣在內令地薄不收子粒春耕宜遲者亦待春氣和暖日髙時耕此所謂順天之時也齊民要術云春地氣通可耕堅硬强地黑壚土輒平磨其塊以生草草生復耜天有小雨復耕和之勿令有塊以待時所謂强土而弱之也杏始華榮輒耕輕土弱土望杏花落復耕耕輒藺音吝之草生有雨澤耕重藺之土甚輕者以牛羊踐之如此則土强所謂弱而强之也此所以因地而利之也農書云早田穫刈才畢隨即耕治曬暴加糞壅培而種豆麥蔬茹因而熟土壤而肥沃之以省來嵗工役其所收又足以助嵗計晚田宜待春乃耕為其藁秸堅韌必待其朽腐易為牛力也北方農俗所傳春宜早晚耕夏宜兼夜耕秋宜日髙耕中原地皆平曠旱田陸地一犁必用兩牛三牛或四牛以一人執之量牛強弱耕地多少其耕皆有定法所耕地內先並耕兩犁墢皆內向合為一壠謂之浮疄自浮疄為始向外繳耕終此一假謂之一繳一繳之外又間作一繳耕畢於三繳之間歇下一繳却自外繳耕至中心作一􅡡蓋三繳中成一􅡡也其餘欲耕平原率皆倣此南方水田泥耕其田髙下濶狹不等以一犁用一牛挽之作止回旋惟人所便髙田早熟八月燥耕而熯之以種二麥其法起墢為疄兩疄之間自成一􅎌一假耕畢以鋤橫截其疄泄利其水謂之腰溝二麥既收然後平溝􅎌蓄水深耕俗謂之再熟田也下田熟晚十月收刈既畢即乘天晴無水而耕之節其水之淺深常令塊墢半出水靣日暴雪凍土乃酥碎仲春土膏脉起即再耕治又有一等水田泥淖極深能陷牛畜則以木杠橫亘田中人立其上而鋤之南方人畜耐暑其耕四時皆以中晝此南方地勢之異宜也凡人家營田皆當量力寧可少好不可多惡詩曰無田去聲甫田維莠驕驕言力不給而貪多務得未免茍簡之弊故莊子曰昔豫為禾耕而鹵莽之其實亦鹵莽而報豫藝而滅裂之其實亦滅裂而報豫此言茍簡之害也農書云古者分田之制一夫一婦受田百畝以其地有肥墝去交切故有不易一易再易之别不易之地家百畝謂可以嵗耕之也一易之地家二百畝謂間嵗耕其半也再易之地家三百畝謂嵗耕百畝三嵗而一周也先王之制如此非獨以為土敝則草木不長氣衰則生物不遂也抑欲其財力有餘深耕易耨而嵗可常稔今之農夫既不如古往往租人之田而耕之茍能量其財力之相稱而無鹵莽滅裂之患則豐穰可以力致而仰事俯育之樂可必矣今備述經傳所載農事之法兼髙原下田地勢之宜自北自南習俗不同曰墾曰耕作事亦異通變謂道無泥一方則田功修而稼穡之務可以次第而舉矣耙勞篇第五凡治田之法犁耕既畢則有耙勞耙有渠疏之義勞有蓋磨之功今人呼耙曰渠疏勞曰蓋磨皆因其用以名之所以散墢去芟平土壤也桓寬鹽鐡論曰茂木之下無豐草大塊之間無美苖耙勞之功不至而望禾稼之秀茂實栗難矣韓氏直說云古農法犂一􅦥六今人只知犂深為功不知􅦥熟為全功􅦥功不到土粗不實下種後雖見苖立根在粗土根土不相著不耐旱有懸死蟲咬乾死諸病耙功到則土細而立根在細實土中又碾過根土相著自然耐旱不生諸病又云凡地除種麥外並宜秋耕先以鐡齒􅦥縱橫􅦥之然後插犂細耕隨耕隨勞至地大白背時更􅦥兩遍至來春地氣透時待日髙復􅦥四五遍其地爽潤上有油土四指許春雖無雨時至便可下種齊民要術云耕荒畢以鐡齒􅘜􅜒再遍耙之蓋鐡齒􅘜􅜒已為之先再用耙􅘜􅜒而後勞之也今人但耕地畢破其塊墢而後用勞平磨乃為得也齊民要術云耕地深細不得趂多看乾濕隨時蓋磨待一假總轉了橫蓋一遍每耕一遍蓋兩遍最後蓋三遍還縱橫蓋之種麥地以五月耕三遍種麻地耕五六遍倍蓋之但依此法除蟲災外小小旱乾不至全損緣蓋磨數多故也又云春耕尋手勞秋耕待白背勞蓋春多風不即勞則致地虛燥秋田濕濕速勞則恐致地硬又曰耕欲廉勞欲再凡已耕耙欲受種之地非勞不可諺曰耕而不勞不如作暴竊見世人耕了仰著土塊並待孟春蓋若冬乏氷雪連夏亢陽徒道秋耕不堪下種也然耙勞之功非但施於納種之前亦有用於種苗之後者齊民要術曰苗既出壠每一遇雨白背時輒以鐡齒􅘜􅜒縱橫耙而勞之耙法令人坐上數以手斷去草草塞齒則傷苗如此令地熟軟易鋤省力此用於種苖之後也南方水田轉畢則耙耙畢則抄抄見農器譜故不用勞其耕種陸地者犂而耙之欲其土細再犂再耙後用勞乃無遺功也北方又有所謂撻者與勞相類齊民要術云春種欲深宜曵重撻春氣冷生遲不曵撻則根虛雖生輒死雖生夏氣熱而速曵撻遇雨必致堅垎春澤多者或亦不須撻必欲撻者須待白背濕撻令地堅硬也又用曵打場圃極為平實今人凡下種耬種後惟用砘車碾之然執耬種者亦須腰繫輕撻曵之使壠土覆種稍深也或耕過田畝土性虛浮者亦宜撻之打令土實也今當耕種用之故附於耙勞之末然南人未嘗識此蓋南北習俗不同故不知用撻之功至於北方逺近之間亦有不同有用耙而不知用勞有用勞而不知用耙亦有不知用撻者耙勞撻並見農器譜今並載之使南北通知隨宜而用使無偏廢然後治田之法可得論其全功也播種篇第六書稱黎民阻飢汝后稷播時百穀詩言降之穜稑稙稚菽麥奄有下國俾民稼穡蓋言天相后稷之功也後之農家者流皆祖述之以至於今其法悉備周禮司稼掌巡邦野之稼而辨其穜稑之種周知其名與其所宜地以為法而縣於邑閭按農書九穀之種黍稷秫稻麻大麥小麥大豆小豆凡種浥鬱則不生生亦尋死種雜者禾生早晚不均舂復減而難熟特宜存意揀選常嵗别收好穗純色者劁音樵刈懸之又有粒而或簞或窖者將種前二十許日取出曬之令燥種之汜勝之曰牽馬令就穀堆食數口以馬踐過為種無虸蚄等蟲也種或傷濕浥鬱則生蟲也或取馬骨銼一石以水三石煮之三沸漉去滓以汁漬附子五枚三四日去附子以汁和蠶矢羊矢各等分攪令洞洞如稠粥先種二十日以溲種如麥飯狀當天旱燥時溲之立乾薄布數攪令乾明日復溲隂雨則勿溲六七溲而曝乾謹藏勿令復濕至可種時以餘汁溲而種之則禾稼不生蟲也無馬骨亦可用雪汁雪汁者五穀之精使稼又耐旱也麥種宜與銼碎蒼耳或艾暑日曝乾熱收藏以瓦器順時種之無不茂凡欲知嵗所宜穀以布囊盛粟等諸物種平量之以冬至日埋於隂地冬至後五十日發取量之息最多者嵗所宜也又師曠占術曰五木者五穀之先也欲知五穀但視五木擇其木盛者來年多種之萬不失一故雜隂陽書曰禾生於棗或楊大麥生於杏小麥生於桃稻生於栁或楊黍生於榆大豆生於槐小豆生於李麻生於楊或荆農書云種蒔之事各有攸叙能知時宜不違先後之序則相繼以生成相資以利用種無虛日收無虛月何匱乏之足患凍餒之足憂哉正月種麻枲二月種粟脂麻有早晚二種三月種早麻四月種豆五月中旬種晚麻七夕以後種萊蔔菘芥八月社前即可種麥經兩社即倍收而堅好如此則種之有次第所謂順天之時也凡五穀上旬種者全收中旬中收下旬下收又地勢有良薄山澤有異宜故良田宜種晚薄田宜種早良田非獨宜晚早亦無害薄田種晚必不成實山田宜種强苖以避風霜澤田種弱苗以求華實孝經援神契曰黃白土宜禾黑墳宜麥與黍赤土宜菽汙泉宜稻所謂因地之宜也南方水稻其名不一大槩為類有三早熟而緊細者曰秈晚熟而香潤者曰粳早晚適中米白而黏者曰糯三者布種同時每嵗收種取其熟好堅粟無秕不雜穀子曬乾蔀藏置髙爽處至清明節取出以盆盎别貯浸之三日漉出納草篅中晴則暴暖浥以水日三數遇隂寒則浥以溫湯候芽白齊透然後下種須先擇美田耕治令熟泥沃而水清以既芽之穀漫撒稀稠得所秧生既長小滿芒種之間分而蒔之旬日髙下皆遍北土髙原本無陂澤逐水曲而田者納種如前法既生七八寸拔而栽之凡下種之法有漫種耬種瓠種區種之别漫種者用斗盛穀種挾左腋間右手料取而撒之隨撒隨行約行三步許即再料取務要布種均勻則苖生稀稠得所秦晉之間皆用此法南方惟種大麥則㸃種其餘粟豆麻小麥之類亦用漫種北方多用耬種耬種見農器譜其法甚備齊民要術云凡種欲牛遲緩行種人令促步以足躡隴底欲土實種易生也今人製造砘車砘子之制見農器譜隨耬種之後循隴碾過使根土相著功力甚速而當去聲瓠種者瓠種之法見農器譜竅瓠貯種隨行隨種務使均勻犁隨掩過覆土既深雖暴雨不至迫撻暑夏最為耐旱且便於撮鋤今燕趙間多用之區種之法凡山陵近邑髙危傾陂及邱城上皆可為區田糞種水澆備旱災也區田法見農器譜又按食貨志云種穀必雜五種以備災害五種黍稷麻麥豆也又曰菜茹有畦瓜瓠果蓏殖於疆埸則是五種之外蔬蓏亦不可闕者故穀不熟曰飢菜不熟曰饉物理論云百穀者三穀各二十種蔬果各二十種共為百穀蓋蔬果之實所以助穀之不及也是故烹葵食瓜乃繫之豳風農桑之詩畜菜取蔬互見於月令收斂之後然地有肥瘠能者擇焉時有先後勤者務焉若夫種蒔之法姑略陳之凡種蔬蓏必先燥爆其子地不厭良薄即糞之鋤不厭頻旱即灌之用力既多收利必倍大抵蔬宜畦種蓏宜區種畦地長丈餘廣三尺先種數日斸起宿土雜以蒿草灰燎之以絶蟲類併得為糞臨種益以他糞治畦種之區種如區田法區深廣可一尺許臨種以熟糞和土拌勻納子糞中候苖出料視稀稠去留之又有芽種凡種子先用淘淨頓瓠瓢中覆以濕巾三日後芽生長可指許然後下種先於熟畦內以水飲地勻摻芽種復篩細糞土覆之以防日曝此法菜既出齊草又不生凡菜有蟲搗苦參根併石灰水潑之即死茍能依上法種蒔非止家可足食餘者亦可為資生之利昔龔遂勸農口種葱五十本薤百本韭一畦渤海之民緣是致足夫養生必以穀食配穀必以蔬茹此日用之常理而貧富所不可闕者故於穀食之後以蔬茹繼之而成其百穀之數今歷論播種之法庶農圃者擇而用之農書卷二
