body:
  text: 農書卷十二元王禎撰農器圖譜二耒耜門昔神農作耒耜以教天下後世因之佃作之具雖多皆以耒耜為始然耕種有水陸之分而器用無古今之間所以較彼此之殊效參新舊以兼行使粒食之民生生永賴仍以蘇文忠公所賦秧馬係之又為農器譜之始所有篇中名數先後秩序一一用陳于左耒耜上句木也易繫曰神農氏作斫木為耜揉木為耒說文曰耒手耕曲木從木推手周官車人為耒庛長尺有一寸鄭注云庛讀如棘刺之刺刺耒下前曲接耜則耒長六尺有六寸其受鐡處歟自其庛緣其外遂曲量之以至于首得三尺三寸自首遂曲量之以至于庛亦三尺三寸合為之六尺六寸若從上下兩曲之內相望如弦量之只得六尺與步相應堅地欲直庛柔地欲句庛直庛則利推句庛則利發倨句磬折謂之中地耜臿也釋名曰耜齒也如齒之斷物也說文云耜從木以聲徐鉉等曰今作耜周官考工記匠人為溝洫耜廣五寸二耜為耦一耦之伐廣尺深尺謂之􅎌鄭云古者耜一金兩人併發之其壟中曰􅎌􅎌上曰伐伐之言發也今之耜歧頭兩金象古之耦也賈公彥疏云古者耜一金者對後代耜歧頭二金者也云今之耜歧頭者後用牛耕種故有歧頭兩腳耜也耒耜二物而一事猶杵臼也陸龜䝉曰耒耜者古聖人作也自乃粒以來至于生民賴之有天下國家者此其本也飽食安坐曽不求名稱之義豈非揚子所謂如禽者也余在田野間一日呼耕氓就數其目恍若登農皇之廬受播種之法淳風泠泠聳竪毛髮然後知聖人之㫖趣朴乎其深哉孔子謂吾不如老農信也因書作耒耜經王荆公詩云耒耜見於易聖人取風雷不有仁智兼利端誰能開神農后稷死般爾相尋來山林盡百巧揉斫無良材犁墾田器釋名曰犁利也利則發土絶草根也利從牛故曰犂山海經曰后稷之孫叔均始教牛耕注云用牛犂也後改名耒耜曰犂陸龜䝉耒耜經曰農之言曰耒耜民之習通謂之犂冶金而為之曰犂鑱曰犂壁斫木而為之曰犂底曰壓鑱曰䇿額曰犂箭曰犂轅曰犂梢曰犂評去聲曰犂建曰犂槃木金凡十有一事耕之土曰墢音垡墢猶塊也起其墢者鑱也覆其墢者壁也故鑱引而居下壁偃而居上鑱之次曰策額雅格切言其可以扞其壁也皆貤然相戴貤余豉切物之相連次也自策額達於犁底縱而貫之曰箭前如桯而樛者曰轅桯杠也按周禮輪人為蓋桯圍倍之鄭司農云桯蓋杠也讀如丹楹之楹後如柄而喬者曰梢轅有越加箭可弛張焉轅之上又有如槽形亦加柄焉刻為級前髙而後庳所以進退曰稱進之則箭下入土也深退之則箭上入土也淺以其上下類激射故曰箭以其淺深類可否故曰稱稱之上曲而衡之者曰建建楗也楗渠堰切門楗也與鍵同所以抳其轅與稱抳女氏切倚也無是則二物躍而出箭不能止橫於轅之前末曰槃言可轉也左右繫以樫乎軛也樫苦耕切撞也轅之後末曰梢中在手所以執耕者也轅取車之胸梢取舟之尾止乎此乎鑱長一尺四寸廣六寸壁廣長皆尺微橢徒果切狹長也底長四尺廣四寸稱底過壓鑱二尺策額减壓鑱四寸廣狹與底同箭髙三尺稱尺有三寸槃增稱尺七焉建惟稱轅修九尺梢得其半轅至梢中間掩四尺犂之終始丈有二詩云犂以利為用用在耕夫手九木雖備制二金乃居首弛張測淺深髙庳定前後朝畦餘宿草暮墢起新畝懷哉服牛功還勝並耕耦古耒耜並耕曰耦牛耕牛也易繫黃帝堯舜服牛乘馬引重致逺以利天下蓋取諸隨未有用之耕者山海經曰后稷之孫叔均始教牛耕世以為起於三代愚謂不然牛若常在畎畝武王平定天下胡不歸之三農而放之桃林之野乎故周禮祭牛之外以享賔駕車犒師而己未及耕不然牽以蹊田正使藉稻何足為異乃設奪而罪之之喻耶在詩有云載芟載柞其耕澤澤千耦其耘徂隰徂畛又曰有略其耜俶載南畝以眀竭作于春皆人力也至於穫之積之如墉如櫛然後殺時犉牡有救其角以為社稷之報若果使之耕曽不如迎貓迎虎列於蠟祭乎蓋牛之耕起于春秋之間故孔子有犂牛之言而弟子冉耕字伯牛禮記吕氏月令季冬出土牛示農耕早晚前漢趙過又增其制度三犂一牛後世因之生民粒食皆其力也然知資其力而不知養其力力既竭矣曽不審寒暑之異宜疫癘之救藥有冬鬻春租冀免芻豆之費壯鞭老殺猶圖皮肉之資今勸農有官牛為農本而不加勸以致生不滋盛價失廉平田野小民嵗多租賃以救目前計其所輸已過半直是以貧者愈貧由不恤農之本故也若為民牧者當先知愛重祈報便不敢慢易絶其妄殺憫其羸瘠豐其來牧潔其欄牢則無不字育蕃息扎瘥不作耕種不失足致豐盈此誠善政務本之意也其可忽諸栁宗元賦云若知牛乎牛之為物魁形巨首垂耳抱角毛革疏厚牟然而鳴黃鍾滿脰抵觸隆曦日耕百畝往來修直植及禾黍自種自斂服箱以走輸入官倉已不適口富窮飽飢功用不有陷泥蹶塊常在草野人不慙愧利滿天下皮角見用肩尻莫保或穿緘縢㦯實爼豆由是觀之物無踰者不如羸驢服逐駑馬曲意隨勢不擇處所不耕不駕藿菽自與騰踏康莊出入輕舉喜則齊鼻怒則奮擲當道長鳴聞者驚辟善識門戶終身不惕牛雖有功於已何益命有好醜非若能力慎勿怨尤受以多福嶺南舊俗皆好殺牛東坡嘗書此以諭其知者耙又作爬今作􅦥通用宋魏之間呼為渠拿諾諸切又謂渠疏陸龜䝉曰凡耕而後有耙所以散墢去芟渠疏之義也種蒔直說古農法云犂一耙六今日只知犂深為功不知耙細為全功耙功不到則土粗不實後雖見苖立根案種蒔直說作立根在土上根土不相著不耐旱有懸死蟲咬乾死等病耙功到則土細又實立根在細實土中又碾過根土相著自然耐旱不生諸病蓋耙遍數惟多為熟熟則上有油土四指可沒雞卵為得耙桯長可五尺闊約四寸兩桯相離五寸許其桯上相間去聲各鑿方竅以納木齒齒長六寸許其桯兩端木栝長可三尺前梢微昻穿兩木梮以繫牛挽鈎索此方耙也又人字耙者鑄鐡為齒齊民要術謂之鐡齒􅘜􅜒爼候切凡耙田者人立其上入土則深又當於地頭不時跂足閃去所擁草木根苃水陸俱必用之詩云古人制農器因物利其利犂耕啓厥初耙入抑為次跡居􅘜􅜒功齒有渠疏義冉遍不妨多稼事匪求易耖初教切疏通田泥器也髙可三尺許廣可四尺上有橫柄下有列齒其齒比耙齒倍長且密人以兩手按之前用畜力挽行一耖用一人一牛有作連耖二人二牛特用於大田見功又速耕耙而後用此泥壤始熟矣前人耕織圖詩云脫袴下田中盎漿著塍尾巡行遍畦畛扶耖均泥滓遲遲春日斜稍稍樵歌起薄暮佩牛歸共浴前溪水勞郎到切無齒耙也但耙梃之間用條木編之以摩田也耕者隨耕隨勞又看乾濕何如但務使田平而土潤與耙頗異耙有渠疏之義勞有蓋摩之功也齊民要術曰春耕尋手勞秋耕待白背勞注云春多風不及勞則致地虛燥秋田㙷直輒切濕速勞則恐致地硬又曰耕欲廉勞欲再今亦名勞曰摩又名蓋凡已耕耙欲受種之地非勞不可諺曰耕而不勞不如作暴謂仰墢則田無力也詩云始教耒耜耕後有耙勞利耙與勞制同勞比耙功異平摩期保澤蓋掃非擁篲時哉不可失已有受種地撻打田篲也用科木縛如掃篲復加匾闊上以土物壓之亦要輕重隨宜曵以打地長可三四尺廣可二尺餘古農法云耬種既過後曵此撻使壠滿土實苖易生也齊民要術曰凡春種欲深宜曵重撻夏種欲淺直置自生注云春氣冷生遲不曵撻則根虛雖生輒死夏氣熱而生速曵撻遇雨必致堅垎其春澤多者或亦不須撻必欲撻者須待白背濕撻則令地堅硬故也又用曵打場面極為平實今人耬種後唯用砘車碾之然執耬種者亦須腰繫輕撻曵之使壠土覆種稍深也或耕過田畝土性虛浮亦宜撻之詩云有物同帚篲謂能資種藝負載體加重利幹材乃備方深覆護功已寄發生意回看畎畝間所歷盡實地耰於求切槌塊器說文云耰摩田器從木憂聲晋灼曰耰椎塊椎也吕氏春秋曰鋤耰白梃耰椎也管子曰一農之事必有一銍一椎然後成為農今田家所制無齒耙首如木椎柄長四尺可以平田疇擊塊壤又謂木斫即此耰也詩云聲憂字從木農器書所載古今用不殊摩田復椎塊坐見鋒鏑銷太平風物在堯年擊壤民今聞歌聖代碌石竹切碡徒篤切又作䃙碡陸龜䝉耒耜經曰耙而後有碌碡焉有礰礋焉自耙至礰礋皆有齒碌碡觚稜而已咸以木為之堅而重者良余謂碌碡字皆從石恐本用石也然北方多以石南人用木蓋水陸異用亦各從其宜也其制可長三尺大小不等㦯木或石刋木括之中受簨軸以利旋轉又有不觚稜混而圓者謂混軸俱用畜力挽行以人牽之碾打田疇上塊垡易為破爛及碾捍埸圃間麥禾即脫稃穗水陸通用之詩云木石非異名大小惟一致機栝內圓轉觚稜外排峙登場脫稃穗入埂均塊滓物用隨所宜人兮胡不爾礰呼格切礋音澤又作􅩯礋與碌碡之制同但外有列齒獨用於水田破塊滓溷泥塗也耒耜經云自耙至礰礋皆有齒者詩云他山有竒石鐫鑿煩良工制成三尺餘簨軸旋其中齒齒鋩鍔堅就彼破塊功一轉土膏潤再轉春泥融礰轆復礰轆妙用終無窮遄觀萬頃緑𥻘𥻘漾春風不辭處泥滓但願歌年豐耬落候切車下種器也通俗文曰覆種曰耬一云耬犂其金似鑱而小魏志略曰皇甫隆為燉煌太守民不知耕隆乃教民作耬犂省力過半得穀加五崔實論曰漢武帝以趙過為搜粟都尉教民耕殖其法三犂共一牛一人將之下種挽耬皆取備焉日種一頃據齊地大畝一頃為三十五畝也今三輔猶賴其利自注云按三犂共一牛若今三腳耬矣然而耬種之制不一有獨腳兩腳三腳之異今燕趙齊魯之間多有兩腳耬關以西有四腳耬但添一牛功又速也夫耬中土皆用之他方或未經見恐難成造其制兩柄上彎髙可三尺兩足中虛闊合一壠橫桄四匝中置耬斗其所盛種粒各下通足竅仍旁挾兩轅可容一牛用一人牽傍一人執耬且行且搖種乃自下此耬種之體用今特圖録不無有見鐻削鐻之意鐻渠以切近有創制下糞耬種於耬斗後别置篩過細糞或拌蠶沙耩時隨種而下覆於種上尤巧便也今又名曰種蒔曰耩子曰耬犂習俗所呼不同用則一也王荆公詩云富家種論石貧家種論斗貧富同一時傾㵼應心手行看萬壠間坐使千箱有利物博如此何慙在牛後砘音鈍車石碢也以木軸架碢為輪故名砘車兩碢用一牛四碢兩牛力也鑿石為圓徑可尺許竅其中以受機栝畜力挽之隨耬種所過溝壠碾之使種土相著易為生發然亦看土脉乾濕何如用有遲速也古農法云耬種後用撻則壠滿土實又有種人足躡壠底各是一法今砘車轉碾溝壠特速此後人所創尤簡當也詩云以砘為車古未聞字因義取石從屯斫成璧月雲根老動殷春雷陸地喧勢藉機衡圓轉力轍循種土發生原田頭已碾農夫說溝壠苗深穀易蕃瓠種竅瓠貯種量可斗許乃穿瓠兩頭以木箄貫之後用手執為柄前用作觜瓠觜中草莛通之以播其種瀉種於耕過壠畔畔田半也恐太深故種於壠畔也隨耕隨㵼務使均勻又犂隨掩過遂成溝壠覆土既深雖暴雨不至􅀈普格切撻他達切暑夏最為能與耐同旱且便於撮鋤苖亦鬯茂燕趙及遼以東多用之齊民要術曰兩耬重溝竅瓠下之以批莫結切契蘇結切繫腰曵之此舊制以今較之頗拙於用故從今法寡力之家比耕耙耬砘易為功也詩云休言瓠落只輪囷一竅中藏萬粒春喙舌不辭輸㵼力腹心元寓發生仁農工未害兼匏器案農務集作農家自喜為匏器柄用將同秉化鈞更看溝田遺跡在緑雲禾麥一番新耕槃駕犂具也耒耜經云橫於犂轅之前末曰槃言可轉也左右繫以樫苦耕切乎軛也耕槃舊制稍短駕一牛或二牛故與犂相連今各處用犂不同或三牛四牛其槃以直木長可五尺中置鉤環耕時旋擐犂首與軛相為本末不與犂為一體故復表出之詩云木金十一事耕槃踞犂首左右連雙藤圓轉栝樞紐軛也導吾前轅兮從去聲吾後既同濟世功寧辭力田畝牛軛於革切字亦作軛服牛具也隨牛大小制之以曲木竅其兩旁通貫耕索仍下繫鞅板用控牛項軛乃穩順了無軒側說文曰軛轅前木也潘安仁藉田賦云葱犗服於縹軛詩云軛也如折磬居然在牛領止轉槃乃安引耕索還整屈形深擁去聲肩藉力控垂頸歸挂屋厦時嘉苖滿田頃秧馬蘇文忠公序云余過廬陵見宣德郎致仕曽君安止出所作禾譜文既溫雅事亦詳實惜其有所缺不譜農器也豫昔逰武昌見農夫皆騎秧馬以榆棗為腹欲其􅉸以楸梧為背欲其輕腹如小舟昻其首尾背如覆瓦以便兩髀雀躍於泥中繫束藳其首以縛秧日行千畦較之傴僂而作者勞佚相絶矣史記禹乘四載泥行乘橇解者曰橇形如箕摘行泥上豈秧馬之類乎作秧馬歌一首附於禾譜之末云春雲濛濛雨凄凄春秧欲老翠剡齊嗟我父子行水泥朝分一壠暮千畦腰如箜篌首啄雞筋煩骨殆聲酸嘶我有桐馬手自提頭尻軒昻腹脅低背如覆瓦去角圭以我兩足為四蹄聳踊􅉸汰如鳬鷖纎纎束藁亦可齎何用繁纓與月題朅從畦東或畦西山城欲閉聞鼓鼙忽作的顱躍檀溪歸來挂壁從髙棲了無芻秣饑不啼少壯騎汝逮老黧何曽蹶軼防顛擠錦韉公子朝金閨笑我一生踏牛犂不知自有木駃騠農書卷十二
