body:
  text: 農書卷七元王禎撰百榖譜一百榖序引嘗聞上古之世人食鳥獸血肉以為食至神農氏作始嘗草别榖而後生民粒食賴焉物理論曰百穀者三榖各二十種為六十種蔬果各二十種共為百榖注云粱者黍稷之總名稻者溉種之總名菽者衆豆之總名三穀各二十種為六十蔬果之類所以助穀之不及也夫蔬蓏平時可以助食儉嵗可以救飢其果實熟則可食乾則可脯豐歉皆可充飢古人所謂木奴千無凶年非虛語也雖曰種各有二十殆難枚舉今故總為編録其陂澤之産園野之材與夫雜物品類上以助百穀之闕下以補諸物之遺條列而詳具之庶幾覽者擇取而備用焉穀屬粟春秋説題辭曰粟之為言續也粟五變一變而以陽生為苖二變而秀為禾三變而粲然謂之粟四變入臼米出甲五變而蒸飯可食宋均注云粟受五行氣而五變乃成故可食陽以一立為法故粟積大一分穗長一尺文以七列精以五立西者金所立米者陽精故西字合米而為粟愚按粟之名不一或因姓氏或因形似隨義賦名故早則有髙居黃百日糧之類晚則有鴟腳穀鴈頭青之類其餘名字不可遍數今略載於此齊民要術云夫粟成熟有早晚苖稈有髙下收實有多少質性有強弱米味有美惡粒實有息耗地勢有良薄案齊民要術有地勢有良薄一句此脫去謹增入山澤有異冝順天時量地利則用力少而成功多任情返道勞而無獲凡粟田菉豆小豆底為上麻黍胡麻次之蕪菁大豆為下故種粟春種欲深夏種欲淺其種時雨後為佳遇小雨宜接濕種遇大雨待薉生小雨不接濕無以生禾苗大雨不待白背濕輾則令苖瘦薉若盛者先鋤一遍然後納種佳也春若遇旱秋耕之地得仰壟待雨春耕者不中也夏若仰壟匪直蕩汰不生兼與草薉俱出凡田欲早晚相雜防嵗道有所宜有閏之嵗節氣近後冝晚田然大率欲早早田倍多於晚早田淨而易治晚者蕪薉難治其收之多少從嵗所冝非關早晚然早穀米實而多晚穀皮厚米少而虛也汜勝之書曰種無期因地為時三月榆莢時雨膏地強可種禾植禾夏至後八九十日常夜半候之天有霜若白露下以平明時令兩人持長索相對各持一端以槩禾中去霜露日出乃止如此禾稼五穀不傷矣又必待苖生如馬耳則鏃鋤稀豁之處鋤而補之五穀惟小鋤之為良苗出壟則深鋤鋤不厭數周而復始勿以無草而暫停鋤者非止鋤草蓋地熟而實多粳薄而米息鋤得十遍便得八米也春鋤起地夏而除草春鋤不用觸濕六月以後雖濕亦無嫌吕氏春秋曰苖其弱也欲孤其長也欲相與俱其熟也欲相扶是故三以為族乃多粟族聚也吾苖有行故速長弱不相害故速大橫行必得從行必術正其行通其風也耘苖之法其凡有四第一次曰撮苗第二次曰布第三次曰壅第四次曰復俗曰添米一功不至則稂莠之害秕粳之雜入之矣撮苖後用一驢帶籠觜挽之初用一人牽之慣熟不用止一人輕扶入之二三寸其深痛過鋤力三倍所辦之田日不啻二十畝今燕趙多用之名曰劐子食貨志云力耕數耘收穫如盜賊之至故熟速刈乾速積刈早則鎌傷刈晚則穗折遇風則收減濕積則藁爛積晚則損耗連雨則生耳所以收穫不可緩也記曰種而不耨耨而不穫譏其不能圖功攸終也是知收穫者農事之終為農者可不趨時致力以成其終而自廢其前功乎七月詩云九月築場圃十月納禾稼言農功之備也載芟之詩云載穫濟濟有實其積萬億及秭夫粟者五穀之長中原土地平曠惟冝種粟古今穀祿皆以是為差等出納之司皆以是為凖則周禮地官曰倉人掌粟入之藏鄭注云九榖盡藏以粟為主故漢太倉之粟陳陳相因充溢露積於外神農之教曰有石城十仞湯池百步帶甲百萬而亡粟弗能守史記云宣曲任氏之先為督道倉吏秦之敗豪傑皆爭金玉而任氏獨窖倉粟楚漢相拒滎陽民不得耕種米石至百金而豪傑金玉盡歸任氏任氏以此起富所以凶年飢嵗雖隋侯之珠不易一鍾之粟也由此言之粟之於世豈非為國為家之寶乎水稻稻之名不一隨人所呼不必縷數稻有粳秫之别粳性踈而可炊飯秫性粘而可釀酒然非水則無以生故種藝之法冝選上流出水便其性也春秋説題辭稻之為言藉也稻舍水盛其德也稻太隂精含水漸洳乃能化也淮南子亦曰江水肥而宜稻南方下土塗泥皆冝水種治稻者蓄陂塘以瀦之置隄閘以止之故周官制典稻人掌稼下地以瀦蓄水以防止水齊民要術云三月種者為上時四月上旬種者為中時中旬為下時先放水十日後曳碌碡十遍地既熟淨淘種子漬經三宿漉出內草篅中裛芽長二分一畝三升種之苖長陳草復起以鎌侵水芟之稻苗漸長復須薅之薅訖去水曝根令堅強時水旱而溉之又有作為畦埂耕杷既熟放水勻停擲種於內候苖生五六寸拔而秧之今江南皆用此法苖髙七八寸則耘之爪耘爬耘見農器譜耘畢放水熇之欲秀復用水浸之苖既長茂復事薅拔以去稂莠薅馬見農器譜農家收穫尤當及時江南上雨下水收稻必用喬杆笐架乃不遺失喬杆笐架見農器譜蓋刈早則米青而不堅刈晚則零落而損收又恐為風雨損壞此九月築場十月納稼工夫次第不可失也大抵稻穀之美種江淮以南直徹海外皆宜此稼舂而為米潔白可愛炊為飯食尤為香美孔子云食夫稻衣夫錦蓋食之於稻衣之於錦無以加也故生民蓄積而禦飢國家饋運而濟乏誠穀中之上品世間之珍藏也旱稻稻之名一而水旱之名異蓋水稻宜近上流旱稻宜用下田齊民要術云凡下田停水處燥則堅垎濕則汚泥難治而易荒墝埆而殺種其春耕者殺種尤甚故宜五六月時暵之以擬大麥麥時水潦不得納種者九月復一轉至春種稻萬不失一凡種下田不問春夏候水盡地白背時速耕耙勞頻翻令熟二月半種稻為上時三月為中時四月初及半為下時漬種如法裛令開口耬耩掩種之即再遍勞苖長三寸耙勞而鋤之鋤惟欲速每經一雨輒欲耙勞苖髙尺許則鋒天雨無所作宜冒雨薅之科大如穊者五六月中霖雨時拔而栽之其髙田種者不求極良惟須廢地亦秋耕耙勞令熟至春黃場納種不冝濕下餘法悉與下田同案此書節取諸書雖不全録原文然餘法悉與下田同一語乃指髙田而言今刪去其髙田種者三十字文義不明謹案齊民要術原文增入今閩中有得占城稻種髙仰處皆冝種之謂之旱占其米粒大而且甘為旱稻種甚佳北方水源頗少惟陸池沾濕處種稻其耕鋤薅拔一如前法一種有小香稻者赤芒白粒其米如玉飯之香美凡祭祀延賔以為上饌蓋貴其罕也大小麥青稞附麥芒穀也詩謂貽我來牟即大小麥也雜隂陽書曰大麥生於杏二百日秀秀後五十日成生於亥壯於卯長於辰老於巳死於午惡於戌忌於子丑小麥生于桃二百一十日秀秀後六十日成忌與大麥同月令以仲秋勸人種麥無或失時尚書大傳以秋昏虛星中可以種麥虛北方元武之宿八月昏中見於南方務本直言云麥種初收時旋打旋揚與蠶沙相和辟蟲傷資地力苖又耐旱齊民要術謂八月中戊社前種者為上時下戊前為中時八月末九月初為下時此種麥之法也大麥非良地則不須種小麥非下田則不冝説文曰麥金旺而生火旺而死夫八月乃金旺之月麥於是月而生五月乃火旺之月麥於是月而死是知物之生成各有其時種植之日有先後則所擲之子有多寡種植之地有肥磽則所收之利有厚薄大抵未種之先當於五六月暵地若不暵地而種其收倍薄凡種須用耬犂下之又用砘車碾過日種數畝蓋成壟易于鋤治又有漫種一法農人左手挾器盛種右手握而勻擲於地既遍則用耙勞覆之又頗省力耬犂砘車見農器譜此北方種麥之法南方惟用撮種故所種不多然糞而鋤之人功既到所收亦厚正月二月勞而鋤之三月四月鋒而更鋤苖乃茂盛既秀不須再鋤直至收穫韓氏直説云四五月麥熟帶青收一半候熟收一半若過熟則拋費每日至晚即便載麥上場堆積用苫繳覆以防雨作如天晴乘夜載上場薄攤使之易乾碾過一遍翻過又碾一遍起秸下場揚子收起直待所收麥子都碾盡將以前未淨秸稈再碾如此可一日一場比及收盡時分三分中已碾其二分古語云收麥如救火若少遲慢一值隂雨即為災傷况遷延過時秋苗亦妨鋤治北方芟麥用釤綽腰籠一人日可收麥數畝南方收麥鎌割手所種麥少故也若力省而工倍當以北方為法釤綽腰籠見農器譜然貯藏之法尤不可不明大凡曬大小麥須六月掃場地候地毒熱衆手薄攤取蒼耳碎銼拌曬至未時趂熱收可二年不蛀更欲曬亦止在立秋前若立秋後則已有蟲生恐無益矣夫大小麥北方所種極廣大麥可作粥飯甚為出息小麥磨麵可作餅餌飽而有力若用厨工造之尤為珍味充食所用甚多故春秋惟麥禾不收則書之蓋重其闕也世又有所謂青棵麥不過名與大小麥頗異爾種畝用子八升與大麥同時熟好收畝得三四石每石得麵八九斗堪作餅餌磨盡無麩但打時稍難惟伏日用碌碡碾過亦助二麥不足之用也百榖譜二穀屬黍説文云禾入水為黍又黍暑也當暑而生暑盡而收齊民要術云凡黍田新開荒為上大豆底為次穀底為下地必欲熟一畝用子四升三月上旬種者為上時四月上旬為中時五月上旬為下時夏種黍與殖榖同時非夏者大率以椹赤為候苖生隴平即冝耙勞鋤三遍乃止鋒而不耩詩云維秬維秠秬黑黍也書曰秬鬯一卣秬黍之别名此言黍之為酒尚矣今有赤黍米黃而黏可蒸食白黍釀酒亞於糯秫廣志云黍有牛黍有稻尾黍馬革大黑黍此黍之異名也又北地逺處惟黍可生所謂當暑而種當署而收其莖穗低小土人謂之林子可以釀酒又可作餟粥黏滑而甘此黍之有補於艱食之地也大抵割黍欲晚早則米不成冝即濕踐之凡祭祀以黍為上盛古人多以雞黍為饌貴其色味之美也穄穄禾從祭謂可以供祭也其苖莖穗葉與黍難别故言黍必及於穄其米用有異也種治之法與黍俱同凡穄味美者亦收薄難舂割穄欲早蓋晚多零落收訖宜蒸而裛之曝乾舂而為米其米踈爽可炊煮作飯時諸穀未熟可以接飢其色鮮黃其味香美然所種特少為農家之稀饌也粱秫粱有赤粱有白粱廣雅曰有具粱解粱有遼東黃粱其禾莖葉似粟其粒比粟差大其穗帶毛芒牛馬皆不食與粟同時熟收割之法亦同舂而為米圓滑如珠炊之香美勝於粟米世謂之膏粱號食飯之上品也案此條之目粱秫並列乃言粱而不言秫疑文有脫誤謹案廣志曰秫粘粟有赤有白有胡秫早熟及麥説文亦曰秫稷之黏者今世有黃粱穀秫桑根秫櫶天棓秫可以補其闕大豆豍豆附大豆有白黑黃三種廣雅曰大豆菽也爾雅曰戎菽謂之荏菽春大豆次植榖之後二月中旬為上時一畝用子八升三月上旬為中時畝用子一斗四月上旬為下時畝用子一斗二升嵗冝晚者五六月亦得然時晚則種子當稍加地不求熟故也尤當及時鋤治使之葉蔽其根庶不畏旱崔實曰正月可種豍豆二月可種大豆又曰三月桑椹赤可種大豆又曰四月時雨降可種大小豆大槩美田欲稀薄田欲稠也穫豆之法貴晚蓋早則零落而損實也其大豆之黑者食而充飢可備凶年豐年可供牛馬料食黃豆可作豆腐可作醬料白豆粥飯皆可拌食三豆色異而用别皆濟世之榖也小豆廣雅曰小豆答也本草經云張騫往外國得胡豆今世小豆有菉豆赤豆白豆豇豆䝁豆皆小豆類也種豆於夏至後十日者為上時畝用子八升初伏斷手為中時畝用子一斗中伏斷手為下時畝用子一斗二升中伏以後則晚矣熟耕耬下以為良澤多者耬耩漫擲而勞之如種麻法汜勝之書云豆生布葉鋤之生五六葉又鋤之然亦不可甚治古所以不盡治者豆有膏盡治之則傷膏傷則不成而其收耗折也夫收割之法待其可收則刈豆角三青兩黃拔而倒豎籠叢之則生熟皆均不畏嚴霜從本至末全無秕減北方惟用菉豆最多農家種之亦廣人俱作豆粥豆飯或作餌為炙或磨而為粉或作麴材其味甘而不熱頗解藥毒乃濟世之良榖也南方亦間種之豌豆豌豆種與大小麥同時來嵗三四月則熟又謂之蠶豆以其蠶時熟也百穀之中實為先登蒸煮皆可便食是用接新代飯充飽務本直言云如近城郭種之可摘豆角賣而變物莊農獻送以為嘗新貴其早也今山西人用豆多麥少磨麵可作餅餌而食此豆五榖中最冝耐陳不問凶豐皆可食用實濟飢之寶也蕎麥蕎麥赤莖烏粒種之則易為工力收之則不妨農時晚熟故也農桑輯要云凡蕎麥五月耕地經二十五日草爛得轉并種耕三遍立秋前後皆十日內種之待霜降收刈恐其子粒焦落乃用推鎌穫之推鎌見農器圖譜北方山後諸郡多種治去皮殼磨而為麵攤作煎餅配蒜而食或作湯餅謂之河漏滑細如粉亞於麥麵風俗所尚供為常食然中土南方農家亦種但晚收磨食溲作餅餌以補麵食飽而有力實農家居冬之日饌也薥黍案蜀黍一名髙粱一名蜀秫以種來自蜀形類黍故有諸名薥應從蜀薥黍春月種不冝用下地莖髙丈餘穗大如帚其粒黑如漆如蛤眼案齊民要術黍有鶯鴿之名據此則蛤當作鴿熟時收刈成束攢而立之其子作米可食餘及牛馬又可濟荒其梢可作洗帚秸稈可以織箔夾籬供爨無可棄者亦濟世之一榖農家不可闕也胡麻胡麻即今之脂麻是也漢時張騫得其種於胡地故目之曰胡麻本草注云麻八稜者為巨勝四稜者為胡麻皆以烏者良白者劣衍義云今胡地所出者多肥大其紋鵲其色紫黑取油亦多齊民要術曰胡麻於白地種二三月為上時四月上旬為中時五月上旬為下時月半前種者實多而成月半後種者少子而多枇也種欲截雨腳若不緣濕融而不生一畝用子二升漫種者先以耬耩然後撒子空曳勞勞上加人則土厚不生耬耩者炒沙令燥中半和之不和沙下不均壟種若荒得用鋒耬鋤不過三遍刈束欲小束大則難燥打手復不勝以五六束為一叢斜倚之不爾則風吹倒損收也候口開乘車詣田抖擻側豎以小杖微打之還叢之三日一打四五遍乃盡耳若乘濕橫積蒸熟速乾雖鬱裛無風吹虧損又慮裛者不中為種子然油無損也按古詩言麻麥言禾麻則麻尚矣乃今之白脂麻也胡麻出於胡地大而少異取其油可以煎烹可以燃點其麻又可以為飯續齊諧志所謂天台胡麻飯是也麻子蘇子附麻子爾雅所謂黂枲實儀禮注所謂苴麻之有黂者皆謂黂為子也本草圖經曰麻黂麻子生大山川谷今處處有之皆園圃所蒔績其皮以為布者麻黂一名麻勃麻上花勃勃者審如是言則子與黂為二物矣齊民要術曰止取實者種班黑麻子班黑者饒實崔實曰苴麻子黑又實而重搗治作燭不作麻耕須再遍一畝用子三升二月種者為上時四月初為中時五月初為下時大率二尺留一根穊則不成鋤常令淨荒則少實既放勃拔去雄若未放勃去雄者則不成子實凡五榖地畔近道者多為六畜所犯宜種胡麻麻子以遮之胡麻六畜不食麻子齧頭則科大收此二實足供美燭之費也慎勿於大豆地中雜種麻子麻地兩損而收並薄六月中可於麻子地間散蕪菁子而鋤之擬收其根雜隂陽書曰麻生於揚或荆七十日後花六十日後熟種忌四季辰未戍丑戊己汜勝之書曰樹髙一尺以蠶矢糞之無蠶矢以溷中熟糞亦善樹一升天旱以流水澆之無流水曝井水殺其寒氣以澆之雨澤時適勿澆澆不欲數霜下實成速斫之其樹大者以鋸鋸之務本新書曰凡種五榖如地畔近道者亦可另種蘇子以遮六畜傷踐收子打油燃燈甚明或熬油以油諸物爾雅曰蘇桂荏釋曰蘇荏類草按麻子蘇子六畜所不犯類能全身逺害者於五穀有外護之功於人有燈油之用皆不可闕也農書卷七
