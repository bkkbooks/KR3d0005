body:
  text: 農書卷三元王禎撰農桑通訣三鋤治篇第七傳曰農夫之務去草也芟夷蘊崇之絶其本根勿使能殖則善者信音伸矣蓋稂莠不除則禾稼不茂種苗者不可無鋤藝之功也又説文云鋤言助也以助苗也故字從金從助凡榖須鋤乃可滋茂諺云鋤頭自有三寸澤也詩曰其鎛音博斯趙以薅荼蓼鎛藝田器古之鎛其今之鋤歟鎛與鋤見農器譜按齊民要術云苗生如馬耳則鏃鋤諺曰欲得穀馬耳鏃稀豁之處鋤而補之凡五榖惟小鋤之為良小鋤者非直省功穀亦大勝大鋤者草根繁茂用功多而收功益少苗出壠則深鋤鋤不厭數周而復始勿以無草而暫停鋤者非止除草乃地熟而穀多粳薄米息鋤得十遍更得八米也春鋤起地夏而鋤草故春鋤不用觸濕六月已後雖濕亦無嫌春苗既淺隂未覆地濕鋤則地堅夏苗隂厚地不見日故雖濕亦無害矣管子曰為國者使民寒耕而熱藝藝除草也又云候黍粟苗未與壠齊即鋤一遍經五七日更報鋤第二遍候未蠶老更報鋤第三遍無力則止如有餘力秀後更鋤第四遍脂麻大豆並鋤兩遍止亦不厭早鋤榖第一遍便科定每科只留兩三莖更不得留多每科相去一尺兩壠頭空務欲深細第一遍鋤未可全深第二遍惟深是求第三遍較淺於第二遍第四遍又淺於第三遍蓋榖科大則根浮故也第一次撮苗曰鏃第二次平壠曰布第三次培根曰壅第四次添功曰復一次不至則稂莠之害秕稗之雜入之矣諺云榖鋤八遍餓殺狗為無粳也其榖畝得十石斗得八米此鋤多之效也其所用之器自撮苗後可用以代耰鋤者名曰耬鋤見農器譜其功過鋤功數倍所辦之田日不啻二十畝或用劐子其制頗同劐見農器譜如耬鋤過苗間有小豁眼不到處及壠間草薉未除者亦須用鋤理撥一遍為佳别有一器曰鏟見農器譜營州以東用之又異於此凡耘苗之法亦有可鋤不可鋤者旱耕塊墢苗薉同孔出不可鋤治此耕者之失難責鋤也曾氏農書藝稻篇謂記禮者曰仲夏之月利以殺草可以糞田疇可以美土疆蓋耘除之草和泥渥漉深埋禾苗根下漚罨既久則草腐爛而泥土肥美嘉榖蕃茂矣大抵耘治水田之法必先審度形勢先於最上處瀦水勿致走失然後自下旋放旋藝之其法須用藝爪見農器譜不問草之有無必遍以手排漉務令稻根之傍液液然而後已荆揚厥土塗泥農家皆用此法又有足藝為木杖如拐子兩手倚之以用力以趾塌墢泥上草薉壅之苗根之下則泥沃而苗興其功與藝爪大類亦各從其便也今創有一器曰耘蕩見農器譜以代手足功過數倍宜普效之慕文曰養苗之道鋤不如耨耨今小鋤也吕氏春秋曰先生者為米後生者為粃是故其耨也長其兄而去其弟不知稼者其耨也去其兄而養其弟不收其粟而收其粃此失耨之道也鋤後復有薅拔之法以繼成其鋤之功也夫稂莠秕稗雜其稼出蓋鋤後莖葉漸長使可分别非薅不可故有薅鼓薅馬之説事見農器譜其北方村落之間多結為鋤社以十家為率先鋤一家之田本家供其飲食其餘次之旬日之間各家田皆鋤治自相率領樂事趨功無有偷惰間有病患之家共力助之故田無荒穢嵗皆豐熟秋成之後豚蹄盂酒遞相犒勞名為鋤社甚可效也今採托南北耘薅之法備載於篇庶善稼者相其土宜擇而用之以盡鋤治之功也糞壤篇第八田有良薄土有肥磽耕農之事糞壤為急糞壤者所以變薄田為良田化磽土為肥土也古者分田之制上地家百畝嵗一耕之中地家二百畝間嵗耕其半下地家三百畝嵗耕百畝三嵗一周蓋以中下之地瘠薄磽確茍不息其地力則禾稼不蕃後世井田之法變強弱多寡不均所有之田嵗嵗種之土敝氣衰生物不遂為農者必儲糞朽以糞之則地力常新壯而收穫不減孟子所謂百畝之糞上農夫食九人也踏冀之法凡人家秋收後場上所有穰􅶣等並須收貯一處每日布牛之腳下三寸厚經宿牛以蹂踐便溺成糞平旦收聚除置院內堆積之每日亦如前法至春可得糞三十餘車至五月之間即載糞糞地畝用五車計三十車可糞六畝勻攤耕蓋即地肥沃兼可堆糞桑行又有苗糞草糞火糞泥糞之類苗糞者按齊民要術云美田之法緑豆為上小豆胡麻次之悉皆五六月䆊種七八月犂掩殺之為春榖田則畝收十石其美與蠶矢熟糞同此江淮迤北用為常法草糞者於草木茂盛時芟倒就地內掩罨腐爛也記禮者曰仲夏之月利以殺草可以糞田疇可以美土疆今農夫不知此乃以其耘除之草棄置他處殊不知和泥渥漉深埋禾苗根下漚罨既久則草腐而土肥美也江南三月草長則刈以踏稻田嵗嵗如此地力常盛農書云種榖必先治田積腐藁敗葉剗剃枯朽根荄遍鋪而燒之即土暖而爽及初春再三耕耙而以窖罨之肥壤壅之麻籸舒榛反榖殼皆可與火糞窖罨榖殼朽腐最宜秧田必先渥漉精熟然後踏糞入泥蕩平田面乃可撒種其火糞種土同草木堆疊燒之土熱冷定用碌碡碾細用之江南水多地冷故用火糞種麥種蔬尤佳又凡退下一切禽獸毛羽親肌之物最為肥澤積之為糞勝於草木下田水冷亦有石灰為糞則土暖而苗易發然糞田之法得其中則可若驟用生糞又布糞過多糞力峻熱即燒殺物反為害矣大糞力壯南方治田之家常於田頭置磚檻窖熟而後用之其田甚美北方農家亦宜效此利可十倍又有泥糞於溝港內乘船以竹夾取青泥杴潑岸上凝定裁成塊子擔去同大糞和用比常糞得力甚多或用小便亦可澆灌但生者立見損壞不可不知農書糞壤篇云土壤氣脈其類不一肥沃磽確美惡不同治之各有宜也夫黑壤之地信美矣然肥沃之過不有生土以解之則苗茂而實不堅磽確之土信惡矣然糞壤滋培則苗蕃秀而實堅栗土壤雖異治得其宜皆可種植今田家謂之糞藥言用糞猶用藥也凡農居之側必置糞屋低為簷楹以避風雨飄浸屋中必鑿深池甃以磚甓凡掃除之土燒燃之灰簸揚之粳粃斷藁落葉積而焚之沃以肥液積久乃多凡欲播種篩去瓦石取其細者和勻種子疏杷撮之待其苗長又撒以壅之何物不收為圃之家於厨棧之下深濶鑿一池細甃使不滲泄每舂米則聚礱簸榖殼及腐草敗葉漚漬其中以收滌器肥水與滲漉泔淀漚久自然腐爛一嵗三四次出以糞苧因以肥桑愈久愈茂而無荒廢枯摧之患矣又有一法凡農圃之家欲要計置糞壤須用一人一牛或驢駕雙輪小車一輛諸處搬運積糞月日既久積少成多施之種藝稼穡倍收桑果愈茂嵗有增羡此肥稼之計也夫掃除之猥腐朽之物人視之而輕忽田得之為膏潤唯務本者知之所謂惜糞如惜金也故能變惡為美種少收多諺云糞田勝如買田信斯言也凡區宇之間善於稼者相其各處地理所宜而用之庶得乎土化漸漬之法沃壤滋生之效俾業擅上農矣灌溉篇第九昔禹決九川距四海濬畎澮距川然後播奏艱食蒸民乃粒此禹平水土因井田溝洫以去水也後井田之法大備於周周禮所謂遂人匠人之治夫間有遂十夫有溝百夫有洫千夫有澮萬夫有川遂注入溝溝注入洫洫注入澮澮注入川故田畝之水有所歸焉此去水之法也若夫古之井田溝洫脈絡布於田野旱則灌溉潦則泄去故説者曰溝洫之於田野可決而決則無水溢之害可塞而塞則無旱乾之患又荀卿曰修隄防通溝洫之水潦安水藏以時決塞則溝洫豈特通水而已哉考之周禮稻人掌稼下地以水澤之地種榖也以瀦蓄水以防止水以遂均水以列舍水以澮寫水此又下地之制與遂人匠人異也後世灌溉之利實昉於此至秦廢井田而開阡陌于今數千年遂人匠人所營之迹無復可見惟稻人之法低濕水多之地猶祖述而用之天下農田灌溉之利大抵多古人之遺迹如關西有鄭國白公六輔之渠關外有嚴熊龍首渠河內有史起十二渠自淮泗及汴通河自河通渭則有漕渠郎州有古史渠南陽有召信臣鉗盧陂盧江有孫叔敖芍陂潁川有鴻隙陂廣陵有雷陂浙左有馬臻鏡湖興化有蕭何堰西蜀有李氷文翁穿江之迹皆能灌溉民田為百世利興廢修壞存乎其人夫言水利者多矣然不必他求别訪但能修復故迹足為興利此歷代之水利下及民事亦各自作陂塘計田多少於上流出水以備旱涸農書云惟南方熟於水利官陂官塘處處有之民間所自為溪堨音曷水蕩難以數計大可灌田數百頃小可溉田數十畝若溝渠陂堨上置水閘以備啓閉若塘堰之水必置􅀈音蹇竇以便通泄此水在上者若田髙而水下則設機械用之如翻車筒輪戽斗桔橰之類挈而上之如地勢曲折而水逺則為槽架連筒隂溝浚渠陂柵之類引而達之此用水之巧者若下灌及平澆之田為最或用車起水者次之或再車三車之田又為次也其髙田旱稻自種至收不過五六月其間或旱不過澆灌四五次此可力致其常稔也傅子曰陸田者命懸于天人力難修水旱不時則一年功棄矣田制之由人人力茍修則地利可盡天時不如地利地利不如人事此水田灌溉之利也方今農政未盡興土地有遺利夫海內江淮河漢之外復有名水萬數枝分𣲖别大難悉數內而京師外而列郡至於邊境脈絡貫通俱可利澤或通為溝渠或蓄為陂塘以資灌溉安有旱暵之憂哉復有圍田及墟田之制凡邊江近湖地多間曠霖雨漲潦不時掩沒或淺浸瀰漫所以不任耕種後因故將征進之暇屯戍於此所統兵衆分工起土江淮之上連屬相望遂廣其利亦有各處富有之家度視地形築土作隄環而不斷內地率有千頃旱則通水潦則泄去故名曰圍田又有據水築為堤岸復疊外護或髙至數丈或曲直不等長至瀰望每遇霖潦以扞水勢故名曰墟田內有溝瀆以通灌溉其田亦或不下千頃此又水田之善者又如近年懷孟路開浚廣濟渠廣陵復引雷陂廬江重修芍陂似此等處略見舉行其餘各處陂渠川澤廢而不治不為不多倘能循按故迹或創地利通溝瀆蓄陂澤以備水旱使斥鹵化而為膏腴汙藪變而為沃壤國有餘糧民有餘利然考之前史後魏裴延雋為幽州刺史范陽有舊督亢渠漁陽燕郡有故戾諸堰皆廢延雋營造而就溉田萬餘頃為利十倍今其地京都所在尤宜疏通導達以為億萬衣食之計故秦渠序其略曰鄭國在前白渠起後舉臿如雲決渠為雨且溉且糞長我禾黍衣食京師億萬之口夫舉事興工豈無今日之延雋倘有成效不失本末先後之敘庶灌溉之事為農務之大本國家之厚利也已上水具並見農器譜請考之農書卷三
