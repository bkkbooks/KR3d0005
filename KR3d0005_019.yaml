body:
  text: 農書卷十九元王禎撰農器圖譜十四利用門農譜命篇曰利用與夫易云利用書曰利用其文同其理異今因水之利於用故以名篇亦古斷章摘句假其義也然水利之用衆矣唯關於農事係於食物者錄之然必假他物乃可成功所以訪諸彼而得於此稽諸古而行於今啟秘妙於初傳斡連機而同運或造穀食代人畜之勞或導溝渠集雲雨之效或資汲引於庖湢或供刻漏於田疇其餘舟楫溉灌等事已具前篇覽者當互相叅攷以盡水利之用云濬鏵濬思潤切與浚同鏵胡𤓰切鍫也濬深也書云濬畎澮距川今濬鏵即此濬也周禮匠人爲溝洫耜廣五寸二耜爲耦一耦之垡廣尺深尺以此考之則知濬鏵即耦耜之法其制大倍常鏵鐴亦稱是凡開田間溝渠及作陸塹乃别制箭犁可用此鏵斵犁底為胎煆鐵為刃犂轅貫以横木二人扶之可使數牛輓行挿犂既深一去復回即成大溝挑浚之力日省萬數唐書天寳初開砥柱之險以通流石中得古鐵犂鏵上有平陸二字因改河北縣為平陸縣此蓋先開險時所遺器也又泰山下舊有曠野其地汙下不任種蒔土人呼曰淳于泊近於耕斸之際得舊鏵大可尺餘故老云聞昔有大鏵用開田間去水溝塹當是此器因幷記之以爲興利者之助詩云田家作犂如耦耜惟犂用鏵能剸㫖兗切地只知鏵也便農耕不料開通有他制形模展大殊倍常犂鐴稱之同一事斵木成胎堅則强煆鐵為鋒深可遂九牛力輓即成渠速若雲行兼雨施去聲水陸相隣久不通一引泉源隨手至平田積潦或生波一過犇流除浸漬好將挑浚借竒功剨呼麥反土翻垡供萬簣為語雲屯荷鍤人勿謂夙傳無此器故陳圖序贊歌詩願播人間資水利水磨䃺同凡欲置此磨必當選擇用水地所先儘並蒲浪切岸擗水激輪或别引溝渠掘地棧木棧上置磨以軸轉磨中下徹棧底就作卧輪以水激之磨隨輪轉比之陸磨功力數倍此卧輪磨也又有引水置閘甃為峻槽槽上兩傍植木作架以承水激輪軸軸腰别作竪輪用擊在上卧輪一磨其軸末一輪傍撥周圍木齒一磨既引水注槽激動水輪則上傍二磨隨輪俱轉此水機巧異又勝獨磨此立輪連二磨也復有兩船相傍蒲浪切上立四楹以茆竹爲屋各置一磨用索䌫於急水中流船頭仍斜挿板木湊水抛以鐵爪使不横斜水激立輪其輪軸通長旁撥二磨或遇泛漲則遷之近岸可許移借比之他所又為活法磨也庶興利者度而用之詩云用水良有法假物役機智夫磑固利民復以水為利湍流激輪轉坤軸發樞秘星墜化石圓風旋疑鬼掣動静法陽陰造化出精粹造化動静間乾坤具兹器人唯盗物巧越古入極致今看益世功機事何必棄水排蒲拜切集韻作槖與􅀈同韋囊吹火也後漢杜詩爲南陽太守造作水排鑄為農器用力少而見功多百姓便之注云冶鑄者為排吹炭令激水以鼔之也魏志曰朝暨字公至爲樂陵太守徙監冶謁者舊時冶作馬排每一熟石用馬百匹更作人排又費工力暨乃因長流水為排計其利益三倍於前由是器用充實詔褒美就加司金都尉以今稽之此排古用韋囊今用木扇其制當選湍流之側架木立軸作二卧輪用水激轉上聲下輪則上輪所週絃索通繳輪前旋鼔掉枝一例隨轉其掉枝所貫行桄因而推輓卧軸左右攀耳以及排前直木則排隨來去搧冶甚速過於人力又有一法先於排前直出木簨約長三尺簨頭竪置偃木形如初月上用鞦韆索懸之復於排前植一勁竹上帶㯠索以控排扇然後却假水輪卧軸所列柺木自然打動排前偃木排即随入其柺木既落㯠竹引排復回如此間去聲打一軸可供數排宛若水碓之制亦甚便㨗故倂録此夫銅鐵國之大利凡設立冶監動支工帑雇力興搧極知勞費若依此上法頓為减省但去古已逺失其制度今特多方捜訪列為圖譜庶冶煉者得之不惟國用充足又使民鑄多便誠濟世之秘術幸能者述焉詩云嘗聞古循吏官為鑄農器欲免力役繁排冶資水利輪軸既旋轉機梮互牽掣尺制切深存槖籥功呼吸唯一氣遂致巽離用立見風火熾熟石既不勞鎔金亦何易國工倍常資農用知省費誰無興利心願言述此制水碾禇輦切水輪轉碾也後魏書崔亮教民為碾奏於張方橋東堰谷水造水碾數十區豈水碾之制自此始歟其碾制上同事見杵臼門但下作卧輪或立輪如水磨之法輪軸上端穿其碢榦水激則碢隨輪轉循槽轢穀疾若風雨日所毇米比於陸碾功利過倍詩云湍流激碾走通渠木石相乘有秘樞水府暗推坤軸健天衢圓轉月輪孤循環似假風雷迅受納難同杵臼拘粒食中州易精鑿好傳規制徧方隅水輪三事謂水轉輪軸可兼三事磨礱碾也初則置立水磨變麥作麫一如常法復於磨之外周造碾圓槽如欲毇米惟就水輪軸首易磨置礱既得糲米則去礱置碾碢榦循槽碾之乃成熟米夫一機三事始終俱備變而能通兼而不乏省而有要誠便民之活法造物之潛機今創此制幸識者述焉詩云制磨元慿一水輪就加礱碾巧相因軸端更平聲置皆從省糓物兼成豈憚頻餠食已供無匱乏米珠重造得圎勻濟民有要無人識農譜圖中擬細陳水礱力董切水轉上聲礱也礱制上同但下置輪軸以水激之一如水磨日夜所破穀數可倍人畜之力水利中未有此制今特造立庶臨流之家以慿倣用可為永利詩云旋輸糲榖入輕礱役水還將與磑五對反同粒米精粗來有自輪㡬日復轉無窮工傭給貯何多暇杵臼承舂祗半功仰去聲食老農方聼說江鄉新制要相通水轉上聲後同連磨其制與陸轉連磨不同此磨須用急流大水以湊水輪其輪髙濶輪軸圍至合抱長則随宜中列三輪各打大磨一槃磨之周匝俱列木齒磨在軸上閣以板木磨傍留一狹空去聲透出輪輻以打上磨木齒此磨既轉其齒復傍打帶齒二磨則三輪之力互撥九磨其軸首一輪既上打磨齒復下打碓軸可兼數碓或遇天旱旋於大輪一週列置水筒晝夜溉田數頃此一水輪可供數事其利甚博嘗到江西等處見此制度俱係茶磨所兼碓具用搗茶葉然後上磨若他處地分間去聲有溪港大水倣此輪磨或作碓碾日得糓食可給千家誠濟世之竒術也陸轉連磨下用水輪亦可詩云昔聞圜遶磨相連役水今看别有傳一軸連輪方卧轉衆機聯體復旁旋要樞自假波濤力哲匠誰偷造化權總道于人多飽徳好將規制示民先水擊麫羅隨水磨用之其機與水排俱同按圖視譜當自考索羅因水力互擊樁柱篩麫甚速倍于人力又有就磨輪軸作機撃羅亦為㨗巧詩云春雷聲殷上聲雪成圍收入羅床别有機纔得水輪輕借力方池勻受玉塵飛槽碓碓梢作槽受水以爲舂也凡所居之地間去聲有泉流稍細可選低處置碓一區一如常碓之制但前桯減細後梢深闊為槽可貯水斗餘上芘以厦槽在厦外乃自上流用筧古典切引水下注于槽水滿則後重而前起水瀉則後輕而前落即為一舂如此晝夜不止毇米兩斛日省二工以嵗月積之知非小利詩云刳槽制碓水為功積注涓流滿不容螳腹低時泉自㵼蜂腰轉處杵還舂一區機利無時輟陟列切百口精糧可日供借便田家應竊喜代人工力不須傭機碓水搗器也通俗文云水碓曰翻車碓杜預作連機碓孔融論水碓之巧勝於聖人斵木掘地則翻車之類愈出於後世之機巧王隠晉書曰石崇有水碓三十區今人造作水輪輪軸長可數尺列貫横木相交如滚槍之制水激輪轉則軸間横木間去聲打所排碓梢一起一落舂之即連機碓也凡在流水岸傍俱可設置須度水勢髙下為之如水下岸淺當用陂栅或平流當用板木障水俱使傍流急注貼岸置輪髙可丈餘自下衝轉名曰撩落蕭切車碓若水髙岸深則爲輪減小而濶以板為級上用木槽引水直下射轉上聲輪板名曰斗碓又曰鼔碓此隨地所制各趨其巧便也詩云杵臼中來有别傳作機還假物相連水輪翻轉上聲無朝暮舂杵低昻間去聲後先蹴踏休誇人力健供飱易得米珠圎擬將要法為圖譜載入農書利用篇水轉大紡車此車之制見蔴苧門兹不具述但加所轉上聲水輪與水轉輾磨之法俱同中原蔴苧之鄉凡臨流處所多置之今特圖寫庶他方績紡之家傚此機械比用陸車愈便且省庶同獲其利詩云車紡工多日百斤更慿水力㨗如神世間蔴苧鄉中地好就臨流置此輪缶汲水器左傳宋灾樂喜為政具綆缶杜注缶汲器爾雅疏云比毗至切卦初爻有孚盈缶注云爻辰在木上值東井井之水人所汲用缶楊惲傳曰田家作苦嵗時伏臘烹羊炰羔斗酒自勞去聲酒後耳熱仰天擊缶而呼烏烏應邵曰缶瓦器也今汲器用瓦亦缶之遺制也詩云缶名在卦著乎易有孚盈缶始于此聖人立象豈徒然義見初爻誠有為體圓質素用有常埏式連切埴時石切由來遵古制繘居役切井元慿汲引功虛往盈來霑永利世事從來有變通所用在人非在器勿因賤目作等閒一擊曾分秦趙氣眷然還憶古遺風得失無非寓真意好共農家老瓦盆侑我田歌成一醉綆古杏切郭璞云汲水索也易卦云汔其迄切至亦未繘井方言繘自關而東周洛韓魏間謂之絡關西謂之繘綆或作䋁古杏切俗謂井索下繫以鈎今汲用之家必有轆轤為綆設也詩云惟井有綆見于易綆入卦辭名以繘人間鑿飲安可闕懸缶至今無止日物本無情偶如智用舍以時存曲直正思湔滌此心塵汲引須慿一輸力田漏田家測景水器也凡寒暑昏曉已驗於星若占候時刻惟漏可知古今刻漏有二曰稱漏曰浮漏夫稱漏以權衡作之殆不如浮漏之簡要今田漏槩取其制置箭壺内刻以爲節既壺水下注則水起箭浮時刻漸露自巳初下漏而測景焉至申初為三辰得二十五刻倍為六辰得五十刻畫之於箭視其下尚可增十餘刻也乃於卯酉之時上水以試之今日午至來日午而漏與景合且數日皆然則箭可用矣如或有差當隨所差而損益之改畫時刻又試如初必待其合也農家置此以揆時計工不可闕者大凡農作須待時氣時氣既至耕種耘耔事在晷刻茍或違之時不再來所謂寸陰可競分陰當惜此田漏之所以作也兹刋為圖譜以示凖式梅聖俞詩云占星昏曉中寒暑已不疑田家更置漏寸晷亦欲知汗與水俱滴身隨陰屢移誰當哀此勞往往奪其時農器圖譜十五麰麥門芟麥等器中土人皆習用葢地廣種多必制此法乃易收歛比之鐮穫手䇿其功殆若神速今特各各圖録庶他方業農者傚之同省工力麥籠力董切盛芟麥器也判竹編之底平口綽廣可六尺深可二尺載以木座座帶四碢用轉上聲而行芟麥者腰繫鉤繩牽去聲之且行且曵就借使力前向綽麥乃覆籠内籠滿則舁之積處往返不已一籠日可收麥數畆又謂之腰籠詩云籠具牽來足轉輪瑞芒滿腹一何頻不須更問倉箱數已驗今年早得辛積資昔切苫失亷切芟麥既積編草覆之也農桑輯要云苫須於農隙時備下以防雨作農桑直說云作苫用榖草黄野草皆可但紐作腰𦂳去聲一頭留梢者為苫兩頭齊者為薦凡露積須苫繳蓋不為雨所敗也嘗見農家有以麻經或草索織之又可速就詩云紐成腰𦂳草如鋪禾積苫來若結廬應是農家有先備等閒風雨欲何如捃君運切刀集韻云捃拾也俗謂拾麥刀刃長可五寸闊近二寸上下竅繩穿之繫於指腕隨手芟穗取其便也麥禾既熟或收刈不時莖穗狼籍不能净盡單貧之人得以取其遺滯詩云謂此有滯穗伊寡婦之利蓋捃拾之間用此器也詩云銍刈中來有别名掌邊霜刃覺風生禾田伊利知多少俱入錚然截穎聲柂杷柂吐邏切摟麥長杷也首列二十餘齒有短木柄以批蒲結切契私列切繫腰曵之嘗見麥野為風雨所損而莖穗交亂不能净鏺故制此具腰後縱横摟之仍手握柄鐮芟其遺餘所得稭穗隨擁積之有一杷畢功得麥十餘斛者詩云麥田遺穗儘交加􅘜􅜒功多在一杷不假犁鋤飜有得登場或及下農家麥釤所鑑切芟麥刃也集韵曰釤長鐮也然如鐮長而頗直比鏺薄而稍輕所用斫而劖之故曰釤用如鏺也亦曰鏺其刃務在剛利上下嵌繫綽柄之首以芟麥也比之刈穫功過累倍詩云利刃由來與鏺同豈知芟麥有殊功回看萬頃黄雲地不用􅧉鐮捲已空麥綽昌約切抄麥器也篾竹編之一如箕形稍深且大旁有木柄長可三尺上置釤刃下横短柺以右手執之復於釤旁以繩牽短軸近刃處以細竹代繩防為刃所割也左手握而掣之以兩手齊運芟麥入綽覆之籠也嘗見北地芟取蕎麥亦用此具但中加宻耳夫籠釤綽三物而一事係於人之一身而各周於用信乎人為物本物因人而用也麥綽詩云芟麥雖慿利刃功柄頭須用竹為籠勿云褊量容多少都覆黄雲入籠中抄之教切畧取也竿扶麥竹也長可及丈麥已熟時忽為風雨所倒不能芟取乃别用一人執竿抄起卧穗竿舉則釤隨鏺之殊無損失必兩習熟者能用不然則有矛盾之差矣或曰今麥事有捃刀柂杷抄竿等器名色冗細似不足紀録而皆取之何也曰物有濟於人而遺之不可然世之豪侈輩固不屑知而貧窶者欲得為利拯既壞於無遺取棄餘為有用是可尚也故綴於麥事之末抄竿詩云風雨摧殘二麥秋一竿料理冀全收欲知自我扶顚力都在芟夫釤綽頭芟麥歌田家食力不食智麰麥年年勤種蒔老農八十諳地利暑夏呼兒先暵地再耕再耨土華膩手把耬犂知已試土沃不妨投種穊今年已報春澤被覆壠苗深如􅌨比薰風長養見天意獵獵青旗催穉穗纔結稃胞花雪墜赫赫曦輪熾鑽燧儘着精華輸至味粒飽芒森宻如篲頓失前時浪翻翠豈知真宰調元氣化作黄雲表嘉瑞老農眼飽雖自慰旦夕却憂風雨至子婦犇忙事芟器釤綽翩翩轉雙臂曵籠腰間盈復棄急載牛箱夜無寐轉首登場簇髙積去聲風翻日碾半猶未已向公門奉新餽麴材和糴凡幾次年餉廵門仍語誶夏稅有程今反易自餘宿負如取寄指此有秋爭蟻萃一得豈能償百費終嵗勤勞一歔欷昨日公堂宴賔貴尊爼横陳混肴胾檀板珠繩按歌吹萬錢不值供一醉庖人搓揉出精粹尚喜食新誇餅餌物不天來皆力致飽食何人知所自春祈夏薦禮所記報本從來追古義但願斯民不畏吏吏不擾民民自遂凡在牧民遵此治坐見兩岐歌政異日富囷倉均被賜不使老農憂嵗事農書卷十九
