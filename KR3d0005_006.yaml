body:
  text: 農書卷六元王禎撰農桑通訣六蠶繅篇第十五淮南王蠶經云黄帝元妃西陵氏始蠶盖黃帝制作衣裳因此始也其後禹平水土禹貢所謂桑土既蠶其利漸廣禮月令曰古者天子諸侯必有公桑蠶室季春之月具曲植音值籧筐后妃齋戒親東鄉音向躬桑禁婦女毋觀去聲省婦使以勸蠶事蠶事既登分繭稱絲效功以共郊廟之服無有敢惰及考之厯代皇后與諸侯夫人親蠶之事昭然可見况庶人之婦可不務乎夫育蠶之法始於擇種收種繭種取簇之中向陽眀淨厚實者蛾出第一日者名苖蛾末後出者名末蛾皆不可用次日以後出者取之鋪連於槌箔蠶連蠶槌見農器譜雄雌相配至暮抛去雄蛾将母蛾於連上匀布所生子環堆者皆不用生子數足更就連上令覆養三五日掛時須蠶子向外恐有風磨損其子冬節及臘八日浴時無令水極凍浸二日取出復掛年節後瓮内豎連湏使玲瓏每十數日日髙時一出毎隂雨上節便曬暴蠶子變色要在遲速由巳勿致損傷自變桑葉已生自辰巳間将瓮取出舒捲提掇亦無度數但要第一日變三分第二日變七分却用紙密糊封了還瓮内收藏至第三日午時又出連舒卷須要變至十分其蠶屋火倉蠶箔見農器譜並須預備蠶生宜髙廣牕户虛明易辨眠起仍上於行撁各置照牕每臨早暮以助髙眀下就附地列置風竇令可啓閉以除濕欝若新泥濕壁用熱火薫乾窗上用淨白紙新糊門窗各掛葦簾藁薦下蟻之時勿用雞翎等物掃拂惟在詳欵稀匀不至驚傷稠疊生齊取葉着懷中令煖用利刀切極細簁於器内蓐紙上匀薄将連合於葉上蟻聞葉香自下或過時不下連及縁上連背者並葉棄之飬蠶蟻時先辟東間一間四角挫壘空龕状如三星以均火候謂屋小則易收火氣也停眠前後則撤去擇日安槌上下各鋪三箔上承塵埃下隔濕潤鋪砌碎稈草於上中箔以備分擡用細切搗軟稈草匀鋪為蓐又揉淨紙黏成一片鋪蓐上安蠶初生色黒漸漸加食三日後漸變白則向食宜少加厚變青則正食宜益加厚復變白則慢食宜少减變黄則短食宜愈减純黃則停食謂之正眠眠起自黃而白自白而青自青復白自白而黃又一眠也每眠例如此候之以加减食凡葉不可帶雨露及風日所乾或浥臭者食之令生諸病常收三日葉以備霖雨則蠶常不食濕葉且不失饑採葉歸必踈爽於室中待熱氣退乃與食蠶時晝夜之間大槩亦分四時朝暮類春秋正晝如夏夜深如冬寒暄不一雖有熟火各合斟量多少不宜一例自初生至两眠正要温煖蠶母須着單衣以為體測自覺身寒則蠶必寒便添熟火自身覺熱蠶亦必熱約量去火一眠之後但天氣晴明巳午之間暫掲起窗間簾薦以通風日南風則捲北窗北風則捲南窗放入倒溜風氣則不傷蠶大眠起後飼罷三頓剪開窗紙透風日必不頓驚生病大眠之後捲簾薦去窗紙天氣炎熱門口置瓮旋添新水以生凉氣如遇風雨夜凉却當将簾薦放下其間自小至老蠶滋長則分之沙燠厚則擡之失分則稠疊失擡則蒸濕蠶柔輭而兖切之物不禁揉觸小而分擡人知愛䕶大而分擡或懶倦而不知顧惜久堆亂積逺擲髙抛損傷生疾多由於此蠶自大眠後十五六頓即老得絲多少全在此數北蠶多是三眠南蠶俱是四眠日見有老者量分數减飼候十蠶九老方可入簇值雨則壞繭南方例皆屋簇北方例皆外簇然南簇在屋以其蠶少易辦多則不任北方蠶多露簇率多損壓壅閼音遏南北簇法俱未得中今有善蠶者一説南北之間蠶少踈開窗户屋簇之則可蠶多選於院内搆長脊草厦内制蠶簇週以木架平鋪蒿梢布蠶於上用蓆箔圍䕶自無蠶病實良䇿也蠶簇見農器譜又有夏蠶秋蠶夏蠶自蟻至老俱宜凉惟忌蠅蟲秋蠶初宜凉漸漸宜煖亦因天時漸凉故也簇與繰絲法同春蠶南方夏蠶不中繰絲惟堪線纊而已周禮忌原蠶嵗再登非不利也然王者法禁之謂其殘桑也然則夏蠶最不宜多育務本新書云凡繭宜併手忙擇凉處薄攤蛾自遲出免使抽繰相逼恐有不及則有瓮浥籠蒸之法瓮浥籠蒸並見農器譜士農必用云繰絲之訣惟在細圓匀緊使無褊慢節核麤惡不匀也繰絲有熱釜冷盆之異然皆必有繰車絲軖然後可用熱釡要大置於釡上接一盆甑添水至甑中八分滿甑中用一板欄斷可容二人對繰也水湏常熱旋旋下繭多下則繰不及煮損此可繰麤絲單繳者䨇繳者亦可但不如冷盆所繰潔淨光瑩也冷盆要大先泥其外用時添水八九分水宜温煖長匀無令乍寒乍熱可繰全繳細絲中等繭可繰䨇繳比熱釡者有精神而又堅韌也南北蠶繅之事摘其精妙筆之於書以為必效之法業蠶者取其要訣嵗嵗必得庶上以廣府庫之貨資下以備生民之纊帛開利之源莫此為大祈報篇第十六曾氏農書云記曰有其事必有其治故農事有祈焉有報焉所以治其事也天下通祀惟社與稷社祭土勾龍配焉稷祭榖后稷配焉此二祀者實主農事載芟之詩春耤田而祈社稷也良耜之詩秋報社稷也此先王祈報之眀典也匪直此也山川之神則水旱癘疫之不時於是乎禜為命切之日月星辰之神則雪霜風雨之不時於是乎禜之與夫法施於民者以勞定國者能禦大菑音災者能捍大患者莫不秩祀先王載之典禮著之令式嵗時行之凡以為民祈報也周禮籥章凡國祈年于田祖則龡豳雅擊土鼓以樂田畯爾雅謂曰畯音俊乃先農也於先農有祈焉則神農后稷與世俗流傳所為田父田母皆在所祈報可知矣大田之詩言去其螟螣音特及其蟊賊無害我田穉田祖有神秉畀炎火有渰凄凄興雨祁祁雨我公田遂及我私此祈之之辭也甫田之詩言以我齊明與我犧羊以社以方我田既臧農夫之慶此報之之辭也繼而琴瑟擊鼓以御音迓田祖以祈甘雨以介我稷黍以榖我士女此又見因所報而寓所祈之義也若夫噫嘻之詩言春夏祈榖於上帝盖大雩帝之樂歌也豐年之詩言秋冬報者烝嘗之樂歌也其詩曰為酒為醴烝畀祖妣以洽百禮然於上帝則有祈而無報於祖妣有報而無祈豈闕文哉抑互言之耳此又祈報之大者也周禮大祝掌六祈以同鬼神示示與祇同六祈謂類造禬禜攻説皆祭名小祝掌小祭祀将事侯禳禱祠之祝號以祈福祥順豐年逆時雨寧風旱弭災兵逺罪疾舉是而言則祈報禬禳之事先王所以媚於神而和於人皆所以與民同吉凶之患者也凡在祀典烏可已耶記禮者曰伊耆氏之始為蜡也嵗十二月合聚萬物而索饗之也主先嗇而祭司嗇饗農及郵表畷張劣切禽獸迎貓迎虎而祭之祭坊與水庸其辭曰土反其宅水歸其壑昆蟲無作草木歸其澤由此觀之饗先嗇案此篇嵗時行之至饗先嗇共四百六十三字誤冩在盖古者未有耕牛之後盖由當時所據之本倒釘一頁而然謹改正先農而及於貓虎祭坊與水庸而及於昆蟲所以示報功之禮大小不遺也考之月令有所謂祈来年於天宗者有所謂祈榖實者有所謂為麥祈實者而春秋有一蟲獸之為災害一雨晹之致愆忒則必雩聖人特書之以見先王勤恤民隱無所不用其至也夫惟如此是以物由其道而無夭閼疵癘民遂其性而無札瘥災害神之聼之有相之道固如此也後世從事於農者類不能然借或有一焉亦强勉苟且而已豈能悉循用先王之典故哉田祖之祭民間或多行之不過豚蹄盂酒春秋社祭有司僅能舉之牲酒等物取之臨時其為禮盖蔑如也水旱相仍蟲螟為敗饑饉荐臻民卒流亡未必不由祈報之禮廢匱神乏祀以致然也今取其尤關於農事者言之社稷之神自天子至郡縣下及庶人莫不得祭在國曰大社國社王社侯社在官曰官社官稷在民曰民社自漢以来厯代之祭雖粗有不同而春秋二仲之祈報皆不廢也又育蠶者亦有祈禳報謝之禮皇后祭先蠶淮南子云黄帝元妃西陵氏始蠶即為先蠶考之後漢禮儀志祭菀窳婦人與寓氏公主至庶人之婦亦皆有祭秦觀書云庶人冡婦以下再拜詰旦升香各齎設醴而祭此后妃與庶人之祭雖貴賤之儀不同而祈報之心則一古者養馬一節春祭馬祖夏祭先牧秋祭馬社冬祭馬步此馬之祈謝嵗時惟謹至於牛最農事之所資反闕祭禮至於蜡祭迎貓迎虎豈牛之功不如貓虎哉盖古者未有耕牛故祭有闕典至春秋之間始教牛耕後世田野開闢榖實滋盛皆出其力雖知有愛重之心而曽無愛重之實近年耕牛疫癘損傷甚多亦盍禳禱祓除祛禍祈福以報其功力豈為過哉故於此篇祭馬之後以牛之説繼之庶不忘乎榖之所自農之所本也農書卷六
