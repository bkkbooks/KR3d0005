body:
  text: 農書卷十一元王禎撰農器圖譜一田制門農器圖譜首以田制命篇者何也蓋器非田不作田非器不成周禮遂人凡治野以土宜教甿稼穡而後以時器勸甿命篇之義遵所自也夫禹别九州其田壤之法固多不同而稷教五穀則樹藝之方亦随以異故皆以人力器用所成者書之各有科䓁用列諸篇之右其篇目特以耤田為冠示勸天下之農也然雖有鎡基不如待時乃以授時圖正之庶耕殖者無先後之失云耤田天子親耕之田也古者耤田千畝天子親耕用供郊廟齍音粢盛平聲躬勸天下之農耤之言借也王一耕之庶人耘耔以終之謂借民力成之也詩春耤田而祈社稷禮月令孟春之月天子乃以元日謂上辛郊祭天也祈穀于上帝乃擇元辰郊後吉辰也天子親載耒耜措之于叅保介保介車右人君之車必使勇士衣甲居右而參乘以備非常也之御間帥三公九卿諸侯大夫躬耕帝耤天子三推三公五推卿諸侯九推反執爵于太寝三公九卿諸侯大夫皆御命曰勞去聲酒周禮内宰詔后帥六宫之人生穜稑之種以獻於王使後宫蔵種而又生之天官甸師掌帥其屬府史胥徒也而耕王耤以時入之以供齍音粢盛平聲至漢文帝開耤田置令丞春始東耕景帝詔朕親耕以奉宗廟粢盛為天下先武帝制策曰今朕親耕以為農先昭帝耕于鈎盾弄田明帝東廵耕于下邳章帝北廵耕於懷縣魏氏天子親耕於耤晉武帝耕于東郊共祀訓農宋文帝制千畝親耕齊武帝載耒耜躬耕梁初依宋禮後魏太武帝祭先農而後耕北齊耕耤於帝城隋制耤壇行禮播植以擬齍盛唐太宗致祭先農耤于千畝之甸元宗欲重勸耕進耕五十餘歩肅宗命去耒耜彫刻冕而朱紘躬九推焉宋端拱以来有耕耤事類五卷此耤田之制歴載經史昭然可鑒欽惟聖朝丕闡皇圖講明典禮開帝耤於京畿備齍盛於郊廟先身示勸照映古今昔李䝉賦云揉為耒剡為耜取其象也逺矣農為本食為天惟其利也大焉聖人利器致豐躬親莫重乎稼穡軌物勵俗敦勸克厚乎率先于以奉神祇昭報之誠逹于以祈社稷孝享之徳宣則躬耕之義也從古以然皇帝勤惟國本欽若人天所務惟農順動而取諸豫所寳惟穀時行而應乎乾洎正月之吉日將有事乎昊天列千官於近甸屯萬騎於遐阡當是時也其祭不戒而宿設其工職競以先後大禮備兮和樂陳嗇夫馳兮庶人走帝乃服葱犗秉御耦我疆我理禮正於三推必躬必親義存乎千畝四輔冡宰六卿近臣大夫師長之族都鄙華裔之人聖有作兮萬物咸覩人胥效兮天下歸淳且圖匱者於其豐防儉者於其逸有備所以無患克勤是用終吉三推之禮廢則倉廪以之虗肆𤯝之㤙廢則簡書以之佚欽哉欽哉能事斯畢夫然則農功可大農扈允臧以農為本兮國有常令以農率下兮人知向方亦既奉宗廟亦既備烝嘗一人垂訓兮萬國昌固有述於日用于胥頌羙兮聲洋洋案此條所引唐肅宗命去耒耜雕刻云云考唐書係髙宗乾封二年事盖徴引之誤有又案此賊欽若人天將事乎昊天天字韵两押太社祭法曰王為群姓立社曰太社自立曰王社又按唐郊祀録云社壇居東面北廣五丈髙五尺以五色土為之四面宫坎餙以方色稷壇在西如社之制每於春秋二仲元辰及臘各以太牢祭焉皇帝親祀則司農省牲進熟司空亞獻司農終獻案太社及下條國社皆不别繫歌詩總以後條民社下祝辭括之國社祭法曰諸侯為百姓立社曰國社自立社曰侯社其制度考之朱文公社稷壇記云壇方二丈五尺崇三尺其再成方面皆殺尺崇四分而去一三成方殺如之而崇不復殺用三獻禮祭以少牢今郡國祭社皆有定式此不復具載民社古有里社樹以土地所宜之木如夏后氏以松殷人以栢周人以栗荘子見櫟社樹漢髙祖禱豐枌榆社唐有楓林社皆以樹為主也自朝廷至于郡縣壇壝制度皆有定例惟民有社以立神樹春秋所報莫不羣祭於此考近代祭儀前一日社正及諸社人各齋戒祭日未明三刻烹牲于厨掌饌者實祭器掌事者以席入設社神之席於神樹之下設稷神之席於神樹之西俱北面質明社正以下皆再拜讀祝禮成而退案社壇祭社稷神之所也社五土之祗稷五穀之神稷非土無以生土非穀無以成故祭社必及稷觀先王之制其于社稷春有祈歌載芟之詩秋有報歌良耜之詩然自漢以来歴代之祭雖有不同而春秋二仲祈報皆不廢也嘗考近代祭儀社以后土勾龍氏稷以后稷氏配按社稷壇記所謂社壇必受霜露風雨以達天地之氣其表則木松栢栗是也韓詩外傳云社主以石為之准五數長五尺凖隂之二數方二尺剡其上以象物方其下以象地體理其半以根在土中而本末均也禮考索云自天子至郡縣下逮庶人莫不通祭祝辭云社五土祇稷五穀祖土穀生成利用以叙世感載育禮從今古闢壝制壇剡石為主封以五方所尚之土表以三代所宜之樹北面而居不屋其所用逹两間隂陽寒暑仍受四時霜露風雨以相田農以穀士女去彼螟蝗介我稷黍時惟二仲祀事斯舉詩歌幽雅樂奏土鼓有酒盈觴有肴在爼神其享之願降多祜案剡其上以象物攷韓詩外傳作以象物生盖誤脫一字井田按古制井田九夫所治之田也鄉田同井井九百畝井十為通通十為成成十為終終十為同積為萬井九萬夫之田也井間有溝成間有洫同間有澮所以通水于川也遂人盡主其地嵗出田稅各有等差以治溝洫也竊謂井田溝洫去古已逺不可復覩今按圖考譜猶得想像髣髴但後世沿革不能復古故因為賦之云井九百畝在方里中八家百畝其中為公公田共畢私事方從積而言之井十為通通十為成成十為終終十井萬總名曰同遂人掌役田水何容溝洫畎澮距川而東盡力於此嘗稱禹功經界既正遂底時雍秦人一變阡陌横縱兼并以力侵奪相雄先王舊制一掃無踪斯民失所仁政曷逢迨漢而降王伯兼崇曩固今壤今非古農戸有増耗世有汚隆治因是異法不再窮各授永業彼疆此封穿引萬水足救災凶使民奠居賦簡時豐田雖不井綽有遺風區田按舊說區田地一畝闊一十五歩每歩五尺計七十五尺每一行占地一尺五寸該分五十行長一十六歩計八十尺每行一尺五寸該分五十三行長闊相折通二千六百五十區空一行種一行於所種行内隔一區種一區除隔空外可種六百六十二區每區深一尺用熟糞一升與區土相和布穀匀覆土以手按實令土種相着苖出看稀稠存留鋤不厭頻旱則澆灌結子時鋤土深壅其根以防大風揺擺古人依此布種每區収穀一斗每畝可収六十六石今人學種可減半計之又參攷汜勝之書及務本新書謂湯有七年之旱伊尹作為區田教民糞種負水澆稼諸山陵傾阪及邱城上皆可為之其區當於閑時旋旋掘下正月種春大麥二三月種山藥芋子三四月種粟及大小豆八月種二麥豌豆節次為之不可貪多夫豐儉不常天之道也故君子貴思患而預防之如嚮年壬辰戊戌饑歉之際但依此法種之皆免餓殍此已試之明效也竊謂古人區種之法本為禦旱濟時如山郡地土髙仰嵗嵗如此種藝則可常熟惟近家瀕水為上其種不必牛犂但鍫钁墾斸又便貧難大率一家五口可種一畝已自足食家口多者随數増加男子兼作婦人童稚量力分工定為課業各務精勤若糞治得法沃灌以時人力既到則地利自饒雖遇天灾不能損耗用省而功倍田少而収多全家嵗計指期可必實救貧之㨗法備荒之要務也詩云昔聞伊尹相湯日救旱有方由聖智限将一畝作田規計區六百六十二星分棊布滿方疇參錯有條相列次耕畬元不用牛犂短臿長鑱皆佃器糞腴灌溉但從冝瘦坂穹原俱羙地舉家計口各輸力男女添工到童稚坎餘種耨非重勞日課同趍等娱戯菽粟藷芋雜數品辦作儲糧接充餌終年五口儘無飢倍種兼収仍不啻乆知豐歉嵗不常大抵古今同一致天災莫禦自流行魃虐此時憂悉被吏民百禱竟無功稼野一枯乏秉穗令人空仰昔阿衡徒法不行誠自棄朅来學製古侯邦承㤙例署兼農事帶山田少闕食多教不及民深可愧故將制度冩為圖庶使貧農窮地利㑹湏嵗嵗保豐穰共享太平歌既醉圃田種蔬果之田也周禮以場圃任園地註曰圃樹果蓏之屬其田繚以垣墻或限以籬塹負郭之間但得十畝足贍數口若稍逺城市可倍添田數至半頃而止結廬於上外周以桑課之蠶利内皆種蔬先作長生韭一二百畦時新菜二三十種惟務多取糞壌以為膏腴之本慮有天旱臨水為上否則量地鑿井以備灌溉地若稍廣又可兼種麻苧果糓等物比之常田嵗利數倍此園夫之業可以代耕至於養素之士亦可托為隱所日得供贍又有宦遊之家若無别墅就可棲身駐跡如漢隂之獨力灌畦河陽之閑居鬻蔬亦何害於助道哉詩云二頃負郭田尺土寕易取數口仰成家片産足為圃逺即加倍蓰多仍防莽鹵雖云絶里閭終得並蒲浪切城府幽可處山隈潤宜臨水滸未始外犂鋤或亦事斤斧中可居一㕓外或興百堵請學擬樊湏不如聞孔父業作灌園翁籍占輸稅户作計務勤劬傭工贍貧窶水種要漸平聲濡糞滋饒朽腐蔬茹間去聲甘辛瓠𤓰無苦窳芁芁黍稷苖蔚蔚桑果樹鬻利逹市㕓植本入村塢界展陣圖横區分僧衲補随分了朝昏無心富囷庾髙卧儘元龍信誣從市虎閑看穴蟻争静聽井蛙怒偶爾閲物情居然為地主進退綽有餘奔競耻為伍寸壌總康荘衆流獨砥柱自我結蓬茅從渠愛簮組畎畝着吾身乾坤留此土陵谷幾變遷耕鑿一今古四序轉軒楹八表際庭宇造境到羲炎逢時知舜禹柴荆敞昏夜桔橰憇煙雨俱同動植甦忝與音預膏澤溥斗酒一醉歡槃餐衆羙聚口腹粗能甘身形不知苦飬生誠足嘉報本非敢侮五土既有神百穀豈無祖齋祭奏豳詩嵗時鳴土鼔不離農務中是用紀圖譜圍田築土作圍以繞田也盖江淮之間地多藪澤或瀕水不時渰没妨于耕種其有力之家度視地形築土作堤環而不斷内容頃畝千百皆為稼地後值諸將屯戍因令兵衆分工𧺫土亦傚此制故官民異屬復有圩田謂疊為圩岸扞䕶外水與此相類雖有水旱皆可救禦凡一熟之餘不惟本境足食又可贍及鄰郡實近古之上法将来之永利富國富民無越于此詩云度地置圍田相兼水陸全萬夫興力役千頃入周旋俯納環城地穹懸覆幕天中藏仙洞秘外繞月宫圓蟠亘叅淮甸紆囘際海壖官民皆紀號逺近不相緣守望将同井寛平却類川隰桑宜葉沃堤柳要根駢交往無多逕髙居各一㕓偶因成土著元不異民編生業團鄉社囂塵隔市㕓溝渠通灌溉塍埂互連延俱樂耕耘便猶防水旱偏飜車能沃槁瀽穴可抽泉擁緑秧鋤後均黄刈穫前總沾新稅籍素表屢豐年黍稌及億秭倉箱累萬千折償依市直輸納帶逋懸嵗計仍餘羡牙商許懋遷補添他郡食販入外江船課㝡勸農職治優都水權富民兹有要陸海豈無邊祈奏載芟詠報歌良耜篇降穣今若此䝉利敢安然壤土常増築風濤每慮穿積儲趍日用防備廢宵眠擊鼓供惟急苫廬守獨專本為慿禦護或未免災愆誰念農工苦徒知粒食鮮併将圖譜事編記作詩傳案此詩髙居各一㕓囂塵隔市㕓㕓字韵两押櫃田築土護田似圍而小四面俱置瀽穴如此形制順置田叚便於耕蒔若遇水荒田制既小堅築髙峻外水難入内水則車之易涸淺浸處宜種黄穋稻周禮謂澤革所生種之芒種黄穋稻是也黄穋稻自種至収不過六十日則熟以避水溢之患如水過澤草自生糁稗可収髙涸處亦冝陸種諸物皆可濟饑此救水荒之上法一名埧音匱水溉田亦曰埧田與此同名而實異詩云江邊有田以櫃稱四𧺫封圍皆力成有時捲地風濤生外禦衝盪如嚴城大至連頃或百畝内少塍埂殊寛平牛犂展用易為力不妨陸耕及水耕長弹一引徹两際秧壠依約無斜横旁置瀽穴供吐納水旱不得為虧盈素號常熟有定数寄収粒食猶囷京庸田有例召民佃三年稅額方全徴便當從此事修築永護稼地非徒名吾生口腹有成計終焉願依江鄉氓架田架猶筏也亦名葑田集韻云葑方用切菰根也葑亦作湗江東有葑田又淮東二廣皆有之東坡請開杭之西湖状謂水涸草生漸成葑田考之農書云若深水藪澤則有葑田以木縛為田坵浮繋水面以葑泥附木架上而種藝之其木架田坵随水髙下浮泛自不渰浸周禮所謂澤草所生種之芒種是也芒種有二義鄭元謂有芒之種若今黄穋穀是也一謂待芒種節過乃種今人占候夏至小滿至芒種節則大水已過然後以黄穋穀種之於湖田然則有芒之種與芒種二義可並用也黄穋穀自初種以至収刈不過六七十日亦可以避水溢之患竊謂架田附葑泥而種既無旱暵之灾復有速収之效得置田之活法水鄉無地者宜傚之詩云稻人種藝巧憑藉既辨土宜知土化只知地盡更無禾不料葑田還可架從人牽引或去留任水淺深随上下悠悠生業天地中一片靈槎偶相假古今誰識有活田浮種浮耘成此稼但使㳺民聊駐脚有産諒非為土著縣官稅畝倘相容願此年年務農作案原本架田詩重繋於圍田詩之後又將櫃田詩誤繋於此條架田之下今謹改正梯田謂梯山為田也夫山多地少之處除磊石及峭壁例同不毛其餘所在土山下自横麓上至危巔一體之間裁作重磴即可種藝如土石相半則必疊石相次包土成田又有山勢峻極不可展足播殖之際人則傴僂蟻沿而上耨土而種躡坎而耘此山田不等自下登陟俱若梯磴故總曰梯田上有水源則可種秔秫如止陸種亦宜粟麥盖田盡而地地盡而山山鄉細民必求墾佃猶勝不稼其人力所致雨露所養不無稍穫然力田至此未免囏食又復租税随之良可憫也詩云世間田制多等夷有田世外誰名題非水非陸何所兮危巔峻麓無田蹊層磴横削髙為梯舉手捫之足始躋傴僂前向防顛擠佃作有具仍兼擕随冝墾斸或東西知時種早無噬臍穉苖亟耨同髙低十九畏旱思雲霓凌冐風日面且黧四體臞瘁肌若刲冀有薄穫勝稗稊力田至此嗟欲啼田家貧富如雲泥貧無錐置富望迷古稱井地今可稽一夫百畝容安棲餘夫田數猶半圭我今豈獨非黔黎可無片壌充耕犂佃業今欲青雲齊一飽纔足及孥妻輸租有例将何齎慚愧平地田千畦塗田書云淮海維揚州厥土惟塗泥大抵水種皆湏塗泥然瀕海之地復有此等田法其潮水所泛沙泥積於島嶼或墊溺盤曲其頃畝多少不等上有鹹草業生候有潮来漸惹塗泥初種水稗斥鹵既盡可為稼田所謂瀉斥鹵兮生稻粮沿邊海岸築壁或樹立樁橛以抵潮泛田邊開溝以注雨潦旱則灌溉謂之甜水溝其稼収比常田利可十倍民多以為永業又中土大河之側及淮灣水匯之地與所在陂澤之曲凡潢汙洄互壅積泥滓退皆成淤灘亦可種藝秋後泥乾地裂布掃麥種於上此所謂淤田之效也夫塗田淤田各因潮漲而成以地法觀之雖若不同其収穫之利則無異也詩云書稱淮海惟揚州厥土塗泥来已久今云海嶠作塗田外拒潮来古無有霖潦滲漉斥鹵盡秔秫已豐三載後又有河淤水退餘禾麥一收倉廪阜昔聞漢世有民歌涇水一石泥數斗且溉且糞長禾黍衣食京師億萬口稔知燕地多陂渠後魏裴延雋為幽州刺史修復燕地故戾陵諸堨及范陽督亢渠溉田萬餘頃為利十倍糞溉膏腴倍常畝若云是地可塗田先願滋培根本厚闕政今知水利先昔司馬温公言今闕政水利居其一天下豈無霖雨手沙田南方江淮間沙淤之田也或濵大江或峙中洲四圍蘆葦駢宻以護堤岸其地常潤澤可保豐熟普為塍埂可種稻秫間為聚落可藝桑麻或中貫潮溝旱則頻溉或傍繞大港澇則洩水所以無水旱之憂故勝他田也舊所謂坍江之田廢復不常故畝無常數稅無定額正謂此也宋乾道年間梁俊彦請稅沙田以助軍餉既施行矣時相葉顒奏曰沙田者乃江濵出沒之地水激于東則沙漲於西水激於西則沙復漲于東百姓随沙漲之東西而田焉是未可以為常也且比年兵興两淮之田租並復至今未征况沙田乎其事遂寝時論韙之今國家平定江南以江淮舊為用兵之地最加優恤租稅甚輕至於沙田聽民耕墾自便今為樂土愚嘗客居江淮目擊其事輙為之賛云江上有田總名曰沙中開畎畝外繞蒹葭耐經水旱逺際雲霞耕同陸土横亘水涯内備農具傍泊魚􅒎易勝畦埂肥漬茫華普宜稻秫可植桑麻種則雜錯收則倍加潮生上溉水夹分叉澇湏浚港旱或戽車地為永業姓随某家三時力穡多稼逾秅公私彼此横縱邇遐租賦不常豐稔惟嘉常思飽徳賛詠非誇授時圖示民耕桑時候之圖諺云雖有鎡基不如待時故繫此圖於田制門之末案此下原本重載農桑通訣中授時一篇係重出今謹刪去詩云天地始一氣施生本相資用道以分利所貴在適時時既有贏縮氣因為盛衰盛氣忽已及頃刻不可遺柰何幽且逺彼庶難具知圖成僅盈尺備悉踰渾儀經星若循環四仲猶旋規人事自外明斗杓由中持昏旦無爽度早晚有常期天人交際間表裏洞不疑作事誠有的厚生此其基活法非自古造妙誰管窺字民當有要欲救寒與飢勿奪足規訓敬授無疑遲参賛得實用化育不吾欺千嵗日可致灼灼如蓍龜領畧歸一圖總揆為農師悠悠衣食原歉足皆由兹願言常諦審千里始毫厘毋為自安者惰棄徒傷悲案原本授時圖既列于田制門之後又重見於農桑通訣授時篇之前疊出無所取義今謹删去農桑通訣中一圖而此條又刪去重見之授時一篇以符體例農書卷十一
