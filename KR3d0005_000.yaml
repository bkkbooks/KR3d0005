body:
  text: 王氏農書農家類提要臣等謹案王氏農書二十二卷元王禎撰禎字伯善東平人官豐城縣尹文淵閣書目曰王禎農書一部十册讀書敏求記曰農桑通訣六榖譜四農器圖譜十二總名曰農書永樂大典所載併為八卷割裂綴合已非其舊今依原序條目以類區分編為二十二卷其書典贍而有法葢賈思勰齊民要術之流圖譜中所載水器尤於實用有裨又每圖之末必係以銘賛詩賦亦風雅可誦今外間所有王禎農務集即從是書摘抄者也唐中和節所進農書世無傳本宋人農書惟陳旉所作存元人農書存於今者三本農桑輯要農桑衣食撮要二書一辨物産一明時令皆取其通俗易行惟禎此書引據賅洽文章爾雅繪畫亦皆工緻可謂華實兼資明人刋本皆舛訛漏落疑誤宏多諸圖尤失其真永樂大典所載猶元時舊本今據以繕寫校勘以還其舊觀焉乾隆三十八年七月恭校上總纂官臣紀昀臣陸錫熊臣孫士毅總校官臣陸費墀欽定四庫全書子部四農書目録農家類卷一農桑通訣一農事起本蠶事起本牛耕起本授時地利力田孝弟卷二農桑通訣二墾耕播種耙勞卷三農桑通訣三鋤治灌溉糞壌卷四農桑通訣四勸助蓄積收穫卷五農桑通訣五種植畜養卷六農桑通訣六蠶繰祈報卷七百糓譜一榖屬百糓譜二榖屬卷八百糓譜三蓏屬百糓譜四蔬屬百糓譜五蔬屬卷九百糓譜六果屬百糓譜七果屬百糓譜八果屬卷十百糓譜九竹木百糓譜十雜類百糓譜十一飲食類卷十一農器圖譜一田制門卷十二農器圖譜二耒耜門卷十三農器圖譜三钁鍤門農器圖譜四錢鎛門卷十四農器圖譜五銍艾門農器圖譜六杷朳門卷十五農器圖譜七簑笠門農器圖譜八蓧蕢門卷十六農器圖譜九杵臼門農器圖譜十倉廪門卷十七農器圖譜十一鼎釜門農器圖譜十二舟車門卷十八農器圖譜十三灌溉門卷十九農器圖譜十四利用門農器圖譜十五麰麥門卷二十農器圖譜十六蠶繰門卷二十一農器圖譜十七蠶桑門農器圖譜十八織紝門農器圖譜十九纊絮門卷二十二農器圖譜二十麻苧門雜録附農書原序農天下之大命也一夫不耕或授之饑一女不織或授之寒古先聖哲敬民事也首重農其教民耕織種植畜養至纎至悉禎不揆愚陋捜輯舊聞為集三十有七為目二百有七十嗚呼備矣躬任民事者儻有取於斯與皇慶癸丑三月望日東魯王禎書
