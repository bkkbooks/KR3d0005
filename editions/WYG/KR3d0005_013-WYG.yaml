body:
  text: 農書卷十三元王禎撰農噐圖譜三钁鍤門钁鍤起土具也太公六韜農器篇云钁鍤斧鋸蓋钁鍤農所必用墾斸荒梗䟽决溝渠不可闕者因以名篇冠其類也又有鑱鐴等器雖畧見犂譜終未詳備乃復表出之次於耒耜之後就附钁鍤之内庶無遺逸仍係之梧桐角以起東作云钁居縛切斸田器也爾雅謂之鐯斫也又云魯斫説文云欘陟玉切也玉篇云欘亦作斸又作钃誅也主以誅除物根株也蓋钁斸噐也農家開闢地土用以斸荒凡田園山野之間用之者又有闊狹大小之分然總名曰钁詩云銎柄為身首半圭非鋒非刄截然齊凌晨幾用和煙斸逼暮同歸帯月携已斫靈苖挑藥籠每通流水入蔬畦更㸔功在盤根地辦與春農趂雨犂鍤楚洽切顔師古曰鍬也所以開渠也或曰削有所穿也唐韻作疀俗作同作臿爾雅曰􅀈謂之疀方言云燕之東北朝鮮冽水之間謂之􅀈宋魏之間謂之鏵或謂之鍏音韋江淮南楚之間謂之鍤趙魏之間謂之喿七俏切皆謂鍬也鍬銚􅀈音同銚􅀈唐韻又吐彫反亦謂鋘鍬然多謂之鍤蓋古謂鍤今謂鍬一噐二名宜通用淮南子曰禹之時天下大水禹執畚鍤以為民先前漢溝洫志白渠歌曰舉鍤為雲决渠為雨以此見水利之事皆本於鍤也詩云有鍤公耶私與畚日為伍何去應官徭歸来事田圃起土作隄防决渠沛霖雨但恐農隙時又趂挑河鼓鋒孚逢切古農噐也其金比犂鑱小而加銳其柄如耒首如刄鋒故名鋒取其銛利也地若堅垎胡格切鋒而後耕牛乃省力又不乏刄古農法云鋒地宜深鋒苖宜淺齊民要術耕田篇云速鋒之地恒潤澤而不硬注曰刈穀之後即鋒苃蒲逹切下令突起則潤澤易耕案此註在種穀篇鋤得五徧以上不須耩之下此誤作耕田篇種穀篇云苖髙一尺則鋒之黍穄篇云苖生壠平鋒而不耩公項切農書云無鐴而耕曰耩既鋒矣固不必耩蓋鋒與耩相類今耩多用歧頭若易鋒為耩亦可代也近世農家不識此噐亦不知名茲特録其功用知為不可廢也詩云鋒也古農器於今用不同初縁耒耜制遂助犂鋤功利取根苃斷堅攻土脉通兼材宜不廢圖象付良工長鑱士杉切踏田器也鑱此犂鑱頗狹制為長柄杜工部同谷峪同歌曰長鑱長鑱白木柄即謂此也柄長三尺餘後偃而曲上有横木如柺以兩手按之用足踏其鑱柄後跟其鋒入土乃捩柄以起墢也在園圃區田皆可代耕比於钁斸竹足切省力得土又多古謂之蹠鏵今謂之踏犂亦耒耜之遺制也淮南子曰伊尹之興土也修脚者使之蹠音隻鏵注長脚者蹠鏵得土多也夫鏵與鑱同用即長鑱也詩云柺横柄屈踵微伸替脚犂耕壠上春足一踏來同耜舉手雙按處與鍬均杜陵託命歌同谷伊尹興工自有莘我亦從今事兹噐東臯甘作力田人鐵搭四齒或六齒其齒鋭而㣲鈎似耙非耙斸土如搭是名鐵搭就帶圓銎以受直柄柄長四尺南方農家或乏牛犂舉此斸地以代耕墾取其䟽利仍就􅘜􅜒塊壤兼有耙钁之效嘗見數家為朋工力相助日可斸地數畝江南地少土潤多有此等人力猶北方山田钁戸也賦云有噐與耙钁而各殊轍用與耙钁而無别自夫煆煉而鋒乃有銎柄之掲獨擅力乎田園嘗始見於江浙鋭比昆吾之鈎利即鏌鎁之鐵舉巨爪兮爬抉具疎齒兮噬齧憑爪牙兮汝藝是施假肘臂兮我力欲竭不耕而種且寛牛畜之租既斸而鎪似覺耙功之拙每破陌上之晨烟幾荷江邉之明月彼杜甫長鑱而豈託我生又堯民擊壤而焉知帝力必能審察其異同方逹彼此之緩急願編圖譜附搭也於農書使貧窶者得之用普及於稼穡杴虛嚴切鍤屬但其首方闊柄無短柺此與鍬鍤異也煆鐡為首謂之鐡杴惟宜土工剡木為首謂之木杴可㩍初責切糓物又有鐡刄木杴裁割田間塍埂以竹為之者淮人謂之竹揚杴與江浙颺去聲籃少異今皆用之因附於後鐡杴詩云非鍫非鍤别名杴柄直銎圓首利銛毋謂土工能事畢剗除荒穢要渠兼木杴詩云柄頭掌木儘寛平糓實抄來忌滿盈苗夏耰鋤方用事幾回髙閣待秋成鐡刄木杴詩云杴頭利刄擬風斤裁割畦田爾策勲莫謂等閑農事了人間經界要平分竹揚杴詩云竿頭擲糓一箕輕忽作晴空驟雨聲已向風前糠粃盡不勞車扇太􅋉生鑱仕杉切犂之金也集韻注鋭也吳人云鐡犂長尺有四寸廣六寸陸龜䝉耒耜經曰冶金而為之者曰犂鑱起其墢者也負鑱者底底實於鑱中謂之鼈肉底之次曰壓鑱皆貤然相戴貤以豉切物之相連次也若剜土既多其鋒必秃還可鑄接貧農利之體用又見鏵序案鑱為犂之金其詳見耒耜門犂一條故不别繫以詩鏵胡𤓰切集韻云耕具也釋名鏵鍤類起土也説文鏵作㭉兩刄鍤也從木象形宋魏作㭉互𤓰切集韻㭉作鏵或曰削能有所穿也又鏵刳地為坎也淮南子曰故伊尹之興土功修脚者使之蹠音隻鏵長脚者蹠鏵得土多也今謂之踏犂者舊用鏵亦用鑱鏵與鑱頗異鑱狹而厚惟可正用鏵闊而薄翻覆可使老農云開墾生地宜用鑱飜轉熟地宜用鏵蓋鑱開生地着力易鏵耕熟地見功多然北方多用鏵南方皆用鑱雖各習尚不同若取其便則生熟異器當以老農之言為法庶南北互用鑱鏵不偏廢也詩云惟犂之有金猶弧之有矢弧以矢為機犂以金為齒起土鍤刄同截荒劔鋒比緬懐神農學利端從此始鐴蒲狄切犂耳也陸龜䝉耒耜經其略曰冶金而為之曰犂鐴案耒耜經鐴作壁起其墢者鑱也覆其墢者鐴也鑱引而居下鐴倚而居上鐴形其圓廣長皆尺㣲橢徒果切狹長也背有二乳係于壓鑱之兩旁鑱之次曰策􅋕言其可以扞其鐴也皆相連屬不可離者夫鐴形不一耕水田曰瓦繳曰髙脚耕陸田曰鏡靣曰碗口隨地所宜制也詩云犂以耜為齒耜以鐴為耳背盎作䨇樞靣深停偃水覆墢翻若雲起􅎌直如矢裁成輔相間厥功深可倚剗初簡切平土器也俗又名鎊上聲周禮薙氏掌殺草冬日至而耜之鄭元謂以耜測凍土而剗之其刄如鋤而闊上有深袴揷於犂底所置鑱處其犂輕小用一牛或人輓行北方幽冀等處遇有下地經冬水涸至春首浮凍稍甦乃用此器剗土而耕草根既斷土脉亦通宜春種麰麥凡草莽汙澤之地皆可用之蓋地既淤壌肥沃不待深耕仍火其積草而種去聲乃倍收斯因地制噐剗土除草故名剗兼體用而言也詩云制器相地宜剗名良有義起土與耜同除荒過鉏利既能耕墾兼仍取播殖易靣㸔功施去聲何案此句疑有訛字春麥已交翠劐呼鑊切農桑輯要云燕趙之間用之今燕趙迆南又謂之種金耬足所耩金也如鑱而小中有髙脊長四寸許闊三寸揷於耬足背上兩竅以䋲控於耬之下桄其金入地三寸許耬足隨瀉種粒其種入土既深田亦加熟劐所過猶小犂一遍如古耦耕之法即一事而兩得也詩云種耬如耦耜足木履䨇金制比耕鑱小功惟入土深發生資爾後利用見於今苗壠雲平日嗟無迹可尋梧桐角淛東諸鄉農家兒童以春月捲梧桐為角吹之聲遍田野前人有村南村北梧桐角山後山前白莱花之句状時景也則知此制已乆但故俗相傳不知所自蓋音樂主和寓之於物以假聲韻所以感陽舒而蕩隂欝𨗳天事而逹人事則人與時通物隨氣化非直為戯樂也天台戴式之賦之云鳯簫鼉鼓龍鬚笛夜宴華堂醉春色繁聲緩響蕩人心但有歡娛别無益何如村落捲桐吹能使時人知稼穡村南村北聲相續青郊雨後耕黃犢一聲催得大麥黄一聲喚得新秧緑人言此角只兒戯孰識古人吹角意田家作勞多怨咨故假聲音召和氣吹此角起東作吹此角田家樂此角上與鄒子之律同宫商合鍾吕形甚朴聲甚古一吹寒谷生禾黍農器圖譜四錢鎛門錢鎛古耘器見於聲詩者尚矣然制分大小而用有等差揆而求之其鋤耨鏟盪等器皆其屬也如耬鋤鐙耘爪之類是其變也至於薅鼓又其輔也儻度而用之則知水陸之耘事有大功利在矣錢子踐切臣工詩曰庤乃錢鎛注錢銚也銚七遥切世本垂作銚唐韻作􅀈今鍬與鍤同此錢與鎛為類薅呼豪切器也非鍬屬也兹度其制似鍬非鍬殆與鏟同纂文曰養苗之道鋤不如耨力豆切耨不如鏟楚簡切鏟柄長二尺刄廣二寸以剗地除草此鏟之體用即與錢同錢特鏟之别名耳案錢鎛一類故此不别繫詩而於鎛一條以王安石詩總括之鎛布各切耨别名也良耜詩曰其鎛斯趙以薅荼蓼釋名曰鎛廹也廹地去草也爾雅䟽云鎛耨一噐或云鉏或云鋤屬嘗質諸考工記凡器皆有國工粤獨無鎛何也粤之無鎛非無鎛也夫人而能為鎛也荆州之田第八而賦第三揚州之田第九而賦雜出第六者人功修也以人皆趨農故耕耨之器手熟目稔不湏國工而自能也竊謂鎛鋤屬農所通用故人多匠之不必國工今舉世皆然非獨粤也王荆公詩云於易見耒耜于詩見錢鎛百工聖人為此㝡功不薄欲收禾黍善先去蒿菜惡願因觀器悟更使臣工作耨力豆切除草器易繫曰耒耨之利以教天下蓋取諸益吕氏春秋曰耨柄尺此其度也其耨六寸所以間稼也髙誘注云耨芸苗也六寸所以入苗間廣雅又云定謂之耨爾雅云斪巨復古候二切斸丁録切謂之定郭曰鋤屬淮南子曰摩蜃而耨蜃大蚌也摩令利用耨此古農器也吕氏春秋曰先生者美米後生者粃是故其耨也長其兄而去其弟不知稼者其耨也去其兄而養其弟不收其粟而收其粃此失耨之道也纂文曰養苗之道鋤不如耨古農法云苗生葉以上稍耨壠草因隤其土以附苗根此耨之功也詩云創物各有名薅器即云耨壅厚破蟻封啄深過鳥咮竹救切䕶苗如飬賢去草同擊㓂曽聞傴僂翁功毋求速就耰鉏古云斪斸一名定耰為鉏柄也賈誼云秦人借父耰鉏即此也釋名鋤助也去穢助苗也説文鋤立薅也齊民要術曰苗生馬耳則鏃初角切諺曰欲得榖馬耳鏃鋤稀豁之處鋤而補之凡五榖惟小鋤為良勿以無草而暫停春鋤起地夏鋤除草故春鋤不用觸濕六月以後雖濕亦無嫌夫鋤法有四一次曰鏃二次曰布三次曰擁四次曰復諺云鋤頭自有三寸澤言鋤則苗随滋茂其刄如半月比禾壠稍狭上有短銎以受鋤鉤鉤如鵝項下帯深袴皆以鐡為之以受木柄鉤長二尺五寸柄亦如之北方陸田舉皆用此江淮間雖有陸田習俗水種殊不知菽粟黍穄等稼耰鋤鏃布之法但用直項鋤頭刄雖鋤也其用如斸是名钁鋤故陸田多不豐收今表此耰鋤之效并其制度庶南北通用王荆公詩云鍜金以為曲揉木以為直直曲相後先心手始兩得秦人望屋食以此當金革君勿易耰鋤耰鋤勝鋒鏑耬鋤種蒔直説云此器出自海壖號曰耬鋤耬車制頗同獨無耬斗但用耰鋤鐡柄中穿耬之横桄下仰鋤刄形如杏葉撮苗後用一驢𢃄籠觜輓之初用一人牽慣熟不用人止一人輕扶入土二三寸其深痛過鋤力三倍所辦之田日不啻二十畆今燕趙間用之名曰劐呼鑊切子劐子之制又少異於此劐子第一遍即成溝子榖根未成不耐旱耬鋤刄在土中故不成溝子第二遍加擗土木鴈翅方成溝子其土分壅榖根擗土用木厚三寸濶三寸前為尖中作一竅長一寸闊半寸穿於鐡鋤柄上壓鋤刄上韓氏直說云如耬鋤過苗間有小豁不到處用鋤理墢一遍即為全功也詩云器惟名劐呼鑊切柄如耰一様田家獨脚耬擁土欲深添鴈翅為苗除薉當鋤頭朝來暮去供千壠力少功多限一牛無佃甫田休盡信驕驕惟莠并無憂鐙多鄧切鋤剗草具也形如馬鐙其踏鐡兩旁作刄甚利上有圓銎以受直柄用之剗草故名鐙鋤柄長四尺比常鋤無兩刄角不致動傷苗稼根莖或遇少旱或熇苗之後壠土稍乾荒薉復生非耘耙耘爪所能去者故用此剗除特為㨗利此創物者隨地所宜偶假其形而取便於用也與前代儀仗鐙棒無異嘗見江東農家用之詩云茲鋤以鐙稱惟鐙與鉏異鉏乃擬鐙形鐙也取鉏利借用有實材互名非本器物兮多變通執一豈云智鏟楚簡切釋名曰鏟平削也廣雅云籖纂文曰飬苗之道鋤不如薅薅不如鏟柄長二尺刄廣二寸以剗地除草此古之鏟也今鏟與古制不同柄長數尺首廣四寸許兩手持之但用前進攛之剗去壠草就覆其根特號敏㨗今營州之東燕薊以北農家種溝田者皆用之詩云古鏟惟制小頗逾鋤耨功今與古制異用亦差不同溝田壠欹反他刄誠難攻制器度地宜創物湏良工長柄加濶首圓枘投直銎畎畝耀吐月肘腋凌輕風務進同撞戈再前遂換踪覆苃易反掌剸地深潜鋒已令土膏潤旋平聲看蔓草空要處薅薙外不􅄐芸芓中飬苗成此稼去穢利吾農無田非力闢有具致時豐嘗見燕趙北亦𫝊遼池東逺近或未識圖譜容相通耘盪徒浪切江浙之間新制之形如木屐而實長尺餘闊約三寸底列短釘二十餘枚簨其上以貫竹柄柄長五尺餘耘田之際農人執之推盪禾壠間草泥使之溷溺則田可精熟既勝耙鋤又代手足水田有手耘足耘况所耘田數日復兼倍嘗見江東等處農家皆以兩手耘田匍匐禾間膝行而前日曝於上泥浸於下誠可嗟憫真西山言豳詩農事之叙至耘苗則曰暑日流金田水若沸耘耔是力稂莠是除爬沙而指為之戾傴僂而腰為之折此耘苗之苦也今覩此器惜不預傳以濟彼用茲特圖録庶愛民者播為普法詩云稻人掌稼湏下地秧壠年年勤揷蒔適當盛暑見薅人手足爬沙泥浸潰伊誰制器代爪耘長竹柄頭加木屣所綺切底列短釘為鐡齒盪草入泥俱膿死速比耰鉏用處功謂殺草與耰鋤等速也粒食由來同所致舉世誰非榖腹人智力取之寜有異至若執筆公署間但仰廪支供口費又若持戈征戍徒尤藉貲糧逺輸饋世間亦復多挾藝作計無非謀此食試将兹器示於人由此致食應不識便當獻送政事堂榖祿使知從我得願将制度付國工徧賜吾農資稼穡耘爪耘水田器也即古所謂鳥耘者其器用竹管隨手指大小截之長可逾寸削去一邉状如爪甲或好堅利者以鐡為之穿於指上乃用耘田以代指甲猶鳥之用爪也陸龜䝉鳥耘辯謂耘者去莠舉手務疾而畏晚鳥之啄食務疾而畏奪法其疾畏故曰鳥耘然嘗觀農人在田傴僂伸縮以手耘其草泥無異鳥足之爬抉豈非鳥耘者耶今述耘爪故因辯之庶識者有所取也詩云惟農有鳥耘爪田仍去莠劖竹貫十指耨禾牽兩肘假借以為功䟽剔乃能乆羡彼城府人安居長䄂手薅馬薅禾所乘竹馬也佀籃而長如鞍而狭兩端攀以竹系農人薅禾之際乃寘於跨間餘裳歛之於内而上控於腰畔乘之兩股既寛又行壠上不礙苗行胡郎切又且不為禾葉所􅽩故得専意摘剔稂莠速勝鋤薅此所乘順快之一助也余甞盛夏過吳中見之土人呼為竹馬與兒童戯乘者名同而實異殆若秧馬之類因命曰薅馬乃作詩道其梗槩云甞見兒童喜相迓抖摟繁纓騎竹馬今落田家薅具中髣髴形模懸跨下頭尻㣲昂如據鞍腹脇中虛深仰瓦乘來壠上歛褰裳借足於人寛兩髁初無鞕轡手不施只有叢荒常滿把昔聞坡老歌秧田以木為軀名我假雖云制度各殊工不出同途趍稼野豈無燕市騏驥材千里馳驅汗如瀉亦有尚廐麒麟姿路乘一鳴何佀啞争如寓器午同宫芻秣不煩殃咎寡又如畫幅出龍媒過目徒教費摹寫尤疑鐡騎響風簷聒耳胡為勞鑄冶豈知創物利于民獨有老農真智者朝騎暮去有常程暑月奔忙非夏庌荼蓼朽止方告勞杳不聞嘶馴里厦回㸔所歴稼如雲擬賀豐穰奏豳雅功成飜為一長嗟控御由人多用舍薅鼓曽氏薅鼓序云薅田有鼓自入蜀見之始則集其來既來則節其作既作則防其笑語而妨務也其聲促烈清壮有緩急抑揚而無律吕朝暮曽不絶響悲夫田家作苦綺襦紈袴不知稼穡之艱難因作薅鼓歌以告之云炎風灼肌汗成雨赤日流空水如煑穉苗森森茁方乳田家長飬過兒女稊根稗實藏深土得水滋萌疾機弩老農憂煎走旁午子汲婦炊具雞黍百端勸相防莽鹵尚恐偷忙貪笑語長椌刳桐三尺許促烈軒轟無律吕䨇手俱胼折腰膂朝走東臯夕南畆錦堂公子調樂府終日靈鼉緩歌舞庖人擇精揮鳥羽小槽真珠色勝琥歸來醉飽月停午囊甕猶嫌不勝貯萬錢棄擲在盤爼厭飫臺輿腯鼯䑕老農此時獨凄楚長鑱為命鉏為伍歸見桐椌音不吐只有伸吟滿環堵但得一甌置龜腑敢較人間異甘苦吁嗟公子還知否請聼薅田一聲鼓農書卷十三
