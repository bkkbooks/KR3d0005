body:
  text: 農書卷十七元王禎撰農器圖譜十一鼎釜門鼎釜皆烹飪器今鼎以取繅釜以供饁為農家必用之事復以老瓦盆匏樽土鼓之類迭相叙次愈見朴俗天真不事華玩如造羲皇氏之庭眷而懐之泊乎其樂之不自知也兹特圖其舊制贊以新詠庻形往古之風以革澆俗之弊其於政化不為無補云鼎說文云鼎三足兩耳烹飪器也周禮烹人掌共鼎鑊以給水火之齊今農家乃用煑繭繅絲嘗讀秦觀蠶書云凡繰絲嘗令煑繭之鼎湯如蟹眼又云絲自鼎道升於鎻星葢繰絲用鼎就其深大煑繭既多則繅取欲速不致蛾出或用甑接釡口象其深綽但權務省節終不若鼎之火候為便然原夫鼎之為器大則烹牲而供上祀小則和羮而備五味今用之以取繭絲而衣被斯民則其功利所及又豈止為向之食饗而已哉故嘉其兼用遂寘名田譜之内贊云維鼎在昔祀享多儀三代以來鑄象剖疑以定九州以正四夷國所係望農何與知降及後世物變風移取其深綽蠶繰是宜湯生蟹眼緒引繭絲婦工對向手筯駢持餵端自内輕紕由兹冷盆莫並熱釡何禆古今異用彼此一時既國而家既食而衣器兮不器備用無遺著為永法載播聲詩釜煑器也古史考黄帝始造釜甑火食之道成矣易說卦曰坤為釜廣雅曰錪他典切鉼音餅鬲音歴鑊音富鏕音鹿鏝鍪漫牟二音􅀢音規錡釜也說文釜作鬴鍑屬魏略曰鍾繇為相國以五熟鼎範因太子鑄之釜成太子與繇書曰昔周之九鼎咸以一體調一味豈若斯釜五味時芳葢鼎之烹飪以享上帝今之嘉釜有踰兹義異錄曰南方有以沙土燒之者燒熟油之淨逾鐡器尤宜煑藥一斗者纔直十錢斯濟貧之具不可無者賛云黄帝始造火食是須金獻歐冶制厥範模綽口銳下古今不踰中潔其腹外黔其膚薪􅅡而沸井汲而濡水火既濟饔飱乃餔掩彼鼎鼐五味能俱舉世通用田譜何書匪農獻糓徒生爾魚既曰跨竈寧不媚乎甑炊器也集韻云甑甗也籒文作䰞或作甑周禮陶人為甑實二鬴厚半寸脣寸說文曰窐户圭切甑空也爾雅曰䰝謂之鬵徐林切方言或謂之酢餾漢書項羽渡河破釜甑又任文公知有王莽之變悉賣竒物唯存銅甑以此知古人用甑雖軍旅及反側之際不可廢者或謂釜甑舉世皆用今作農器何也葢民之力田必資火食非釜甑不成以此起農事之始及穀物既登爨以釜甑又為農事之終所需莫急於此故附農器之内讃云日用炊爨甑也為先窐作一空底或七穿編箄為隔瓾帶周纒覆盆莫照跨釜能専中成至味外示陶埏餅餌作蒸饙餾非饘匪此為飫民食曷天箄甑箄也說文云箄蔽也所以蔽甑底也淮南子曰眀鏡可以鑑形蒸食不如竹箄孔融同嵗論曰弊箄徑尺不能捄鹽池之鹹矣箄弊可以止鹹故也又曰弊箄甑瓾在旃茵之上雖貧者不摶此言易得之物也字從竹或無竹處以荆栁代之用不殊也詩云甑或乏七穿編竹以為箄有縁去聲取象圓無底此能蔽巧偷蛛網功深為餅餌計孰謂材有餘止鹹猶用弊老瓦盆田家盛酒器也周禮曰盆實二鬴厚半寸唇一寸甄土為之所以盛物晋書阮咸𫝊曰咸至宗人間共集以大盆盛酒案此載晋書阮咸傳此本誤作劉義慶世說謹改正潘岳賦云傾縹盆以酌酒葢盆古亦盛酒器也老子曰埏埴以為器當其無有器之用竊謂季世習俗奢僣以金玉為飲器鮮不敗徳今瓦盆盛酒有復古淳儉之風其可尚也杜工部詩云莫笑田家老瓦盆自從盛酒長兒孫傾銀注玉驚人眼一醉終同卧竹根匏樽匏瓠也開以盛酒故曰匏樽周禮注云取甘匏割去柢為樽而酌之王昭禹謂門出入所在瓠中虛象門祭之去其害門者又鬯人禜門用瓢齎注云春秋魯荘公二十五年秋大水鼔用牲于門故書作剽鄭司農讀剽為瓢杜子春讀齎為粢瓢為瓠蠡也粢粢盛也鄭元謂齎讀為齊取甘匏割去柢以齊為尊也東坡云舉匏尊以相屬今田家用此皆其遺制賦云咨大塊兮孕質引蔓葉兮髙懸惟中虛兮表圓實取離兮象乾繄生成兮永固匪雕琢兮自然惟繫之兮不食爰剖之兮用全繼窪尊兮作古與䲭夷兮比肩至若畎畝登秋粒米呈瑞民無菜色家稱樂嵗走赤脚兮提擕酤村醪兮逺致瀉瓦盆之真率競捧承乎若器既爾汝兮相屬遂長幼兮同醉復乃俯扣仰答途歌里謡忘一已之所之邁千載之寂寥初若笠澤引田舍之觴又似柴桑倒茅簷之瓢無思慮兮適劉伶之動止浮江湖兮游荘周之逍遥浩浩乎無懐大庭兮去此逾幾又奚啻等山罍於敝屣兮儕犧象於蘇樵瓢柸判瓠為飲器與匏尊相配許由一瓢自随顏子一瓢自樂今舉匏尊傾瓢柸何田家之有真趣也韋肇賦其畧曰當其判飲器配圓壺雖人斯造製而天與規模柄非假操而直腹非待剖而刳黄其色以居貞圓其首以持重匪憎乎林下逸人何事而喧可惜乎樽中夫子能拙於用笙匏同出詎為樂音以見竒牢卺合行未諭婚姻之所共於是薦芳席娱宻座動而委命雖提挈之由君用或當仁信斟酌而在我挹酒漿則仰惟北而有别充玩好則校司南以為可有以小為貴有以約為珍瓠之生莫先於晋壌杓之類奚取於梓人昔者滄流曽變蠡名而願測今兹廟禮請代龍號而惟新勿請輕之掌握無使辱在埃塵為君酌人心而不倦庻返樸以還淳土鼓古樂器也杜子春云以瓦為匡以革為靣兩可擊也禮運曰蕢桴而土鼓案蕢桴而土鼔出禮運此本訛作易繫辭謹改正眀堂位曰土鼓蒯桴伊耆氏之樂也周禮春官籥章掌土鼔􅃎籥中春晝擊土鼔龡􅃎詩以迎暑氣中秋迎寒亦如之凡國之祈年于田祖龡􅃎雅擊土鼔以息老物杜子春云息老物謂息田夫飬老勞農今農家秋斂之後擊鼓以祀田祖即其遺意也詩云粤昔伊耆氏樂制惟土苴繼自神農氏作鼓正從瓦蒯桴一引擊真性足陶寫當時風俗成往往朴而野大音能希聲調髙誠和寡迨周因用之龡合􅃎頌雅祈年及祭蜡齊敬格上下是雖噐質畧名亦不徒假花腰鳴且急可以愧來者農器圖譜十二舟車門舟車之事任載所先葢南北道路之不同故水陸乘行之亦異然淮漢之間俱可兼用凡務農之家随其所便至於所居廬室尤不可無其動止之用理存覆載故共録於此農舟農家所用舟也夫水鄉種蓻之地溝港交通農人往來利用舟楫故異夫漁釣之名也賦曰夫聖人之制舟楫兮取刳剡之既臧用濟川而利渉亦輦重而惟彊必先具乎梢柁乃復揭乎篷檣恒獨乘而多便或並泛而能方繄大小制度之不一故彼此體用之難常若夫非艇非航非漁非商凡農居江海或野處湖湘猶陸路之資車辦一櫂於耕桑擬傍通於原隰可倒載乎倉箱播種則間去聲寘乎穜稑收穫則積叠乎稲粱其或出由港口歸下横塘雖慣作村溪之逆上須防風雨以遮蔵沙際輕帆挂新晴於逺浦籬根短纜泊落日之孤荘彼有駕乎蘭舫衒以華妝廣陳罇爼暖沸絲篁方轉乎楊栁之䕃復度乎荷芰之香徒能窮豪貴一時之侈樂焉知助民生終嵗之豐穣何張翰思歸獨取乎蓴羮鱸鱠又龜䝉投隠止載乎茶竈筆牀吾将挈家於此而就食聽其所止於魚稻之鄉划户花切船集韻划謂撥進也其船制短小輕便易於撥進故曰划船别名秧塌嘗見淮上瀕水及灣泊田土待冬春水涸耕過至夏初遇有淺漲所漫乃划此船就載宿浥稻種徧撒田間水内候水脉稍退種苗即出可收早稻又見江南春夏之間用此箝貯泥糞及積載秧􅀢以往所佃之地若際水則以鍬棹撥至或隔陸地則引纜掣去如泥中草上尤為順快水陸互用便於農事故備録於此詩云水鄉逺近多岐路誰作划船新制度不煩梢柂與帆檣一櫂翩翩恣來去農事方殷負載多水路無拘随所遇歸來閑艤古方塘不知江海風濤怒有時撐出栁邉來還勝斷橋人不渡野航胡郎切田家小渡舟也或謂之舴艋謂形如蚱蜢因以名之舴直格切艋莫梗切小舟也如村野之間水陸相間去聲豈所在橋梁皆能畢備故造此以便往來制頗朴陋廣纔㝷文可載人畜一二不煩人駕但於渡水兩傍維以竹草之索各倍其長過者掣索即抵彼岸或略具篙楫田農便之杜詩野航恰受兩三人即謂此也詩曰東臯􅃼茫春雨晴前溪溶溶春水生小橋欹仄已中斷野航一葉通人行長日一鞭春事畢來去溪邉少人跡雨打風牽盡日横白鷺有時來上立下澤車田間任載車也古所謂箱者詩曰乃求萬斯箱又􅔉彼牽牛不以服箱箱即此車也周禮車人行澤者反輮女久切又行澤者欲短轂短轂則利轉今俗謂之板轂車其輪用厚濶板木相嵌斵成圓様就留短轂無有輻也泥淖奴教切中易於行轉了不沾塞即周禮行澤車也蓋如車制而畧但獨轅著地如犁托之状上有橛以擐牛輓槃索上下坡坂絶無軒輊陟利切之患漢馬援弟少遊嘗謂乘下澤車是也詩云下澤名車異爾輶服箱元自有耕牛雙輪不輻還成轂獨木非轅類作輈免向通逵爭軌轍要登多稼出田疇有時命駕或他適常慕平生馬少遊大車考工記曰大車牝服二柯鄭元謂平地任載之車詩無将大車論語大車無輗皆此名也世本云奚仲造車凡造車之制先以脚圓徑之髙為祖然後可視梯檻長廣得所制雖不等道路同軌也中原農家例用之後梁甄元成車賦云鑄金磨玉之利凝土剡木之竒體衆術而特妙未若作車而載馳爾其車也名稱合於星辰圓方象乎天地夏言以庸之服周曰聚馬之器制度不以陋移規矩不以飾異古今貴其同軌華夷獲其兼利拖吐羅切車即拖脚車也以脚木二莖長可四尺前頭微昻上立四簨以横木栝之闊約三尺髙及二尺用載農具及芻種等物以往耕所有就上覆草為舎取蔽風雨耕牛挽行以代輪也故曰拖車中土多用之庻四方陸種者傚之以便農事詩云早同農具破烟來暮帶樵薪載月回不比㸔花南陌上雕輪繡轂殷音隠春雷田廬農書云古者制五畝之宅以二畝半在􅆵詩云入此室處是也以二畝半在田詩云中田有廬是也此葢古制自井田之變農人散居随業所在其屋廬園圃遂成久處四時之内農事俱便管子所謂居四民各有攸處不使龎雜欲其業専不為異端紛更其志今農家多居田野即其理也嘗讀陸龜䝉田廬賦状其窄陋非久經其處不能曲盡若此使世之崇居華構猶未滿志者觀之可悟奢㤗之失賦畧曰江上有田田中有廬屋以蒲蒋扉以籧篨笆籬楗微方竇櫺踈簷卑欹而立傴僂户偪側而行趦趄蝸涎隆頂龜拆旁塗夕吹入靣朝陽曝膚左有牛栖右有雞居将行瞪遮未起啼驅宜從野逸反若囚拘守舎㸔平聲禾廬也架木苫草略成構結兩人可舁禾稼将熟寝處其中備防人畜或就塍坎縛草為之若於山鄉及曠野之地宜髙架牀木免有虎狼之患真西山言農事之叙云至其禾迨垂穎而堅栗懼人畜之傷殘縛草田中以為守舍數尺容膝僅足蔽雨寒夜無眠風霜砭骨此守禾之苦也詩云禾穂纍纍青半黄邉山際野多熟鄉一粒未得人初嘗不應辦作鹿豕糧老農作計須夜防結草構木安匡床髙低量置田中央容身僅足庇雨霜比於露宿知猶强所圖嵗晏實饑腸世族多少居華堂安然熟寝無更長便腹何嘗乏稲粱敢較甘苦均閒忙不遑寧處禾無傷牛室門朝陽者宜之夫嵗事逼冬風霜淒凛獸既氄毛率多穴處獨牛依人而生故宜入飬宻室聞之老農云牛室内外必事塗塈以備不測火災最為切要陸龜䝉序云冬十月耕牛為寒築室納而皁之建之前日老農請乞靈於土官以從鄉教予勉而為之辭云四牸三牯中一去乳天霜降嚴入此室處老農拘拘度地不畝東西幾何七舉其武南北幾何丈二加五偶楹當間載尺入土太嵗在亥餘不足數上締蓬茅下逺城府耕耨以時餘食得所或寝或訛免風免雨宜爾子孫實我倉庾農書卷十七
