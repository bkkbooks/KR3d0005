body:
  text: 農書卷十六元王禎撰農器圖譜九杵臼門昔聖人教民杵臼而粒食資焉後乃增廣制度而為碓為磑為礱為輾等具皆本於此盖聖人開端後為蹈襲得其變也孔融謂後世機巧勝於聖人過矣今特辯之使知本末云杵臼舂也易繫辭曰黄帝堯舜氏作斷木為杵掘地為臼杵臼之利萬民以濟按古舂之制䄷常隻切百二十斤稻重一䄷為粟二十斗為米十斗曰毇許委切為米六斗大半斗曰粲又曰糲洛蔕切米一石舂為九斗曰糳則各切糳米之精者斯古舂之制自杵臼始也詩云易繋十三卦皆為萬民利聖人創杵臼尚象以制噐於義取雷山上動而下止人知𢷬舂法脱粟從此始後世相沿襲更變各任智制度雖不同由来資古意碓舂器用石杵臼之一變也廣雅曰􅀈丁力切碓也方言云碓梢謂之碓機自関而東謂之梴音延桓譚新論曰杵臼之利後世加巧因借身重以踐碓而利十倍耕織圖詩云姢姢月過墻䔩䔩風吹葉田家當此時村舂響相答竹間炊玉香㑹見流匙滑更須水輪轉地碓勞蹴蹋堈碓以堈作碓臼也集韻云堈居郎切甕也又作㼚其制先掘埋堈坑深逾二尺次下木地釘三莖置石於上後將大磁堈穴透其底向外側嵌坑内埋之復取碎磁與灰泥和之以窒底孔令圓滑如一候乾透乃用半竹篘長七寸許徑四寸如合脊瓦様但其下稍闊以熟皮周圍護之取其滑也倚于堈之下唇篘下兩邊以石壓之或兩竹竿刺定然後注糙於堈内用碓木杵杵頭鐡圍束之圍内置四犬牙釘稍卧之搗於篘内堈既圓滑米自翻倒簌於篘内一搗一簌既省人攪米自匀細然木杵既輕動防狂迸須於踏碓時已起而落随以左足躡其碓腰方得穏順一堈可舂米三石功校常碓累倍始於浙人故又名浙碓今多於津要商旅輳集處所可作連屋置百餘具者以供徃来稲船貨糶粳糯及所在上農之家用米既多尤宜置之詩云杵臼搜竒作碓堈米翻堈滑恣舂撞鐡籠木末裝全杵皮護篘材倚半腔頻作低昂身與共慣成踏躡足須䨇近随文軌通南北不獨鏗鍧在楚邦礱力董切礧榖器所以去榖殻也淮人謂之礱力董切江浙之間謂之礱盧東切編竹作圍内貯泥土狀如小磨仍以竹木排為密齒破榖不致損米就用拐木竅貫礱上掉軸以䋲懸檩上衆力運肘轉上聲之日可破榖四十餘斛北方謂之木礧石鑿者謂之石木礧礱礧字從石初本用石今竹木代者亦便又有礱磨上級甚薄可代榖礱亦不損米或人或畜轉之謂之礱磨復有畜力挽行大木輪軸以皮弦或大䋲繞輪兩周復交於礱之上級輪轉上聲則䋲轉䋲轉則輪亦随轉計輪轉一周則礱轉十五餘周比用人功既速且省案此條闕詩疑軼去輾女箭切通俗文曰石碢轢榖曰輾後魏書曰崔亮在雍州讀杜頴傳見其為八磨嘉其有濟時用因教民為輾今以礪石甃為圓槽周或數丈髙逾二尺中央作䑓植以簨軸上穿榦木貫以石碢有用前後二碢相逐前偹撞木不致相擊仍随𢃄攪杷畜力輓行循槽轉碾日可毇米三十餘斛近有法製輾槽法製用沙石芹泥與糯粥同膠和之以為圓槽候浥下以木棰緩築令實直至乾透可用轢米特易可加前數此又輾之巧便者詩云欲兼杵臼功制輾中去聲規式勞勩畜代人圓轉知勝力朝夕課量數公私饒粒食更令水輪轉上聲後世功巧極輥古本切輾世呼曰海青輾喻其速也但比常輾减去圓槽就碢榦栝以石輥輥徑可三尺長可五尺上置板檻随輾榦圓轉作竅下糓不計多寡旋碾旋收易於得米較之碢輾疾過數倍故比于鷙鳥之尤者人皆便之詩云制輾應嫌杵臼遲豈知輾制有遺機頓教粒食從今易别轉上聲礧車疾似飛颺與章切扇集韻云颺風飛也揚糓噐其制中置簨軸列穿四扇或六扇用薄板或糊竹為之復有立扇卧扇之别各帯掉軸或手轉足躡扇即随轉凢舂輾之際以糠米貯之髙檻檻底通作匾縫下㵼均細如簾即將機軸掉轉搧之糠粞既去乃得浄米又有舁之場圃間用之者謂之扇車凡蹂打麥禾等稼穰籺相襍亦須用此風㮼比之杴擲箕簸其功多倍梅聖俞詩云颺扇非團扇每来場圃見因風吹糠籺編竹破筠箭任從髙下手不為寒暄變去粗而得精持之莫言倦䃺莫卧切唐韵作磨磑五對切也䃺同説文云䃺石磑也世本曰公輸班作磑方言或謂之䃀錯碓切字説云䃺從石從靡䃺之而靡焉今皆作磨字既從石又從磨平聲之義特易曉也通俗文曰填音鎮䃺曰硐大公切磨床曰摘真易切今又謂主磨曰臍注磨曰眼轉磨曰榦承磨曰槃載磨曰床多用畜力輓行或借水輪或掘地架木下置鐏軸亦轉以畜力謂之旱水磨比之常磨特為省力凡磨上皆用漏斗盛麥下之眼中則利齒旋轉上聲破麥作麩然後收之篩羅乃得成麫世間餅餌自此始矣詩云斵圓山骨舊胚胎動静乾坤有自来利齒細噴常日雪旋平聲機深殷音隠不雲雷臨流湏借水輪轉上聲役畜豈勞人力推一自世間多餅食便知元是濟民材連磨連轉上聲磨也其制中置巨輪輪軸上貫架木下承鐏臼復於輪之周圍列遶八磨輪輻適與各磨木齒相間去聲一牛拽轉則八磨随輪輻俱轉用力少而見功多後魏書崔亮在雍州讀杜穎𫝊見其為八磨嘉其有濟時用劉景宣作磨竒巧特異䇿一牛之任轉八磨之重竊謂此雖並載前史然世罕有𫝊者今乃尋繹搜索度其可用述此制度既圖於前復叙於後庻来者傚之以廣食利嵇含八磨賦云外兄劉景宣作磨竒巧因賦之云方木矩峙圓質規旋下静似坤上轉似乾巨輪内建八部外連油榨取油具也用堅大四木各圍可五尺長可丈餘疊作卧枋於地其上作槽其下用厚板嵌作底槃槃上圓鑿小溝下通槽口以偹注油於器凢欲造油先用大鑊㸑炒芝麻既熟即用碓舂或輾碾令爛上甑蒸過理草為衣貯之圈内累積在槽横用枋桯相拶復竪挿長楔髙處舉碓或椎擊擗之極𦂳則油從槽出此横榨謂之卧槽立木為之者謂之立槽傍用擊楔或上用壓樑得油甚速今燕趙間創法有以鉄為炕面就接蒸釜㸑項乃傾芝麻於上執杴匀攪待熟入磨下之即爛比鑊炒及舂碾省力數倍南北農家嵗用既多尤宜則傚詩云巨材成榨床細溜刻槃口麻爛入重圈機械應心手取之亦多方脂膏竟誰有囬顧室中婦何嘗潤􅅾首農器圖譜十倉廪門倉廪皆蓄積之所古有定制重民食也次而囷京下而窖竇世所共作俱糓藏去聲類也然又各有巧要以從省便凡欲儲貯務儉徳者當取為法至於始終出納之用尤不可闕故以嘉量繼之云倉榖藏去聲也釋名曰倉藏也藏榖物也天文集曰廪星主倉史記天官書胃為天倉此名著於天象者禮月令曰孟冬令有司修囷倉周禮倉人掌粟入之藏此名著於公府者甫田詩曰乃求千斯倉管子曰倉廪實而知禮節此名著於民家者推而言之則知倉之類尚矣今國家偹儲蓄之所上有氣楼謂之敖房前有簷楹謂之明厦倉為總名盖其制如此夫農家貯榖之屋雖規模稍下其名亦同皆係累年蓄積所在内外材木露者悉宜灰泥塗飾以偹火災木又不蠧可為永法詩云實榖藏去聲曰倉制度一遵古積不厭斗升耗或容雀䑕常平名固佳相因義仍取揆諸創始心荒歉豈無補廪倉别名豐年詩曰豐年多黍多稌亦有髙廪萬億及秭注云廪所以藏粢盛之穗説文曰倉黄㐭而取之故謂之㐭或從广從禾今農家構為無壁厦屋以儲禾穗及穜稑之種即古之􅂒也唐韵云倉有屋曰廪倉其藏糓之總名而廩庾又有屋無屋之辨也詩云廪名天上星有象常昭垂在地為定制廣厦庇于斯上乃奉粢盛下以偹㓙饑黍稌及億秭重見豐年詩庾鄭詩箋云露積榖也集韵庾或作㢏倉無屋者詩曰曽孫之庾如坻如京又曰我庾維億盖謂庾積榖多也詩云露積以庾稱有象因自成初無經構功何同倉廪名詩人嘗比賦如坻復如京公私固儲蓄視此知豐盈囷邱倫切圓倉也禮月令曰修囷倉説文廪之圓者圓謂之囷方謂之京管子曰夷吾過市有新成囷京者吳志周瑜謁魯肅肅指其囷以與之西京襍記曰曹元理善筭囷之糓數類而言之則囷之名舊矣今貯榖圜􅖧泥塗其内草苫於上謂之露􅖧者即囷也詩云富國何如富在民鄉閭是處有髙囷只知不負英雄謁遇歉能傾一濟貧京倉之方者廣雅云字從广􅂒倉也又謂四起曰京今取其方而髙大之義以名倉曰京則其象也夫囷京有方圓之别北方髙亢就地植木編條作􅖧故圓即囷也南方墊濕離地嵌板作室故方即京也此囷京又有南北之宜庻識者辨之擇而用也詩云大云倉廪次囷京各貯粢粮取象成可是今人迷古制方圓未識有他名榖盅敕中切集韵云虚器也又謂之氣籠編竹作圍徑可一尺髙或二丈底足稍大易於竪立内置木撐丑孟切數層乃先列倉中毎間或五或六亦量積糓多少髙低大小而制之嘗見倉廪囷京等所貯米榖蒸濕結厚數尺謂之􅀈頭以致壓盫變黄漸成浥腐徃徃耗損元數公私坐致䧟害誠甚可惜今置此器使欎氣升通米得堅燥免蹈前弊實濟物之良法凡儲蓄之家不可闕也詩云虚中潔外丈餘身厠跡囷倉氣可伸要識有功能積久陳陳從此更相因窖古孝切藏榖穴也史記貨殖𫝊曰宣曲任氏秦之敗也豪傑皆争取金玉任氏獨窖倉粟楚漢相拒滎陽民不得耕米石至數萬而豪傑金玉盡歸任氏任氏以是起富嘗謂榖之所在民命是寄今藏置地中緩急可恃且風蟲水旱十年之内儉居五六安可不預偹㓙災夫穴地為窖小可數斛大至數百斛先投柴棘燒令其土焦燥然後周以糠穏貯粟於内五榖之中唯粟耐陳可歴逺年有於窖上栽樹大至合抱内若變浥樹必先驗驗謂葉必萎黄又𢷬别窖北地土厚皆宜作此江淮髙峻土厚處或宜倣之既無風雨雀䑕之耗又無水火盗賊之虞雖箧笥之珍府藏之富未可埒也詩云作窖良有法貯榖期不腐焦磪擬陶爐穣籺親壌土厚瘞防水潦深藏勝倉庾却嗟金玉家無能偹饑苦竇似窖月令曰穿竇窖鄭注云穿竇窖者入地橢曰竇方曰窖䟽云橢者似方非方似圓非圓釋文云橢他果切謂狭而長今人下掘或旁穿出土轉上聲于他處内實以粟復以草墢封塞他人莫辨即謂竇也盖小口而大腹竇小孔穴也故名竇詩云穿竇以貯榖逺謀輸老農小口傍能通虚腹寛有容深儲慮竊發迷藏加宻封一朝催租急肯許防饑㓙升十合量也前漢志云以子榖秬黍中者千二百實其龠以井水凖其槩二龠為合十合為升説文云升從斗象形唐韵云升成也斗十升量也前漢志云十升為斗斗者聚升之量也説文云斗象形有柄唐韵云俗作斗天文集曰斗星仰則天下斗斛不平覆則嵗稔案此條不别繫以詩者總在槩斛一條以唐敬括嘉量賦括之槩功代切平斛斗噐説文云槩杚斗斛從木既聲杚古沒切平也漢書云以井水凖其槩也唐書列女李畬母𫝊畬為監察御史得米量之三斛而贏問於吏曰御史本不槩是也集韵杚亦音槩亦書作槩古有豆區烏侯切釜鍾庾秉之量左傳曰四升為豆四豆為區四區為釜十釜為鍾又二釜半為庾十六斛為秉皆古量之名也今唯以升斗斛為凖最號簡要盖出納之司易㑹計也斛十斗量也前漢志云十斗為斛斛者角斗平多少之量也廣雅云斛謂之鼓方斛謂之角周禮曰㮚氏為量改煎金錫則不耗不耗然後權之權之然後凖之凖之然後量之其銘曰時文思索允臻其極嘉量既成以觀四國永啟厥後兹物維則時文思索言是文徳之君思求索為民立法而作量漢書五量之法用銅方尺而圓其外旁有庣止彫切焉師古曰庣不滿之處也上為斛下為斗上謂仰斛下為覆斛之底受一斗也左耳為升右耳為合龠夫量者躍於龠合於合登於升聚於斗角於斛職在太倉大司農掌之今夫農家所得榖數凡輸納於官販鬻于市積貯於家多則斛少則斗零則升又必槩以平之貧富皆不可闕者敬括嘉量賦云作之嘉量其義惟深嘉者以善為節量者用平其心窮㣲于子榖之數酌憲于黄鍾之音盖取諸象爰範于金亦既成止其儀可覿堅外可程虛中受益功格於衡鏡實同乎珪錫以分多少寕患乎不均以立信仁抑行之無斁然羙其方能立矩卑莫可踰出入㒺恡包含式孚狥公滅私乃為而勿有納新吐故亦用當其無理將神而共契跡與道而相符且噐守乎謙人惟厥操人非噐㒺主噐非人奚𨗳不謹則詐偽生端無方則羡溢為耗職是司者胡顔相冐由此言旃不其至然外乎則槩􅝁前漢律歴志作庣乃旁穿既因物以進退亦與時而懋遷施于政而四方仰則毗乎理而百代猶𫝊誠可美而可尚願斯焉而取焉異乎大小區分髙卑竒偶始増撮而就合卒聚升而成斗斛又斗之所積榖皆槩其所受随求而或進或退順動而何先何後洎乎職興都尉計起𢎞羊洽平糴而作典布均輸而有方常平由是以實大國因之用強豈比天有斗而酒漿不挹山有谷而牛馬空量然而當春秋分之期為晝夜至之時于以較矣于以用之實萬人之所欲敢望聞于有司農書卷十六
