body:
  text: 農書卷八元王禎撰百榖譜三蓏屬甜𤓰黄𤓰附廣雅曰土芝𤓰也其子瓤力㸃切爾雅曰瓞瓝以其綿綿而生也為種不一而其用有二供果為果𤓰供菜為菜𤓰菜𤓰則胡𤓰越𤓰是也附見于後果𤓰品類甚多不可枚舉以狀得名者則有龍肝虎掌兎頭狸首蜜筩之稱以色得名者則有烏𤓰黄㼐白㼐小青大斑之别然其味不出乎甘香故不復具録廣志以𤓰之所出惟遼東廬江燉煌者為勝然𤓰州之大𤓰陽城之御𤓰蜀之溫食永嘉之襄𤓰第未可以優劣論是又不必拘以土地所宜顧種藝之法何如耳愚嘗聞甘肅等處其甜𤓰大如枕割去其皮其肉與瓤甘勝糖蜜所割膚皮暴之稍乾柔韌賫之中土以為贈送甘而有味盖風土所宜其實大而味甘非他種可比又嘗見浙間一種謂之隂𤓰宜於隂地種之秋熟色黄如金膚皮稍厚蔵之可歴冬春食之如新凡種常𤓰以二月上旬為上時三月上旬為中時四月上旬為下時至五六月止可種蔵𤓰耳秋𤓰小實中醤蔵食種宜陽地暖則易長杜詩所謂陽坡可種𤓰者是也法先以水浄淘𤓰子以鹽拌之鹽和則不能死坑深可五寸口大如斗納𤓰子四箇大豆三箇以熟糞土覆之𤓰生數葉搯去豆𤓰性弱以豆為之起土𤓰生搯豆汁出更成良潤行陣宜整兩行㣲相近兩行外相逺中通歩道近以就糞逺以通行𤓰生比至初花三四次鋤之勿令生草草生脅𤓰無子蔓長宜用乾柴枝就地引之則子多摘時引手摘取之勿令踏𤓰蔓及翻覆之踏則𤓰爛翻則𤓰死宜慎之又區種法兩歩為一區口大如盆以土壅其畔區中躡令平内𤓰子大豆各十枚如前法糞覆之十月種者大雪時㙲雪坑上春草生𤓰亦生矣又法加甕蓄水埋於科中央口與地平常令水滿四畔種𤓰則不畏旱亦良法也凡收子宜用本母子𤓰截去兩頭者取中央子本母子𤓰生數葉便結子子亦早熟中軰蔓長二三尺方生子後者蔓足方生子用兩頭子者𤓰曲而細短而喎𤓰生蟻用羊骨置其旁引棄之此種藝之法也一枚可以濟人之飢渇五畝可以足家之衣食一種胡𤓰色黄即黄𤓰也亦有青白者又越𤓰色白即白𤓰皆菜𤓰也種同前𤓰法黄𤓰則以樹枝引蔓延縁而生白𤓰則就地延蔓生子而已畏旱宜常灌溉之生熟皆可食烹飪隨宜實夏秋之嘉蔬也或以醬蔵為䜴鹽漬為霜𤓰則又兼蔬蓏之用矣西𤓰種出西域故名西𤓰一説契丹破回紇得此種歸按五代史作蕭翰破回紇得種歸盖翰為遼将與此説合以牛糞覆棚而種味甘北方種者甚多以供嵗計今南方江淮閩浙間亦效種比北方者差小味頗減爾種同前𤓰法區行差稀多種者垡頭上漫擲勞平苖出之後根下壅作土盆欲𤓰大者歩㽞一科科止㽞一𤓰餘蔓花皆掐去則實大如三斗栲栳矣味寒解酒毒其子曝乾取仁薦茶亦得有雲頭者最佳故古人有一片冷沉潭底月六彎斜捲隴頭雲之句其宿酲未解病暍未蘓得此而食世俗所謂醍醐灌頂甘露洒心正謂此也冬𤓰冬𤓰以其冬熟也廣志謂之蔬􅀈按􅀈亦作音及神仙本草曰一名水芝一名白𤓰生嵩髙平澤今在處園圃皆蒔之其實生苖蔓下大者如斗而更長皮厚而有毛初生正青緑經霜則白如塗粉其中肉及子亦白故謂之白𤓰齊民要術曰種冬𤓰法傍墻隂地作區圓二尺深五寸以熟糞及土相和正月晦日種二月三月亦可既生以柴木倚墻令其縁上旱則澆之八月斷其稍減其實一本但㽞五六枚多留則不成也十月霜足收之早收則爛冬𤓰越𤓰十月區種如種𤓰法冬則推雪着區上為堆潤澤肥好乃勝春種又曰削去皮子於芥子醬中或美豆醤中藏之佳荆楚嵗時記曰七月採𤓰犀以為面脂本草圖經曰犀瓣也瓤亦堪作澡豆按蔬菓中𤓰之為種至夥也獨此𤓰耐久經霜乃熟又可蔵之彌年不壊今人亦用為蜜煎其犀用為茶果則兼蔬果之用矣瓠説文曰瓠一曰壺皆瓠屬也陸農師曰項短大腹曰瓠細而合上曰匏似匏而肥圓者曰壺然有甘苦二種甘者供食苦惟充器耳按毛詩云匏有苦葉者苦匏也注云不可食特可佩以渡水而已盖以作壺濟水也又曰幡幡匏葉采之烹之此甘匏也故曰甘瓠纍之其為物也蔓生而齒瓣夏熟而秋枯爾雅曰瓠犀瓣豳風曰九月斷壺亦其義也本草云味甘冷無毒利水道止消渴惟苦者有毒不宜食凡種如𤓰法蔓長則作架引之汜勝之書云先掘地作坑方圓深各三尺圍蠶沙和土令匀無蠶沙牛糞亦可著坑中作踐令堅平以水沃之水盡下子十顆復以前糞覆之既生長二尺餘便搃聚十莖一處以布纒之五寸許以泥封䕶俟纒處合為一莖擇彊者㽞之餘悉掐去引蔓結子子外之條亦掐去之凡留子初生二三子不佳取第四五者區㽞三子即足用餘旋食之又四時類要云坑深四五尺坑底填油麻菉豆䕸及爛草糞各一重上着糞土以子十顆種之待成揀彊者四莖每兩莖相貼纒之待其相著各除一頭又取所㽞兩莖如前法相貼活後惟㽞一頭著子則揀㽞兩子如此則一斗變為盛一石矣莊子魏惠王大瓠之種種之實五石其亦以此法歟夫瓠之為物也纍然而生食之無窮最為佳蔬烹飪無不宜者種如其法則其實斗石大之為甕盎小之為瓢杓膚瓤可以喂猪犀瓣可以灌燭咸無棄材濟世之功大矣可不知所種哉芋芋一名土芝齊人曰莒蜀呼為蹲鴟在在有之蜀漢為最顔師古注蹲鴟芋也葉如荷長而不圓莖㣲紫乾之亦中食根白亦有紫者其大如斗食之味甘旁生子甚夥㧞之則連茹而起宜蒸食亦中為羮臛東坡所謂玉糁羮者此也煑法宜先用鹽㣲糁之則不糢糊廣志所載凡十四種其大如斗魁如杵􅞊者名君子芋子少而魁大者為談善芋子多而魁亦大者為百果芋畆收百斛又有車轂鋸子青邉旁巨四種惟多子耳他如縁枝生而色黄者則有雞子芋蔓生而根如鵝鴨卵者則有博士芋餘悉下品不復具録凡此諸芋皆可乾腊亦可蔵至夏食之種宜軟白沙地近水為善芋畏旱故宜近水區深可三尺許區行欲寛寛則過風芋本欲深深則根大率二尺一根漸漸加土壅之春宜種秋宜壅立夏種不生卵秋失壅而瘦不肥霜降捩其葉使收液以美其實則芋愈大而愈肥汜勝之書云區方深各三尺下實豆萁尺有五寸以糞著萁上深如其萁一區種五本復以糞土上覆之旁四本中一本漸漸培之芋成萁爛皆長三尺此亦良法今之農不然但於淺土秧子俟苖成移就區種故其利亦薄其可不知此法按列仙傳云酒客為梁使烝民益種芋三年當大飢卒如其言而梁民得不死卓氏曰岷山之下沃野有蹲鴟至死不飢且夫五榖之種或豐或歉天時使然芋則繫之人力若種藝有法培壅及時無不獲利以之度凶年濟饑饉助榖食之不及故次於稼穡之後蔓菁蔓菁一名蕪菁爾雅曰葑説文蕪菁也即詩采葑采菲之葑也河東太原所出者根極大他皆不及又出吐谷中故北地多種此葉似菘而根不同四時仍有春食苗夏食心謂之薹子秋可為葅冬根宜蒸食菜中之最有益者常食通中益氣令人肥健諸葛亮所止必令兵士種蔓菁取其纔出甲可生啖一也葉舒可煑食二也乆居隨以滋長三也棄去不惜四也回則易㝷而採之五也冬有根可斸食六也故川蜀人呼為諸葛菜其子九蒸九曝可𢷬為粉塗帛者資之亦可為油陕西唯食此油燃燈甚眀能變蒜髪齊民要術云種不求多唯湏良地新糞壊垣墻乃佳糞若以灰令厚一寸灰多則燥不生也耕地欲熟宜加糞往覆匀盖七月初種之畆子三升漫撒而勞種不用濕濕則葉焦既生不鋤九月末收葉六月種者根大而葉蠧七月末種者葉美而根小惟七月初者根葉俱得仍留根取子十月中犂麄畤拾取耕出者不則留多而英不茂實不繁也擬賣者純種九英九英根大而味不美春夏用畦種如葵法剪訖復種取根者用大小麥底六月中種十月将凍取出之一畆可得數車早出者根細漢桓帝詔曰横水為災五榖不登令所傷郡國皆種蔓菁以助民食然此可以度凶年救飢饉以一種而兼數美為利甚博杜工部有云冬菁飯之半豈虚語哉蘿蔔爾雅曰葖蘆萉音菔一名莱菔又名雹突今俗呼蘿蔔在在有之北方者極脆食之無柤中原有迭秤者其質白其味辛甘尤宜生啖能觧麫毒子可入藥下氣消榖四時皆可種然不如末伏秋初為善破甲以後便可供食老圃云蘿蔔一種而四名春曰破地錐夏曰夏生秋曰蘿蔔冬曰土酥故黄山谷云金城土酥淨如練以其潔也種同蔓菁法每子一升可種二十畦畦可長一丈二尺濶四尺擇地宜生耕地宜熟地生則不蠧耕熟則草少凡種先用熟糞匀布畦内仍用火糞和之令匀撒種之俟苖出成葉視稀稠去留之其去之者亦可供食以踈為良踈則根大而美宻則反是尺地約可二三窠厚加培壅其利自倍然收種子宜用九月十月收者擇其良去鬚𢃄葉移栽之澆灌得所至春二月收子可偹時種宿根在地不經移種者為斜子種之疥而不肥按蔬茹之中惟蔓菁與蘿葡可廣種成功速而為利倍然蔓菁北方多獲其利而南方罕有之蘆菔南北所通美者生熟皆可食醃藏腊豉以助時饌凶年亦可濟飢功用甚廣不可具述其可不知所種哉茄子茄子一名落蘇隋煬帝改茄子為崑崙𤓰一種出自新羅國者其色㣲紫蔕長味甘今之紫茄黄山谷所謂紫膨脝者是也今在在有之又有青茄白茄白者為勝亦名銀茄有一種白者謂之渤海茄又一種白花青色稍匾一種白而匾者皆謂之畨茄甘脆不澁生熟可食又一種水茄其形稍長甘而多水可以止渇此數種中土頗多南方罕得亦宜種之凡收種於九月黄熟時摘取擘開水淘洗去浮者曝乾至春二月種如葵法常澆潤之旱即乾死俟著四五葉髙可五寸許帯土移栽之凡栽根株宜築實不實則死區中不宜有浮土恐雨泥濺葉則萎而難茂栽時得晴為宜早晚澆灌之鋤治培壅勤者務焉務本新書云茄開花斟酌窠數削去枝葉再長晚茄老圃云種茄二十科糞壅得所可供一人食昔張浮休頌之云身纍百贅頸附千疣採之不勤茹之頗柔善於形容者也茄視他菜為最耐乆供膳之餘糟醃䜴腊無不宜者須廣種之薑薑説文曰禦濕之菜史記云種千畦薑與千户侯等言其利博也凡種宜用沙地熟耕或用鍬深掘為善三月畦種之畦闊一歩長短任地横作壟深可五七寸壟中一尺一科以土上覆厚三寸許仍以糞培之益以蠶糞尤佳芽出生草勤鋤之壟中漸漸加土培壅一法用蓆草覆之勿令他草生使薑芽自迸出六月用枝葉作棚以防日曝薑性不耐寒熱故爾或只用帶葉樹枝扦挿四月竹箄爬開根土取薑母貨之不虧元本秋社前新芽頓長分採之即紫薑芽色㣲紫故名最宜糟食亦可代蔬劉屏山詩云恰似匀粧指柔尖帯淺紅似之矣白露後則𢃄絲漸老為老薑味極辛可以和烹飪盖愈老而愈辣者也晒乾則為乾薑醫師資之今北方用之頗廣齊民要術曰中國多寒土不宜薑所種僅可擬藥物耳九月中掘出置屋中宜作窖榖稈合埋之今南方地暖不用窖至小雪前以不經霜為上㧞去土就日曬過用篛篰盛貯架起下用火薫三日夜令濕氣出盡却掩篰口仍髙架起下用火薫令常暖勿令凍損至春擇其芽之大者如前法種之為效速而利益倍飬羊種薑子利相當按薑辛而不葷去邪辟羶蔬茹中之拂士也日用不可闕然本草云能觧穢溫中多食則少志傷心氣其亦夫子不撤食不多食之義云爾蓮藕蓮荷實也藕荷根也爾雅云其實蓮其根藕蓮子八月九月中收蓮子堅黒者於瓦上磨蓮子頭令薄取墐土作熟泥封之如三指大長二寸使蔕頭平重磨處尖鋭泥乾時擲於池中重頭沈下自然周正皮薄易生不時即出其不磨者皮既堅厚倉卒不能生也種藕法春初掘藕根莭頭著魚池泥中種之當年即有蓮花蓮子可磨為飯輕身益氣令人彊健藕止渴散血服食之不可闕者芡芡一名雞頭一名雁頭山谷詩云剖蚌煑鴻頭是也葉大如荷皺而有刺花開向日花下結實故菱寒而芡暖其莖􅀢之嫩者名為􅀢人採以為菜茹八月採擘破取子散著池中自生雞頭作粉食之甚妙河北沿溏濼居人採之舂去皮搗為粉蒸煠作餅可以代粮龔遂守渤海勸民秋冬益蓄菱芡盖謂其能充饑也芰芰一名菱菱䔖也世俗謂之菱角葉浮水上花開背日實有二種一種四角一種兩角又有青紫之殊秋則子黒熟時收取散在池中自生生食性冷煑熟為佳蒸作粉蜜和食之尤美江淮及山東曝其實以為米可以當糧猶以橡為資也百榖譜四蔬屬葵葵説文曰菜也有紫莖白莖二種葉之小者為鴨脚葵種出少室山中今南北皆有之又一種花有五色者名曰蜀葵不可食爾雅所謂菺茙葵是也菺音肩按葵為百菜之主備四時之饌本豐而耐旱味甘而無毒供食之餘可為葅腊枯枿之遺可為榜簇子若根則能療疾咸無棄材誠蔬茹之上品民生之資助也春宜畦種冬宜撒種然夏秋皆可種也詩曰七月烹葵此種之早者俗呼為秋葵遲者為冬葵崔寔曰正月可種葵芥又曰六月六日種葵中伏以後可種冬葵時有先後為之在人齊民要術云凡種時必燥曝葵子子雖經嵗不浥然濕種則瘠而不肥地不厭良薄即糞之鋤不厭數旱則灌之春多風旱畦種為上畦長兩歩廣半之大則水難均深掘以熟糞對土匀覆其上厚一寸許耙耬之令熟足蹋使堅平用水澆潤水盡下子又以糞土上覆深如其下葵出三葉然後澆之澆用晨夕日中則止凡畦種之物悉如之不復條列旱種者必秋耕十月末地将凍散子勞之一畆可子三升須人足蹋之乃佳踏則菜肥正月末種者亦如之五月初更種春者既老種以續之兼留取子春者熟不均於此時附地剪去春葵冷根上枿生者柔軟亦可食乾之即中為榜簇掐秋葉必留五六葉不掐則莖孤留葉則科大凡掐葵必露解諺云觸露不掐葵八月半剪去留其歧歧多者則去地一二寸獨莖者半之枿生肥嫩至收時髙可過膝莖葉皆美窠雖不髙菜實倍多不剪反是此種藝之法也宿根在地春生嫩葉亦可採食前金人以韮蓼汁併雞肉和食謂之冷羮最為上饌古詩腰鎌刈葵藿葵之用鎌其来尚矣然莖葉叢茂時方可刈嫩惟採擷之耳杜詩云刈葵莫放手放手傷葵根盖傷根則不生矣格物之精尤不可不審昔魯相公儀休食葵而美㧞而棄之盖不與民争利雖然仁矣而未博也茍上之人教之以種藝之法勿奪其時使之家種百畦其利自倍是與民共之尚何利之爭哉芥芥字從卝從介取其氣之辛辣而有剛介之性故曰芥古人所謂菜重芥薑者其以是與為種不一葉似菘而有毛味極辣者青芥也莖葉俱紫為紫芥作虀食之美又有白芥子粗大於他芥色白如粱米味極辛美宜入藥利九竅眀耳目通中芥極多心芥之嫩者為芥藍極脆東坡云芥藍如菌蕈脆美牙頬響芸薹芥不甚香經冬根不死患腰脚疾者不宜食比他芥不為甚佳齊民要術云七月半種之地欲糞熟與蕪菁同畆用子一升既生亦不鋤之十月收蕪菁訖收蜀芥又云種芥子及蜀芥取子者皆二月好雨澤時種二物性不耐寒經冬則死故須春種之五月熟而收子今江南農家所種如種葵法俟成苖必移栽之早者七月半後種遲者八月半種厚加培壅草即鋤之旱即灌之冬芥經春長心中為醎淡二爼亦任為鹽菜楊誠齋詩云蟹眼嫩湯㣲熟了鵝兒新酒未醒初此言芥虀之美也如欲收子者即不摘心盖南北寒暖異宜故種略不同而其用則一夫芥之為物心多而耐乆味辣而性溫可搗取汁以供庖饌尤烈烈可愛足以觧沉酣消煩滯亦蔬茹中之介然者是宜受辛於虀臼而見媚於盤飱也可不種哉芸薹芥子種同蜀芥每畆用子四升足霜始收味辛不甚香經冬以草覆之不死至春復可供食性凉破血先患腰脚者不宜多食然其子入藥功用頗多亦不可闕也菌子菌子説文曰蕈也爾雅曰中馗菌率皆朽株濕氣蒸浥而生中原呼菌為磨菇又為莪又一種謂之天花桑樹上生者呼為桑莪施之素食最佳雖南北異名而其用則一今江南山中松下生者名為松滑誠齋云傘不如笠釘勝笠盖愈嫩愈美風味過於他蕈又有紫蕈白蕈二種尤佳朱文公詩云誰将紫芝苗種此槎上土便學商山翁風餐謝肥羜言紫蕈之美也又詩云聞説閬風苑瓊田産玉芝不收雲露表烹㵸詎相宜此言白蕈之美也深山中多有之菌之種不一名亦如之野蕈如赤菰黄耳皆可食然辨之不精多能毒人雖甘無益也不復具載種菌法四時類要云三月種菌子取爛楮木及葉於地埋之常以泔澆灌之三兩日即生又法畦中下爛糞取楮可長六七寸截斷槌碎如種菜法匀布土盖日澆潤之令長濕隨生隨食可供常饌今山中種香蕈亦如此法但取向隂地擇其所宜木楓楮栲等樹伐倒用斧碎斫成坎以土覆壓之經年樹朽以蕈碎剉匀布坎内以蒿葉及土覆之時用泔澆灌越數時則以槌棒擊樹謂之驚蕈雨雪之餘天氣蒸暖則蕈生矣雖踰年而獲利利則甚博採訖遺種在内来嵗仍發復相地之宜易嵗代種新採趁生煑食香美曝乾則為乾香蕈今深山窮谷之民以此代耕殆天茁此品以遺其利也蒜蒜説文曰葷菜也又曰菜之美者張騫使西域得大蒜種歸種之今京口有蒜山多出蒜蒜有大小之異大者曰葫即今大蒜每頭六七瓣收條中子種者一年為獨蒜再種之則皆六七瓣矣小曰蒜葉似細蔥而澁頭小如蕎即今山蒜爾雅曰蒿山蒜也二物氣味相似能興陽伐性故道家者流多忌食之性熱而有小毒氣極葷然以入臭肉掩臭氣夏月食之觧暑辟瘴氣北方食餅肉不可無此家有其種多者收一二頃以供嵗計今在在種之齊民要術云宜熟軟地耕三遍八月種至来年四五月收凡種每半尺地一根鋤治令浄時加糞壅菜長一尺許漸漸撥開土要見白則本大不爾止益葉耳或結葉亦佳嫩薹可為蔬又一種澤蒜可以香食吴人調鼎率多用此根觧葅更勝蔥韮此物易滋蔓隨斸隨合熟時採之漫散種之按諸菜之葷者惟宜採鮮食之經日則不美惟蒜雖久而味不變可以資生可以致逺施之臭腐則化為神竒用之鼎爼則可代醯醬旅途尤為有功炎風瘴雨之所不能加食餲腊毒之所不能害此亦食經之上品日用之多助者也其可不廣種之哉薤薤爾雅曰鴻薈本出魯山平澤今處處有之葉似韭而闊本豐而白深本草云雖辛不葷五蔵學道人長餌之以其能溫中通神安魂魄續筋力爾故杜甫詩曰束比青芻色圓齊玉筋頭衰年闗膈冷味煖併無憂或取其白芼酒尤佳樂天詩云酥煖薤白酒又内則云切蔥薤實諸醯以柔之碎録云豚脂用蔥膏用薤然則酒也醯也膏也無施不可種法與韭同二三月種凡三四支一本或七八支諺云蔥三薤四盖支多則本茂率一尺一本葉生則鋤薤性多穢荒即瘦瘠薤子三月葉青便出之未青而出者肉未滿令薤瘦漢渤海太守龔遂勸農家種薤百本民獲其利到于今稱之又一種麥原中自生者俗呼為天薤即野薤也葉比家薤而小味亦辛即爾雅所載葝山薤也亦可供食但不多有耳夫薤韭屬也支本益茂而功用過之生則氣辛熟則甘美種之不蠧食之有益故學道者之所資而老人之所宜食也醫家目之以為菜之珍不亦宜乎蔥蔥説文曰葷菜也其色蔥蔥淺緑色也故名凡四種山蔥胡蔥漢蔥凍蔥爾雅曰茖即山蔥宜入藥胡蔥亦然食惟用漢蔥凍蔥耳漢蔥木蔥也漢蔥葉大而香薄冬即葉枯宜供虀食凍蔥葉細而益香又宜過冬比漢為勝或名大官蔥陸放翁詩芼􅃵僣用大官蔥凡種法收蔥子必薄布隂乾勿令浥欝蔥性熱浥則不出矣擬種之地必須春種菉豆五月掩殺之比至七月耕數遍一畆用子四升炒榖拌和種之蔥子性澁不以榖和下不均不炒榖則草穢生兩耬重耩竅瓠下之以批契上撇下屑繫腰曵之七月納種至四月始鋤鋤遍仍剪剪與平地髙留則無葉深剪則傷根剪欲旦起避熱時良地三剪薄地再剪八月止不剪則不茂剪過則根跳八月不止則蔥無袍而損白十二月盡掃去枯葉枯􅂁不去枯􅂁春葉不茂二月三月出移種之收子者别留之又法先以子畦種移栽却作溝壟糞而壅俱成大蔥皆髙尺許白亦如之宿根在地来春併得作種移栽之昔龔遂治渤海勸農口種蔥一畦非惟足供烹飪種多亦可資富梁吕僧珍其先販蔥為業及貴其兄子棄業求官珍不許曰汝等自有常分不可妄求可速歸蔥肆爾可謂知所本矣按蔥之為物中通外直本茂而葉香雖八珍之竒五味之異非此莫能達其美是猶商梅之調鼎吴橙之芼鮮也其可以他菜而例視之哉百榖譜五蔬屬韭韭叢生豐本葉青細而長近根處白韭久也圖經云一種而久故謂之韭圃人種蒔一嵗而三四割之其根不傷至冬培壅之先春而復生信乎一種而久者也諺云韭者懶人菜以其不須嵗種也詩七月獻羔祭韭周禮醢人其實韭葅記王制庶人春薦韭以卵庾郎一食二十七種杜詩夜雨剪春韭樂天詩秋韭花初白皆是物也齊民要術教人收韭子如蔥子法若市上買韭子宜試之以銅鐺盛水於火上㣲煑韭子須臾芽生者好芽不生者是裛欝矣治畦下水糞覆悉與葵同然畦欲極深以韭根性上跳故須深也二月七月種種法以升盞合地為處布子於圍内以韭性内生不向外長圍種令科成也薅令常浄至正月上辛日掃去畦中陳葉以鐡耙耬起下水加熟糞韭髙三寸便剪之一嵗之中不過五剪毎一剪一加糞收子者一剪即留之若旱種者但無畦與水耳杷糞則同四時類要云九月收韭子種韭第一番割棄之主人勿食事類全書韭畦用雞糞尤佳故本草以韭為草鍾乳凡近城郭園圃之家可種三十餘畦一月可割兩次所易之物足供家費積而計之一嵗可割十次秋後又可採韭花以供蔬饌之用謂之長生韭至冬移根蔵於地屋䕃中培以馬糞煖而即長髙可尺許不見風日其葉黄嫩謂之韭黄比常韭易利數倍北方甚珍之又有就舊畦内冬月以馬糞覆之於迎陽處隨畦以薥黍籬障之用遮北風至春其芽早出長可三二寸則割而易之以為嘗新韭城府士庶之家造為饌食互相邀請以為嘉味剪而復生久而不乏故謂之長生實蔬菜中易而多利食而溫補貴賤之家不可闕也葫荽按齊民要術及本草俱作胡荽葫荽漢張騫自西域得其種莖葉皆細可同邪蒿食及作羮良幷人呼為香荽即此也本草云味辛溫殺蟲去毒事類全書云葫荽必用月晦日晚下種齊民要術云葫荽宜黒輭青沙良地三遍熟耕春種者用秋耕地開春凍觧地起有潤澤時急接澤種之踈宻正好六七月種先曬燥欲種時布子於堅地一升子與一掬濕土和之以脚搓子破作兩段以磚瓦搓之亦得以木礱礱之亦得於旦暮潤時以耬耩作壟以手撒子即勞令平菜生二三寸鋤去穊者供食十月足霜乃收之取子者仍留根間㧞令稀穊即不生以草覆上覆者得供生食又不凍此菜旱種非連雨不生所以不同春月要求濕麥底地亦得種止須急耕調熟雖名秋種㑹在六月連雨生則根彊科大七月種者雨多亦得雨少則生不盡但根細科小不同耳六月種者若留冬食則以草覆之得竟冬食其春種小小供食者自可畦種一如葵法挼子沃水生芽種之晝用箔盖夜則去之晝不盖熱不生夜不去蟲耬之凡種菜子難生者皆水沃令芽生無不即生矣又有一種名石葫荽亦名鵝不食草載在本草止堪入藥却非此種葫荽其子搗細香而㣲辛食饌中多作香料以助其味於蔬菜子葉皆可用生熟皆可食甚有益於世也菠薐菠薐莖㣲紫葉圓而長下多花闕劉禹錫嘉話録云菠薐本西國中種自頗陵國将其子来今呼其名語頗訛耳農桑輯要云菠薐作畦下種如蘿蔔法春正月二月皆可種逐旋食用秋社後二十日種於畦内以乾馬糞培之以避霜雪十月内以水沃之以備冬食又宜以香油炒食尤美春月出薹嫩而又佳至春暮莖葉老時用沸湯掠過曬乾以備園枯時食用甚佳實四時可用之菜也萵苣苣數種有苦苣有白苣有紫苣皆可食葉有白毛為白苣紫色為紫苣苦味為苦苣即野苣也又名褊苣今人家常食者白苣江外嶺南呉人無白苣但種野苣以供厨饌生食之所謂萵苣也農桑輯要云萵苣作畦下種如菠薐法但得生芽先用水浸種一日於濕地上布襯置子於上以盆碗合之候芽漸出則種春正月二月種之可為常食秋社前一二日種者霜降後可為醃菜如欲出種正月二月種之九十日收其莖嫩如指大髙可踰尺去皮蔬食又可糟藏謂之萵笋生食又謂之生菜四時不可闕者同蒿同蒿者葉緑而細莖稍白味甘脆春二月種可為常食秋社前十日種可為秋菜如欲出種春菜食不盡者可為子俱是畦種其葉又可湯泡以配茶茗實菜中之有異味者人莧莧亦多種有馬齒莧䑕齒莧及糠莧此野莧也若夫赤莧白莧紫莧紅莧人莧又有五色莧皆可蔬茹人白二莧亦可入藥易言莧陸夬夬謂其柔脆也列子言寜生程程生馬馬生人馬者馬莧馬藍草之類人者人参人莧之類也農桑輯要云人莧但五月種之園枯則食今人有三四月種者如欲出種留食不盡者八月收子本草云不可以莧菜與鱉同食則生鱉癥試以鱉甲如豆片大者以莧菜封裹之置於土坑以土盖之一宿盡變成鱉也然病者頗忌常人食之作蔬作羮皆可用也藍菜務本新書云二月畦種苖髙剥葉食之剥而復生刀割則不長加火煮之以水淘浸或炒爁或伴食或包餕饀或捲餅生食頗有辛味五月園枯此菜獨茂故又曰主園菜至冬月以草覆其根四月中結子可收作末比芥末根又生葉可食一年陜西多食此菜莙薘莙薘作畦下種如蘿蔔法春二月種之夏四月移栽園枯則食如欲出子留食不盡者地凍時出於暖處收藏来年春透可栽收種或作蔬或作羮或作菜乾無不可也蘭香香菜附齊民要術云蘭香羅勒也或謂避石勒名故改今名三月中候􅀥葉生乃種蘭香早種者天寒不生徙費子耳治畦下水一同葵法及水散子訖水盡簁熟糞僅得盖子便止厚則不生弱苖故也晝日箔盖夜即去之晝日不用見日夜須受露氣生即去箔常令足水六月連雨㧞栽之搯心栽泥中亦活作葅及乾者九月收作乾者天晴時薄地刈取布地曝之乾乃挼取末瓮中盛枝根懸者裛爛又有雀糞及塵土之患取子者十月收自餘雜香菜不列者種法悉與此同博物志燒馬蹄羊角成灰春散著濕地羅勒乃生事類全書云香菜常以洗魚水澆之則香而茂溝泥水米泔亦佳夏秋採葉可作菜食或切葉以芼諸菜或於素食麫粉之類皆可覆食以助香味也荏蓼爾雅云蘇桂荏蘇荏類故名桂荏薔虞蓼虞蓼澤蓼本草云荏狀如蘇白色其子碾之雜米作糜甚肥美下氣補益東人呼為䔡以其似蘇字但除禾旁故也齊民要術云三月可種荏蓼崔寔又云正月可種荏子白者良黄者不美蓼宜水畦種荏則隨宜園畔漫擲嵗嵗自生矣荏子壓取油可以煑餅荏油色緑可愛其氣香美煑餅亞於麻油而勝麻子脂膏荏油不可以為澤焦人髪碾為􅃵臛美於麻子逺矣又可以為燭為帛煎油彌佳荏油性淳塗帛勝香油蓼作葅者長二寸則剪絹袋盛沉於醤瓮中又長更翦常得嫩者若待秋子成而落莖死堅硬葉又枯焦取子者候實成速收之性易凋零晚則落盡五月六月中蓼可以為虀食二菜實菜中之用廣而多益者芹􅛧芹爾雅曰楚葵也本草曰水斳音芹一名水英又曰芹有两種秋芹取根色白赤芹取莖葉並堪作葅及生菜味甘杜子美詩所謂香芹碧澗羮是也又有一種馬芹爾雅曰茭牛蘄註曰似芹可食菜也而葉細鋭一名馬芹與水芹盖同類而異出耳􅛧其禹反一音渠詩義疏曰苦菜也青州謂之芑農桑輯要曰江東呼為苦蕒愚按陸士衡釋芑菜曰莖青白色摘其葉白汁出脆可生食亦可蒸為茹則是今人所謂石􅛧者似苦蕒耳味不苦亦有野生者謂之苦菜者非齊民要術云芹􅛧並收根畦種之常令足水尤忌潘孚袁反米汁泔及鹹水澆之即死性並易繁茂而甜脆勝野生者白􅛧尤宜糞嵗可常收陶隠居曰二三月芹作英時可作葅及熟爚式灼弋灼二反食之爾雅馬芹子入藥用齊民要術云馬芹子可以調蒜薤按古詩中泮水采芹新田采芑即今之芹􅛧是矣昔有野人食芹而美欲獻之君今以􅛧配之其味俱甜脆生熟可食此二蔬之美誠不可乏者其野生者無種蒔之勞而供噉食之用尤為可嘉不然何以見詠於詩人哉甘露子甘露子蔬屬也苖長四五寸許根如累珠味甘而脆故名甘露也亦有野甘露凡種宜於園圃近隂地春時種之用麥糠為糞地宜沾潤為佳至秋乃收生熟皆可食可用蜜或醬漬之作䜴亦得今詳其功用固蔬中之不可遺者務本新書曰白地内區種暑月以麥糠盖之承露滋茂甘露之名豈非由是而得歟然其味之美亦誠足稱其名矣農書卷八
