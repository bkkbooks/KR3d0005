body:
  text: 農書卷九元王禎撰百榖譜六果屬梨梨謂之快果本草圖經曰乳梨又名雪梨出宣城皮厚而肉實鵝梨出近京州郡及北都皮薄而漿多味差短於乳梨香則過之其餘有水梨消梨紫煤梨赤梨甘棠梨禦兒梨之類又註云消梨可療病青梨茅梨並不任用桑梨惟堪煮食廣志曰洛陽北邙張公夏梨海内惟有一樹恒山真定山陽鉅野梁國睢陽齊國臨菑鉅鹿並出梨上黨楟徒丁切梨小而味甘廣都梨鉅野豪梨重六斤新豐箭谷梨宏農京兆右扶風郡界諸谷中梨率多供御陽城秋梨夏梨愚按今魏府多産鵝梨北地有香水梨最為上品梨樹亦可種亦可挿齊民要術云種法梨熟時全埋之經年至春地釋分栽之多著熟糞及水至冬葉落附地刈殺之以炭火燒頭二年即結子若穭生及種而不栽者則着子遲每梨有十許子惟二子生梨餘皆生杜挿者彌疾挿法用棠杜棠梨大而細理杜次之桑梨大惡石榴上挿得者為上梨雖活十収得一二也杜如臂以上者任挿當先種杜經年後挿之主客俱下亦得然俱下者杜死則不生杜樹大者挿五枝小者或三或二梨葉微動為上時將欲開莩為下時先作麻紉尼真切纒十數匝以鋸截杜令去地五六寸不纒恐插時皮披留杜髙者梨枝繁茂遇大風則披其髙留杜者梨樹早成然宜作蒿蕈盛杜以土築之令沒風時以籠盛梨則免披耳斜㩥音尖竹為籖刺皮木之際令深一寸許折取其美梨枝陽中者隂中枝則實少長五六寸亦斜㩥之令過心大小長短與籖等以刀微􅞑烏更切梨枝斜㩥之際剥去黒皮勿令傷青皮青皮傷即死㧞去竹籖即挿梨至􅞑處木邊向木皮還近皮插訖以綿幕杜頭封熟泥於上以土培覆令梨枝僅得出頭以土壅四畔當梨上沃水水盡以土覆之務令堅固百不失一梨枝甚脆培土時宜慎之勿令掌撥掌撥則折其十字破杜者十不収一所以然者木裂皮開虗燥故也梨既生杜旁有葉輙去之又曰凡插梨園中者用旁枝庭前者中心旁枝樹下易収中心上聳不妨用根蔕小枝樹形可喜五年方結子鳩脚老枝三年即結子而樹醜又曰凡逺道取梨枝者下根即燒三四寸亦可行數百里猶生蔵梨法初霜後即収霜多即不得經夏於屋下掘作深廕坑底無令潤濕収梨置中不須覆盖便得經夏摘時必令好接勿令損傷又曰凡醋梨易水熟煑則甜美而不損人也按魏文帝詔曰真定郡梨大如拳甘若蜜脆若菱可以觧煩熱参之神農經中療病之功亦為不少西路産梨用刀去皮切作瓣子以火焙乾謂之梨花甞充貢獻實為佳果上可供於嵗貢下可奉於盤珍張敷稱為百果之宗豈不信乎桃桃典術曰五木之精也厭伏邪氣制百鬼爾雅曰旄冬桃榹息移切桃山桃郭璞註曰旄桃子冬熟山桃實如桃而不觧核廣志曰桃有冬桃夏白桃秋白桃襄桃其桃之美也有秋赤桃本草曰桃梟在樹不落殺百鬼鄴中記曰石虎苑中有句鼻桃重二斤西京雜記曰榹桃緗核桃霜桃言霜下可食金城桃胡桃出西域甘美可食綺蔕桃含桃紫文桃本草衍義曰桃品亦多京畿有油桃小於衆桃有赤斑㸃而光如塗油山中一種正是月令中桃始華者但花多子少不堪㗖惟堪取仁文選謂山桃發紅蕚者是也太原有金桃色深黄西京有崑崙桃肉深紫紅色此二種尤甘又餅子桃如今之香餅子齊民要術曰種桃法桃熟時合肉全埋糞地中直置凡地則不生生亦不茂桃性早實三嵗便結子故不求栽也至春既生移栽實地若仍處糞中則實小而苦栽法以鍬合土掘移之桃性易種難栽若離本土率多死矣又法桃熟時於牆南陽中煖處深寛為坑選取好桃數十枚擘破核即内牛糞中頭向上取好爛糞和土厚覆之令厚尺餘至春桃始動時徐徐撥去糞土皆應生芽合取核種之萬不失一其餘以熟糞糞之則益桃味桃性皮急四年以上冝以刀竪􅟮其皮不􅟮皮急即死七八年便老老則子細十年即死是以宜嵗嵗常種之又法候其子細便附土斫去枿上生者復為少桃酢且故切法桃爛自零者収取内之瓮中以物葢口七日後既爛漉去皮核宻封閉之三七日酢成香美可食夫蟠桃仙果固世所罕見而天台之山武陵之洞徃徃有窺其境者所種皆曼衍况於凡世安可少此果哉其花可觀其實可食而其樹且易成也且其為種早熟者謂之絡絲白晚熟者謂之過鴈紅夏秋咸有食之不匱誠仙凡之佳果也李李有數種爾雅曰休無實李痤徂和切椄子㨗切慮李駁赤李註曰休無實李一名趙李痤椄慮李即今之麥李細實有溝道與麥同熟故名駁赤李其實赤者是也廣志曰有黄建李青皮李馬肝李赤陵李有餻李肥黏似糕有柰李離核李似柰有劈李熟必劈破有經李一名老李數年即枯有杏李味小酢似杏有黄扁李有夏李冬李冬十一月熟有春季李冬花春實愚嘗見北方一種謂之御黄其重踰兩肉厚核小食之甘香而美李中之嘉種也江南建寧有一種名均亭李紫色極肥大味甘如蜜南方之李此實為最齊民要術曰李性耐久樹得三十年老雖枝枯子亦不細嫁李法正月一日或十五日以磚石着李樹歧中令實繁又臘月中以杖微打歧間正月晦日復打亦足子又法以煑寒食醴酪火掭着樹間亦良桃李樹下並欲鋤去草穢而不用耕墾耕則肥而無實樹下犁撥亦死桃李率方兩歩一根太概連隂則子細而味亦不佳作白李法用夏李色黄便摘取於鹽中挼之鹽入汁出然後合鹽晒令萎手捻之令扁復晒極扁乃止曝使乾飲酒時以湯澆之漉着蜜中可以薦酒夫李之與桃同氣類也韓詩外傳有云春則擷其花夏則取其隂秋則噉其實以桃李並言其有益於人多矣昔王安豐家有好李鑚核而賣貴其種也和嶠家有好李計核而責錢獲其利也當其避暑山亭納凉池閣沉之清泉飣之氷俎其風味又豈減於桃杏哉梅杏梅與杏二果也爾雅曰梅柟也柟奴含反俗作楠西京雜記曰侯梅朱梅同心梅紫蔕梅燕脂梅麗枝梅本草圖經曰梅實生漢川山谷今襄漢川蜀江湖淮嶺皆有之杏類梅者味酢且故反類桃者味甘廣志曰滎陽有白杏鄴中有赤杏有黄杏有柰杏西京雜記曰文杏材有文彩蓬萊杏東海都尉于台獻一株花雜五色云是仙人所食杏也本草曰黄而圓者名金杏相傳云種出濟南郡之分流山彼人謂之漢帝杏今近都多傳之熟最早其扁而青黄者名木杏味酢不及金杏愚嘗見北方有一種杏甚佳赤色大而稍扁肉厚謂之肉杏又謂之金剛拳言其大也齊民要術曰栽種法與桃李同作白梅法梅子酸核初成時摘取夜以鹽汁漬之晝則日曝凡作十宿十浸十曝則成矣調鼎和虀所在多入也又作烏梅法亦以梅子核初成時摘取籠盛於突上熏之即成矣烏梅入藥不任調食食經曰蜀中蔵梅法取梅極大者剥皮隂乾勿令得風經二宿去鹽汁内蜜中月許更易蜜經年如新作烏梅令不蠧法濃燒穰以湯沃之取汁以梅投中使澤乃出蒸之作杏李麨法麨充小反糗也杏李熟時多取爛者盆中研之生布絞取濃汁塗盆中日曝乾以手磨刮取之可和水為漿及和米麨所入任意也按書説命曰若作和羮爾惟鹽梅梅之貴也尚矣杏又其次也曹孟徳一指梅林而觧三軍之渇虗言猶若此况即其境者乎嵩髙山記亦云牛山多杏自中國䘮亂百姓饑餓皆資此為命人人充飽由是而觀梅杏之功殆伯仲耳百榖譜七果屬柰林擒柰與林擒二果而相類也廣志曰柰有白青赤三種張掖有白柰酒泉有赤柰西方例多柰家以為脯數十百斛以為蓄積如收蔵􅀥栗西京雜記曰紫柰緑柰别有素柰朱柰陶隠居云江東有之而北國最豐皆作脯有林檎相似而小林檎一名來禽洪玉父曰以味甘來衆禽也本草圖經曰木似柰實比柰差圓亦有甘酢二種甘者早熟而味脆美酢者差晚須熟爛堪噉齊民要術曰柰林擒不種但栽之種之雖生而味不佳取栽如壓桑法此果根不浮薉栽故難求是以須􅐦也又法於樹旁數尺許掘坑洩其根頭則栽易生矣凡樹栽者皆然栽如桃李法林檎樹以正月二月中翻斧斑駁椎之則饒子作柰脯法柰熟時中破曝乾即成矣作柰麨法拾爛柰内瓮中盆合口勿令蠅入六七日許當大爛以酒淹痛拌之令如粥状下水更拌以籮漉之去皮子良久澄清㵼去汁置布於上以灰飲汁如作米粉法汁盡刀􅟮大如梳掌於日中曝乾研作末便成甘酸得所芳香非常作林檎麨法林檎赤熟時劈破去心子蔕日晒令乾或磨或𢷬下細絹篩麄者更磨𢷬以細盡為限以方寸七投於椀中即成美漿不去蔕則太苦合子則不度夏留心則太酸若乾噉者以林檎麨一升和米麨一升味正調適按本草陳士良云大長者為柰圓者為林檎夏熟小者味澁為梣昨今反青皮木秋熟若是則柰之與林擒形相似也氣味相近也然柰性寒林檎性温則有不同者至若二果可以薦新可以作脯食而不乏亦未嘗不同焉誦潘安仁二柰丹白之賦觀王羲之來禽青李之帖豈非古人之所重哉􅀥􅀥類最多爾雅曰壺􅀥邊要棗櫅子􅀆切白􅀥樲酸􅀥遵羊􅀥楊徹齊􅀥洗大􅀥煑填􅀥蹶泄苦􅀥晳無實棗還味棯而諸反􅀥郭璞註江東呼棗大而銳上者為壺壺猶瓠也要細􅀥今謂之鹿盧棗櫅即今棗子白熟樲樹小實酢遵實小而圓紫黒色俗呼羊矢􅀥洗今河東猗氏縣出大􅀥如雞卵蹶泄子味苦晳不著子還味短味也楊徹煑未詳廣志曰河東安邑􅀥東郡榖城紫􅀥長二寸西王母􅀥大如李核三月熟河東汲郡􅀥一名墟棗東海蒸棗洛陽夏白􅀥安平信都大􅀥梁國夫人棗大白􅀥一名蹙咨小核多肥三星棗駢白􅀥灌􅀥又有狗牙雞心牛頭羊矢獮猴細腰之名又有氐􅀥木棗﨑亷􅀥桂棗夕􅀥西京雜記曰有弱枝棗玉門􅀥棠􅀥青花􅀥赤心􅀥潘岳閒居賦有周文弱枝之棗丹棗青州有樂氏棗豐肌細核多膏肥美世𫝊樂毅從燕齎来所種也齊民要術曰旱澇之地不任耕稼者歴落種􅀥則任矣棗性燥故也又曰常選好味者留栽之候􅀥葉始生而移之􅀥性硬故生晚栽早者堅垎生遲也三歩一樹行欲相當地不耕也欲令牛馬踐履令净􅀥性堅彊不宜苖稼若耕荒穢則蟲生湏浄地堅饒實故宜踐也正月一日日出時反斧斑駁椎之名曰嫁􅀥不椎則花而無實斫則子萎而落候大蠶入簇以杖擊其枝間振去狂花不打花繁不實不成全赤即収収法日日撼而落之為上半赤而収者肉味充滿乾則色黄而皮皺将赤味亦不佳全赤乆不収則皮硬復有烏鳥之耗曬棗法先治地令淨有草萊令􅀥臭布棗於箔上以扒兵㧞反無齒杷聚而復散之一日中二十度乃佳夜仍不聚得霜露氣速成隂雨時乃聚而苫盖之五六日别擇取紅軟者上髙厨而暴之厨上者已乾雖厚一尺亦不壊去胮溥江切爛者胮者水不乾留之徒汚棗其未乾者曬暴如法食經曰作乾􅀥法新菰蔣露於庭以􅀥著上厚三寸復以新蔣覆之凡三日三夜撤覆露之畢日曝取乾納屋中率一石以酒一升潄着器中宻泥之經數年不敗本草衍義曰青州􅀥去皮核焙乾為􅀥圏尤為奇果􅀥油法鄭元曰𢷬棗實和以塗繒上燥而形似油也􅀥脯法切棗曝之乾如脯也作酸􅀥麨法多收紅軟者箔上日曝令乾大釡中煑之水僅自淹一沸即漉出盆研之生布絞取濃汁塗盤上或盆中盛暑日曝使乾漸以手摩挲取為末以方寸七投一椀中甜酸味足即成美漿逺行用和米麨饑渇俱當也夫棗咏於詩記於禮不特為可薦之果用以入藥調和胃氣其功不少今南北皆有之然南􅀥堅燥不如北􅀥肥美生於青晉絳州者尤佳太史公稱安邑千樹􅀥其人與千户侯等則棗之為利顧不溥哉栗榛附栗陸璣疏曰五方皆有之周秦吳揚特饒惟濮陽及范陽生者味美他方不及草木圖經曰兖州宣州者最勝果中栗最有益治腰脚之疾愚嘗見燕山栗小而味最甘蜀本圖經曰板栗佳栗二木皆大又有芧栗似栗而細衍義曰有一種栗頂圓末尖謂之旋栗榛亦栗屬實最小詩曰樹之榛栗是也本草曰生遼東山谷樹髙丈許子如小栗中土亦有鄭元曰闗中鄜芳扶切坊甚多齊民要術曰栗種而不栽栽者雖生尋死栗初熟出殻即於屋裡埋着濕土中埋必湏深勿令凍徹若路逺者以韋囊盛之停三日以上及見風日則不復生矣至春二月芽生出而種之既生數年不用掌近凡新栽樹皆不宜掌近栗尤甚三年内每到十月常須草裹至二月乃觧不裹則凍死種榛法與栗同本草圖經曰栗欲乾莫如曝欲生莫如潤食經曰蔵乾栗法取穰灰淋汁漬栗取出日中曬令栗肉焦燥可至後年春夏藏生栗法著器中曬細沙令燥以盆覆之至後年二月生芽而不生蟲按史記秦饑應侯請發五苑之棗栗由是觀之本草所謂栗厚腸胃補腎氣令人耐饑殆非虛語史記又言燕秦千樹栗其人與千户侯等栗之利誠不減於棗矣本草言遼東榛子軍行食之當粮榛之功亦可亞於栗也桑椹嘗考之史傳三國魏武軍乏食乃得乾椹以濟饑魏志武祖軍無粮新鄭長楊沛進乾椹後遷沛為鄴令後漢王莽時天下大荒有蔡順採椹赤黒别盛之赤眉賊見而問之順曰黒者奉母赤者自食盖桑椹乾濕皆可食可以救儉昔聞之故老云前金之末饑歉民多餓莩至夏初青黄未接其桑椹巳熟民皆食椹獲活者不可勝計凡植桑多者椹黒時悉宜振落箔上曝乾平時可當果食歉嵗可禦饑餓雖世之珍異果食未可比之適用之要故備録之柿杮多種本草云黄杮出近京州郡紅杮南北通有之朱柿出華山似紅柿而皮薄更甘珍諸杮食之皆善而益人衍義曰杮有着盖杮於蔕下别生一重有牛心杮蒸餅杮皆以形得名華州有一等朱杮比諸品中最小深紅色有一種塔杮亦大於諸杮又有椑柿生江淮南似杮而青黒潘岳閑居賦曰梁侯烏椑之杮是也齊民要術曰杮有小者栽之無小者取之於㮕而兖反紅藍棗紅似杮􅀥根上挿之如挿梨法食經曰以灰汁澡杮再三度乾令汁絶着器中經十日可食本草衍義云生則澁以温水飬之需澁去可食又有烘杮器内盛之待其紅軟其澁自去味甘如蜜圖經曰乾杮火乾者謂之火杮出查州越州愚按作杮乾法生杮撛去厚皮捻扁向日曝乾内於瓮中待杮霜俱出可食甚凉其霜收之甘凉如蜜可醫口瘡及咽喉熱積若論杮之性日乾者濕火乾者熱生者彌冷一果而不同如此本草稱其善而益人又何以異哉荔枝荔枝一名丹荔嶺南記云此木以荔枝為名者以其結實時枝弱而蔕牢不可摘取以刀斧劙去其枝故以為名生嶺南巴中泉福漳興嘉蜀渝涪及二廣州郡皆有之其品閩為最蜀川次之嶺南為下樹形團團如帷盖葉如冬青華如橘朶如蒲萄核如枇杷殻如紅繒膜如紫綃肉白如肪花於二三月實於五六月其根浮必須加糞土以培之性不耐寒最難培植纔經繁霜枝葉枯死遇春二三月再發新葉初種五六年冬月覆盖之以䕶霜雪種之四五十年始開花結實其木堅固有經四百餘年猶能結實者曬荔法採下即用竹籬㫰曬經數日色變核乾用火焙之以核十分乾硬為度収蔵用竹籠箬葉裹之可以致逺成朶曬乾者名為荔錦取其肉生以蜜熬作煎嚼之如糖霜然名為荔煎北方無此種自漢南粤以備方物於是荔枝始通中國漢唐時命驛馳貢洛陽取於嶺南長安來於巴蜀雖曰鮮獻傳置之速然腐爛之餘色香味之存者無㡬盖此果若離本枝一日色變二日香變三日味變四五日外香色味盡皆去矣非惟中原不嘗生荔之味江浙之間亦罕焉今閩中嵗貢亦曬乾者宋蔡君謨作荔枝譜載之名色詳矣茲不復録昔李直方第果實或薦荔枝曰當舉之首魏文帝詔羣臣曰南方果之珍異者有荔枝龍眼焉今閩中荔枝初著花時商人計林斷之以立劵一嵗之出不知㡬千萬億水浮陸轉販鬻南北外而西夏新羅日本流求大食之屬莫不愛好重利以酬之夫以一木之實生於海濵巖險之逺而能名徹上京外被四夷重於當世是亦有足貴者故附之榖譜是亦卓然為南北果品之竒者也龍眼龍眼花與荔枝同開樹亦如荔枝但枝葉稍小殻青黄色形如彈丸核如木梡子而不堅肉白而帶漿其甘如蜜熟於八月白露後方可採摘一朶五六十顆作一穂荔枝過即龍眼熟故謂荔枝奴福州興化泉州有之比荔枝特罕木性畏寒北方亦無此種今充嵗貢焉曬龍眼法採下用梅鹵浸一宿取出曬乾用火焙之以核乾硬為度如荔枝法収藏之成朶乾者名龍眼錦東坡詩云龍眼與荔枝異出同父祖端如柑與橘未易相可否夫龍眼與荔枝齊名味亦甚美登盤爼而充嵗貢稱於魏文之詔詠於左思之賦又豈凡果之可比哉故附榖譜荔枝之後百榖譜八果屬橄㰖餘甘子附橄㰖生嶺南及閩廣州郡性畏寒江浙難種樹大數圍實長寸許形如訶子而無稜瓣其子先生者向下後生者漸髙有野生者樹峻不可梯縁但刻其根方寸許内鹽於其中一夕子皆自落蜜藏極甜生噉及煑食之並消酒觧諸毒誤食鯸鮐魚肝迷悶欲死者飲其汁立觧以其木作楫撥著魚皆浮出物之相畏有如此者此果南人尤重之可作茶果其味苦酸而澁食乆味方回甘故昔人名為諫果然消酒觧毒亦果中之有益於人者餘甘惟泉州有之乃深山窮谷自生之物非人家所種其樹稍髙其子梭形又如梅實兩頭鋭始嚼味酸澁飲水乃甘九月採比之橄㰖酷相似以蜜藏之亦佳劉彦冲詩云炎方橄㰖佳餘甘豈苖裔風姿雖小殊氣韻乃酷似騂顔澁吻餘髣髴清甘至侯門收寸長粉骨成珍劑誠哉言也石榴石榴一名若榴一名丹若舊不著所出州土陸璣云張騫使西域得塗林安石榴種今人稱為海榴以産海外也中原河隂者最佳榴實有二種其子一紅如瑪碯一白如水晶荘布詩云鸚鵡啄殘紅豆顆此言紅榴也皮日休詩云嚼破水晶千萬粒此言白榴也然花不出於紅黄味不出乎甘酸爾甘者可餐多食亦損肺道家謂之三尸酒云三尸得此果則醉酸者皮堪入藥染墨亦良夏則花實秋後則摘以充盤果多則可鬻蔵榴之法取其實者有稜角者用熱湯微泡置之新甆瓶中久而而不損若圓者則不可留留亦壊爛榴房比他果最為多子北齊髙延宗納妃妃母宋氏薦石榴盖取其房中多子之義北人以榴子作汁加蜜為飲漿以代盃茗甘酸之味亦可取焉木𤓰木𤓰爾雅曰楙注曰實如小𤓰酢可食詩曰投我以木𤓰毛公曰楙也疏義曰楙葉似柰實如小㼓𤓰上黄似著粉山隂蘭亭尤多西京亦有之而宣城者為佳宣城人種蒔最謹始實則簇紙花薄其上夜露日曝漸而變紅花又如生本州以充上貢故有天下宣城花木𤓰之稱木𤓰種子及栽皆得壓枝亦生栽種與桃李同法秋社前後移栽至次年率多結實勝春栽者凡食啖勿誤取和圓子其色様外形真似木𤓰但木𤓰皮薄㣲赤黄香甘酸而不澁向裏子頭尖一面方若和圓子則㣲黄蔕麄子小圓味澁微酸傷人氣不可不辨此物入肝益筋與血入藥絶有功病腰腎脚膝者服食不宜闕以蜜漬食亦甚益人蜜漬之法先切去皮煑令熟著水中㧞去酸味却以蜜熬成煎藏之又宜去子爛蒸擂作泥入蜜與薑作煎飲用冬月尤美夫木𤓰得木之正故入筋試以鈆霜塗之則失酸味受金之制也五行相剋之義於此盖亦可驗此果既能愈疾又宜飲啖兼用有益誠可貴焉銀杏銀杏之得名以其實之白一名鴨脚取其葉之似其木多歴年嵗其大或至連抱可作棟梁夫樹有雌雄之異種時湏合種之臨池而種照影成實春分前後移栽先掘深坑水攪成稀泥然後下栽子掘取時連土封用草包或麻繩纒束則不致碎破土封其子至秋而熟初收時小兒不宜食食則昏霍惟炮煑作顆食為美以澣油甚良顆如緑李積而腐之惟取其核即銀杏也梅聖俞詩云北人見鴨脚南人見胡桃識内不識外疑若橡栗韜正謂是耳今人以其多而易得徃徃賤之然絳囊入貢玉椀薦酒其初名價亦豈减於蒲萄安石榴哉橘柑附橘生南山川谷及江浙荆襄皆有之木髙可丈許刺出於莖間夏初生白花至冬實黄禹貢曰厥包橘柚錫貢注云大曰柚小曰橘然自是兩種郭璞云柚似橙而大於橘北地無此種故橘逾淮而成枳地氣使然也橘有數種有緑橘有紅橘有蜜橘有金橘而洞庭橘為勝今充土貢種植之法種子及栽皆可枳樹截接或掇栽尤易成但宜於肥地種之冬收實後須以火糞培壅則明年花實俱茂乾旱時以米泔灌溉則實不損落惟皮與核堪入藥用皮之陳者最良又宜作食料其肉味甘酸食之多痰不益人以蜜煎之為煎則佳食貨志云蜀漢江陵千樹橘其人與千户侯等夫橘南方之珍果味則可口皮核愈疾近升盤俎逺備方物而種植之獲利又倍焉其利世益人故非可與他果同日語也柑甘也橘之甘者也莖葉無異於橘但無刺為異耳種植與橘同法生江漢唐鄧間而泥山者名乳柑地不彌一里所其柑大倍常皮薄味珍脉不粘瓣食不留滓一顆之核纔一二間有全無者然又有生枝柑有郛柑有海紅柑有衢柑雖品不同而温台之柑最良嵗充土貢焉江浙之間種之甚廣利亦殊博昔李衡於武陵龍陽洲上種柑千樹謂其子曰吾州里有千頭木奴不責汝衣食嵗上一疋絹亦足用矣及柑成嵗輸絹數千疋故史游急就篇註云木奴干無凶年盖言可以市易榖帛也柑之大者擘破氣如霜霧故老杜云破柑霜落𤓰是也庾肩吾云王逸為賦取對荔枝張衡製辭用連石蜜足使萍實非甜蒲萄猶䬼其貴重如此橙橙似橘樹而有刺葉大而形圓大於橘皮甚香厚而皺其瓤味酸不堪食以瓤洗去酸汁細刀和蜜鹽煎成煎食之亦佳唐鄧間多有之江南尤甚北地亦無此種今人取橙皮合湯香味殊美栽植無異於橘而其香則橘又不得比焉劉彦冲詩云橙橘甘酸各有能南包橘柚不同升果中亦抱遺才歎有客攀條氣拂膺昔人橙詩云吳姬三日手猶香故橙之為果可以熏袖可以芼鮮可以漬蜜真佳實也樝子樝梨之小者爾雅云樝似梨而酢澁陶隠居注本草木𤓰條乃云木𤓰利筋脛又有榠樝大而黄可進酒去痰樝子澁斷痢禮記云柤梨曰攅之鄭公不識樝乃云是梨之不臧者然淮南子曰樹柤梨橘食之則美嗅之則香荘子曰柤梨橘柚皆可於口者盖古人以樝列於名果今人罕食之耳西川唐鄧多種此亦足濟用然樝味比之梨與木𤓰雖為稍劣而以之入蜜作湯煎則香美過之亦可珍也農書卷九
