body:
  text: 農書卷十五元王禎撰農器圖譜七蓑笠門傳曰首戴苧蒲身服襏襫此謂之農今田家蓑笠以莎以篛為之者是也後之禦雨蔽日等具由此增其巧便為田農必用之物是可尚也復以牧笛葛燈籠等附之愈賁飾於圖譜矣蓑雨衣無羊詩曰何蓑何笠毛註曰蓑所以備雨笠所以禦暑唐韻云蓑草名可為雨衣又名襏北末切襫施隻切説文云秦謂之草方歴切又婢赤切爾雅曰薃侯莎蓑衣以莎草為之故音同莎又名薛六韜農器篇曰蓑薛簦笠今總謂之蓑雨具中最為輕便王荆公詩云采采霜露下披披煙雨中蒲茅以為衣䄈褐相與同勿妬市門人綺紈被奴僮當慙邉城戍擐甲徂春冬笠戴具也古以臺皮為笠詩所謂臺笠緇撮今之為笠編竹作殻𠂻以籜篛或大或小皆頂隆而口圓可芘雨蔽日以為蓑之配也王荆公詩云耕有春雨濡耘有秋陽暴二物應時需九州同我欲孰能生少慕得此云自足君思周伯陽所願豈華轂屝草屨也左傳曰共其資糧屝屨説文曰屝草屨也孔疏云屝屨俱是在足之物善惡異名耳喪服傳曰疏屨者粗薊之屝也是屝用草為之注云草履者履屨通言耳今云屝屨相形以曉人也詩云蒯菅柔韌自編成不換仍呼不借名長向緑蓑衣底着雨行偏稱去聲野夫情屨麻履也傳云屨滿戸外蓋古人上堂則遺屨於外此常屨也今農人春夏則屝秋冬則屨從省便也方言屝粗屨也徐兖之郊謂之屝自闗而西謂之屨中有木者謂之複舄自闗而東謂之複履其卑者謂之䩩音婉子按揚今本作其庳者謂之靴下禪謂之鞮今韋鞮也絲作者謂之履麻作者謂之不借粗者謂之􅂒按揚子南楚江沔之間總謂之麄西南梁益之國或謂之􅂒東北朝鮮冽水之間謂之䩕音卬或謂之䋀下瓦切一音畫徐土邳沂之間大粗謂之䩕角今漆履有齒者皆屨之别名也詩云織麻成屨足相容嗜好殊非蠟屐同未擬平生着㡬緉且憑踐履有深功橇輸芮切泥行具也史記禹乘四載泥行乘橇孟康曰橇形如箕摘行泥上東坡秧馬歌叙云橇豈秧馬之類歟以康言考之非秧馬類也嘗聞向時河水退灘淤地農人欲就泥裂漫撒麥種奈泥深恐没故制木板為履前頭及兩邉髙起如箕中綴毛繩前後繫足底板既濶則舉歩不䧟今海陵人泥行及刈過葦泊中皆用之切詳本字從木從毛即其義也詩云大禹平水土泥行即乘橇後人相地宜彷像資種藝材寛一屐餘跡認䨇鳬蛻豈知千載後翻免足胝弊覆殻一名鶴翅一名背蓬篾竹編如龜殻𠂻以籜箬覆於人背繩繫肩下耘薅之際以禦畏日兼作雨具下有卷口可通風氣又分雨溜適當盛暑田夫得此以免曝烈之苦亦一壺千金之比也詩云田頭赫日曝膚赬微智能令庇廕清竹股合編深可覆篛胎層布薄還輕製成龜背兼龜兆俯作鶴軀如鶴行南北薅鋤人得此隨身長若片雲生通簪貫髪虛簪也一名氣筒以鹿角稍尖作之如無鹿角以竹木代之或大翎筒亦可長可三寸餘筒之周圍横穿小竅數處使俱相通故曰通簪田夫田婦暑日之下折腰俛首氣騰汗出其髪髻蒸鬰得貫此簪一二以通風氣自然爽快夫物雖微末而有利人之效甚可愛也詩云汗隨低首沛如淋散髻斜横得此簪散字上聲晉書王儉作散髪髻斜横簪氷筋玲瓏清吹去聲入月痕依約墨雲深孤標不作附炎態虛腹寜無利物心微眇棄餘能適用何殊弊帚直千金臂篝篝古侯切籠笿也狀如魚笱篾竹編之又呼為臂籠江淮之間農夫耘苖或刈禾穿臂於内以帣居願切衣袖猶北俗芟刈草木以皮為袖套皆農家所必用者詩云筠篝編織作中虛穿臂農夫䕶若膚不似舞姬華宴上巧籠衣袖絡珍珠牧笛牧牛者所吹早暮招來群牧猶牧馬者鳴笳也嘗於村野間聞之則知時和嵗豐寓於聲也每見模為圖畫詠為歌詩實古今太平之風物也王荆公詩云緑草無端倪牛羊在平地芊綿杳靄間落日一横吹迢遥送晚響誕謾寫真意豈比賣餳夫吹簫販童稚葛燈籠南史宋武祖微時躬耕於丹徒及受命耨耜之具頗有存者皆命藏之以示子孫及孝武帝大明中壞所居隂室起玉燭殿與群臣觀之牀頭有障壁挂葛燈籠侍臣盛稱武帝素儉之徳帝曰田舎翁得此足矣今農家襲用以憑暮夜提携徃來照視有古之遺風焉詩云田家破厚夜膏火固常然匪加覆䕶功莫禦長風前瞻彼蘝蔓葛體質相纒綿物兮用有宜所貴求天全采采施以豉切谷姿篝燈手親編順彼自然性非把栁桮棬貪我㧞擢思結爾繼晷縁持之或逺適處也或中懸所要效實用照暗憑周旋緬懷宋武事儉徳垂千年施之田舎翁朴俗非求妍火城爛紅紗賦分何獨偏農器圖譜八蓧蕢門蓧蕢皆古盛榖器也論語謂荷蕢荷蓧今以名篇遵古制也由是類而書之然榖物别入聲精粗之異等故器用隨細大之有差方俗稱呼分彼此之名室家用舎備盈虛之數既貯儲之多便復簸蹂之同資今總收録庻不乏用云蓧徒吊切字從草從條取其象也即今之盛榖種器語曰遇丈人以杖荷蓧盖蓧器之小者可杖荷之既農隱所用必為盛榖器也包氏曰蓧竹器考其字體非從竹若謂竹器非也説文曰耘器稽之書傳錢鎛鋤耨皆刄為之謂蓧為耘器亦非也當與蕢同類皆盛榖器但有大小之差故因辯之以袪世惑南方盛稻種用簞以竹為之北方藏粟種用簍多以草木之條編之蓧蓋是此類一案蓧蕢皆盛榖器故併作一詩繫在蕢條之下蕢草器從草貴聲論語有荷蕢而過孔氏之門者古文作臾象形盛榖器集韻作籄字從竹舉土籠也語云譬如為山未成一簣書云功虧一簣俱從竹注云土籠今上文從草以草為之即盛榖器也詩云伊昔丈人軰荷蓧與荷蕢蓧蕢雖若殊知皆古農器視彼隱者流避世復避地為兹身口謀寜同聖人意寥寥千載後猶能覩餘制因物想遺風憮然發三喟案此蓧蕢二條原本誤列於蓧蕢門小引之前謹改正筐竹器之方者詩注云筐篚屬可以行幣帛及盛物三禮圖曰大筐以竹受五斛以盛米致饋於聘賔小筐以竹受五升以盛米又曰筐以盛熬榖詩曰采采卷耳不盈頃音傾筐又曰女執懿筐爰求柔桑筐之制其來已久今用於農家者多矣案筐筥亦一類故亦併作一詩繫於筥一條之下筥亦作􅀢竹器之圓者注曰筥圓而長但可實物而已三禮圖曰筥受五升盛饔餼之米致於賔館良耜詩曰載筐及筥左傳筐筥錡釜之器字説云筐筥一器也特方圎之異云耳江沔之間謂之籅音餘趙岱之間謂之䈱兮攷切淇衛之間謂之牛筐小者南楚謂之簍音縷自闗而西秦晉之間謂之箄方氏切筥其通語也詩云古今制器同方圓曰筐筥是用采蘋蘩于以盛稷黍修誠薦王公居貧侑尊俎物兮茍適用雅素吾所與畚音本土籠力董切也左傳樂喜陳畚梮注云畚簣籠集韻作晉書王猛少貧賤嘗鬻畚為事説文畚􅀈音瓶屬又蒲器也所以盛種杜林以為竹筥揚雄以為蒲器然南方以蒲竹北方用荆栁或負土或盛物通用器也詩云江南貴蒲竹漢北取荆栁致用與蕢均聯名惟臿偶不辭編織勞常為貧賤有他日興土工嗟哉須汝負􅖧徒本切集韻云盛榖器或作囤又蘧也北方以荆栁或蒿卉制成圓様南方判竹編草或用籧篨空洞作圍各用貯榖南北通呼曰􅖧兼篅􅦽而言也然􅖧多露置可用貯糧篅􅦽在室可用盛種皆農家收榖所先具者故併次之篅市專切説文云判竹圓以盛榖􅖧類也篅或作圌此􅦽與篅皆􅖧之别名但大小有差亦蓧蕢之舊制不可遺也􅦽章恕切集韻云􅦽筐盛種器盖連底小􅖧便於移用􅦽作􅀢又作􅀈詩云農家屯糧元有具以􅖧為名湏用竹體圓制宻塗塈茨正則能容傾則覆南北由來無異名露置當陽安用屋樂嵗先為歉嵗防一年耕有三年蓄但令積粟比任生未必指囷無魯肅先民作器兼細巨下逮人間篅與􅦽篅與􅦽小毋慮酌量出納宜朝暮日計不足月有餘徙頓東西無定處家存戸置多貯儲貴可無憂賤無蠧便當封作富民侯彼腹纔飢吾腹飫國不空虚倉廩助嵗嵗豐年歌黍稌榖匣盛榖方木層匣也用板四葉相嵌而方大小不等髙下隨宜下作底足疊累數層上作頂蓋貯榖於内置穴於下可以啟閉用之多在屋室亦可露置以瓦覆之比之囤京可以移頓較之篅􅦽可以增减既無雀䑕之耗又無濕浥之虞實榖藏之佳者詩云取制異囷京初憑梓匠成虚中元有受正立乃無傾封鐍開還瀉方層貯毎盈家家能置此亦號小常平籮匠竹為之上圎下方挈米榖器量可一斛方言籮所以注斛陳魏宋楚之間謂之䈪自闗而西謂之注箕皆籮之别名也案籮與􅓕亦併作一詩繫􅓕一條之下􅓕才何切亦籮屬比籮稍匾而小用亦不同􅓕則造酒造飯用之漉米又可盛食物蓋籮盛其粗者而􅓕盛其精者精粗各適所受不可易也詩云匾小即云􅓕圎大則為籮從竹皆盛器協音豈異科販夫挑自便田舎用還多今嵗租糧畢空虚奈爾何儋都監切貯米器也漢書揚雄無儋石之儲晉劉毅家無儋石之儲應劭曰齊人名甖為儋受二斛顔師古曰儋者一人所負擔也方言云罃陳魏宋楚之間曰㼶音臾或曰㼡音殊燕之東北朝鮮冽水之間謂之瓺音暢周洛韓鄭之間謂之甀儋或作甔字從瓦瓦器也今江淮間農家造泥為甕披以麻草用貯食米可以代儋細民甚便之詩云腹寛口綽豈瓶罌力負從知一擔平外備五名因俗異中容兩斛賴陶成揚雄嗜酒嗟常乏劉毅呼盧愧豈盈我願貯儲能稍給不須攀慕二公名籃竹器無係為筐有係為籃大如斗量又謂之笭郎鼎切箵桑鼎切農家用採桑柘取蔬菓等物易挈提者方言籠南楚江沔之間謂之篣或謂之笯郭璞云亦呼籃蓋一器而異名也詩云賣花擔上兩相宜劚藥山前屢挈歸何似採桑盛葉好是中還有綺羅衣箕簸箕也説文云簸揚米去糠也莊子曰箕之簸物雖去粗留精然要其終皆有所除是也然北人用栁南人用竹其制不同用則一也詩云哆兮侈兮成是南箕箕四星二星為踵二星為舌哆侈謂踵已大而舌又廣也又維南有箕載翕其舌故箕皆有舌易播物也諺云箕星好風謂主簸揚農家所以資其用也王荆公詩云精良止如留䟽惡棄如擯如擯非爾憎如留豈吾吝無心以擇物誰喜亦誰慍翁乎勤簸揚可使糠粃盡帚今作箒又謂之篲集韻云少康作箕帚其用有二一則編草為之㓗除室内制則匾短謂之條亦作苕帚一則束篠為之擁掃庭院制則叢長謂之埽帚又有種生埽帚一科可作一帚謂之獨埽農家尤宜種之以備場圃間用也詩云有星常在天埽除即名彗觀象者何人為帚以㓗地身居百榖後名擅千金義能清四海塵此事乃極致籭所宜切竹器内方外圎用篩榖物説文云可以除粗取精集韻作簛又作簁或作篩其制有踈宻大小之分然皆粒食之總用也耕織圖詩云茆檐間杵臼竹屋細籭簸照人珠琲光奮臂風雨過計功初不淺坐食良自賀西隣華屋兒醉飽正髙卧䉛於六切漉米器説文淅箕也又云漉米籔蘇后切又炊䉛也廣雅曰淅䉴音箱㔯音旋䉛一曰籔方言云炊䉛謂之縮漉米䉛也或謂之􅀢音籔或謂之㔯江東呼為淅籖也盖今炊米日所用者䈰所交切飯䈰也説文陳留謂飯帚曰䈰從竹捎聲一曰飯器容五升今人亦呼飯箕為䈰箕南曰䉛北曰䈰南方用竹北方用栁皆漉米器或盛飯所以供造酒食農家所先雖南北名制不同而其用則一故附類之䉛詩云筠用亦已多䉛也惟一器口圎得㔯名腹深有籔義漉米本所施㸑炊仍可備日用有餘功毋為飽時棄䈰詩云䈰器亦名箕筠人織竹為朶頤深且哆便腹大而垂適應今時用良由古制遺令人常飽徳淅玉趂晨炊篩榖箉竹器箉與袋同音篇韻俱各不收盖土俗所呼傳寫於文字者如此其制比籭踈而頗深如籃大而稍淺上有長係可挂農人撲禾之後同稃穂子粒旋旋貯之於内輙篩下之上餘穰藁逐節棄去其下所留榖物須付之颺籃以去糠粃嘗見於江浙農家詩云誰編踈器破霜筠榖物相和聼爾分待得細捐穰藁盡颺籃還得効微勤颺籃颺餘亮切集韻謂風飛也籃形如北箕而小前有木舌後有竹柄農夫收穫之後場圃之間所蹂禾穂糠籺相雜執此㩍而向風擲之乃得浄榖不待車扇又勝箕簸田家便之詩云稃穂離披與榖同要憑分别混淆中柄頭能㵼精糧在糠粃從渠走下風種上聲簞盛種竹器也其量可容數斗形如圎甕上有􅤮口農家用貯榖種􅍥之風處不至鬰浥勝窖藏也古謂修簞窖論語一簞食之簞食器與此字雖同然制度有大小之殊作用有彼此之效齊民要術云藏稻必用簞盖稻乃水榖宜風燥之種時就浸水内又其便也詩云食器嘗聞陋巷間田家貯榖亦名簞指期播種雲彌望好作資生寳藏看曬槃曝榖竹器廣可五尺許邊縁微起深可二寸其中平濶似圎而長下用溜竹二莖兩端俱出一握許以便扛移趂日攤布榖實曝之蠶時農家兼用為篚但底宻而不通風氣終非蠶具詩云平如鋪簟淺於舟榖實攤來亦易收嘗笑昔年髙鳯麥漫教平地雨漂流摜古患切稻簟摜抖擻也簟承所遺稻也農家禾有早晚次第收穫即欲隨手得糧故用廣簟展布置木物或石於上各舉稻把摜之子粒隨落積於簟上非唯免汚泥沙抑且不致耗失又可曬榖物或捲作􅖧誠為多便南方農種之家率皆制此詩云摜稻當憑廣簟中聲如風雨露寒蓬誰知舒卷皆能用就貯精糧保嵗豐農書卷十五
