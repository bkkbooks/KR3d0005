body:
  text: 農書卷一元王禎撰農桑通訣一農事起本神農氏薑姓母曰女登有媧氏之女為少典妃感神龍而生神農人身牛首長於薑水因以為姓火德王故曰炎帝以火名官斫木為耜揉木為耒耒耨之用以教萬人始教耕故號神農氏周書曰神農之時天雨粟神農遂耕而種之白虎通云古之人民皆食禽獸肉至於神農因天之時案原本此句作用天地之時今據白虎通改正分地之利制耒耜教民農作神而化之使民宜之故謂之神農典語云神農嘗草别穀蒸民粒食後世至今賴之凡人以食為天者其可不知所本耶農丈人一星在斗西南老農主稼穡也與箕宿邉杵星相近蓋人事作乎下天象應乎上農星其殆始於此也后稷名棄其母有邰氏女曰薑嫄為帝嚳元妃薑嫄出野見巨人迹踐之而身動如孕者屆期而生子以為不祥棄之隘巷牛羊腓字之棄之平林會伐平林遷之棄渠中氷上鳥覆翼之薑嫄以為神遂收飬長之初欲棄之因名曰棄棄為兒時如巨人之志其遊戲好種植麻麥及為成人遂好耕農相地之宜宜榖者稼穡之民皆法之帝堯聞之舉為農師帝舜曰棄黎民阻飢汝后稷播時百穀詩曰思文后稷克配彼天粒我蒸民莫匪爾極帝命率育奄有下國俾民稼穡豳風七月之詩陳王業之艱難蓋周家以農事開國實祖於后稷所謂配天社而祭者皆後世仰其功德尊之之禮實萬世不廢之典也牛耕起本嘗聞古之耕者用耒耜以二耜為耦而耕皆人力也三代以來牛但奉祭享賔駕車犒師而已未及於耕也至春秋之間始有牛耕用犁山海經曰后稷之孫叔均始作牛耕是也故孔子有犁牛之言而弟子冉耕字伯牛禮記吕氏月令季冬出土牛示農耕早晚其例見如此後世因之皆賴其力然牛之有功於世反不如貓虎列於蠟祭典禮實有闕也嘗考之牛之有星在二十八宿丑位其來著矣謂牛生於丑宜以是月致祭牛宿及令各加蔬豆飬牛以備春耕請書為定式以示重本蠶事起本黃帝少典之子姓公孫名軒轅生而神靈弱而能言幼而徇齊長而聰明神農氏衰諸侯相侵伐神農氏弗能征於是軒轅乃習用干戈以征不享諸侯咸來賔從而蚩尤為最暴乃徴師殺蚩尤垂衣裳而天下治易繫曰神農氏沒黃帝堯舜氏作通其變使民不倦垂衣裳而天下治蓋取諸乾坤按黃帝元妃西陵氏始勸蠶事月大火而浴種夫人副褘而躬桑乃獻繭稱絲織絍之功因之廣織以供郊廟之服所謂黃帝垂衣裳而天下治蓋由此也然黃帝始置宫室后妃乃得育蠶是為起本西陵氏曰儽祖為黃帝元妃淮南王蠶經云西陵氏勸蠶稼親蠶始此皇圗要覽云伏羲化蠶西陵氏飬蠶禮記月令季春后妃齋戒享先蠶而躬桑以勸蠶事周禮天官內宰中春詔后帥內外命婦始祭蠶于北郊蠶于北郊以純隂也上古有蠶叢帝無文可考蓋古者蠶祭皆無主名至後周壇祭先蠶以黃帝元妃西陵氏為始是為先蠶歷代因之嘗謂天駟為蠶精元妃西陵氏始蠶實為要典若夫漢祭菀窳婦人寓氏公主蜀有蠶女馬頭娘又有謂三姑為蠶母者此皆後世之溢典也然古今所傳立像而祭不可遺闕故併附之夫蠶之有功於人萬世永賴注於祀典以示報本後之蒙衣被之德者其可不知所本耶嘗撰蠶事祭文二篇以為祈報之禮其文見農器譜授時篇第一案授時圖見後農器圖譜授時之説始於堯典自古有天文之官重黎以上其詳不可得聞堯命羲和厯象日月星辰考四方之中星定四時之仲月以南方朱鳥七星之中殷仲春則厥民析而東作之事起矣以東方大火房星之中正仲夏則厥民因而南訛之事興矣以西方虛星之中殷仲秋則厥民夷而西成之事舉矣以北方昴星之中正仲冬則厥民隩而朔易之事定矣然所謂厯象之法猶未詳也舜在璿璣玉衡以齊七政説者以為天文器後世言天之家如洛下閎鮮于妄人輩述其遺制營之度之而作渾天儀厯家推步無越此器然而未有圖也蓋二十八宿周天之度十二辰日月之會二十四氣之推移七十二候之遷變如環之循如輪之轉農桑之節以此占之四時各有其務十二月各有其宜先時而種則失之太早而不生後時而藝則失之太晚而不成故曰雖有智者不能冬種而春收農書天時之宜篇云萬物因時受氣因氣發生時至氣至生理因之今人雷同以正月為始春四月為始夏不知隂陽有消長氣候有盈縮冒昧以作事其克有成者幸而已矣此圖之作以交立春節為正月交立夏節為四月交立秋節為七月交立冬節為十月農事早晚各疏於每月之下星辰干支别為圓圖使可運轉北斗旋於中以為凖則每嵗立春斗柄建於寅方日月會於營室東井昏見於午建星辰正於南由此以往積十日而為旬積三旬而為月積三月而為時積四時而成嵗一嵗之中月建相次周而復始氣候推遷與日厯相為體用所以授民時而節農事即謂用天之道也夫授時厯每嵗一新授時圖常行不易非厯無以起圖非圖無以行厯表裏相參轉運無停渾天之儀粲然具在是矣然按月農時特取天地南北之中氣作標凖以示中道非膠柱鼓瑟之謂若夫逺近寒暖之漸殊正閏常變之或異又當推測晷度斟酌先後庶幾人與天合物乘氣至則生飬之節不至差謬此又圖之體用餘致也不可不知務農之家當家置一本考厯推圖以定種蓻如指諸掌故亦名曰授時指掌活法之圖地利篇第二周禮遂人以嵗時稽其人民而授之田野教之稼穡凡治野以土宜教氓今去古已逺田野散濶在上者可不稽諸古而驗於今而以教之民哉夫封畛之别地勢遼絶其間物産所宜者亦往往而異焉何則風行地上各有方位東方谷風東南方清明風南方凱風西南方涼風西方閶闔風西北方不周風北方廣莫風東北方融風土性所宜因隨氣化所以逺近彼此之間風土各有别也自黃帝畫野分州得百里之國萬區至帝嚳創制九州統領萬國堯遭洪水天下分絶使禹治之水土既平舜分為十二州尋復為九州禹既平水可事種蓻乃命棄曰黎民阻飢汝后稷播時百穀是水平之後始播百穀者稷也孟子謂后稷教民稼穡樹蓻五穀謂之教民意者不止教以耕耘播種而已其亦因九州之别土性之異視其土宜而教之歟今按禹貢冀州厥土惟白壤厥田惟中中兖州厥土黑墳厥田惟中下青州厥土白墳厥田惟上下徐州厥土赤埴墳厥田惟上中揚州厥土惟塗泥厥田惟下下荆州厥土惟塗泥厥田惟下中豫州厥土惟壤下土墳壚厥田惟中上梁州厥土青黎厥田惟下上雍州厥土黃壤厥田惟上上由是觀之九州之內田各有等土各有産山川阻隔風氣不同凡物之種各有所宜故宜於冀兖者不可以青徐論宜於荆揚者不可以雍豫擬此聖人所謂分地之利者也農書云穀之為品不一風土各有所宜周禮職方氏云揚州其穀宜稻荆州其穀宜稻豫州其穀宜五種黍稷菽麥稻青州其穀宜稻麥兖州其穀宜四種黍稷稻麥雍州其穀宜黍稷幽州其穀宜三種黍稷稻冀州其穀宜黍稷并州其穀宜五種雖徐梁闕所紀載而九州風土之宜其大概可見矣書序稱九州之志謂之九邱言九州所有土地所生風氣所宜皆聚此書孔子述職方以除九邱蓋謂此也此言九州之域種藝之法也今國家區宇之大人民之衆際所覆載皆為所有非九州所能限也常以大體考之天下地土南北髙下相半且以江淮南北論之江淮以北髙田平曠所種宜黍稷等稼江淮以南下土塗泥所種宜稻秫又南北漸逺寒暖殊别故所種早晚不同惟東西寒暖稍平所種雜錯然亦有南北髙下之殊其約論如此然又以十二州十二分野土壤名物論之不無少異所謂十二分野上應二十八宿各有度數州郡度數躔次云角亢氐鄭兖州東郡入角一度東平任城山隂入角六度濟北陳留入亢五度濟隂入氐一度東平入氐七度泰山入角十二度房心宋豫州穎州入房一度汝南入房二度沛郡入房四度梁國入房五度淮陽入心一度魯國入心三度楚國入房四度尾箕燕幽州涼州入箕中十度上谷入尾一度漁陽入尾三度右北平入尾七度西河上郡北地遼西東入尾十度涿郡入尾十六度渤海入箕一度樂浪入箕三度元莵入箕六度廣陽入箕九度斗牽牛須女吳越揚州九江入斗一度廬江入斗六度豫章入斗十度丹陽入斗十六度會稽入斗一度臨淮入斗四度廣陵入牛八度泗水入女一度六安入女六度虛危齊青州齊國入虛六度北海入虛九度濟南入危一度樂安入危四度東萊入危九度平原入危十一度災州入危十四度營室東壁衛并州安定入營室一度天水入營室八度隴西入營室四度酒泉入營室十一度張掖入營室十二度武都入東壁一度金城入東壁四度武威入東壁六度燉煌入東壁八度奎婁胃魯徐州東海入奎一度琅琊入奎六度髙密入婁一度城陽入婁九度膠東入胃一度昴畢趙冀州魏郡入昴一度巨鹿入昴三度恆山入昴五度廣平入昴七度中山入昴八度清河入昴九度信都入畢三度趙郡入畢八度安平入畢四度河間入畢十度真定入畢十三度觜參魏益州廣漢入觜一度越嶲入觜三度蜀郡入參一度犍為入參三度牂牱入參五度巴蜀入參八度漢中入參九度益州入參七度東井輿鬼秦雍州雲中入東井一度定襄入東井八度鴈門入東井十六度代郡入東井二十八度太原入東井二十九度上黨入輿鬼二度栁七星張周三輔宏農入栁一度河南入七星三度河東入張一度河內入張九度翼軫楚荆州南陽入翼六度南郡入翼十度江夏入翼十二度零陵入軫十一度桂陽入軫六度武陵入軫十度長沙入軫十六度其土産名物各有證驗此天地覆載一定古今不可易者蓋其土地之廣不外乎是但所屬邉裔不無遼絶若能自內而求外由近而及逺則土産之物皆可推而知之矣大抵風土之説總而言之則方域之多大有不同詳而言之雖一州之域亦有五土之分似無多異周禮大司徒以土會之法辨五地之物生一曰山林二曰川澤三曰邱陵四曰墳衍五曰原隰以土宜之法辨十有二土之名物十二分野之土各有所宜辨其名謂白壤黑墳之類辨其物謂所生之物以相民宅而知其利害以阜人民以蕃鳥獸以育草木以任土事辨十有二壤之物而知其種以教稼穡樹藝遂以教民春耕秋穡然稼穡樹藝又有周禮草人掌土化之法以物土相其宜以為之種凡糞種騂剛用牛赤緹用羊墳壤用麋渴澤用鹿鹹瀉用貆胡官反勃壤用狐埴墳用豕強㯺呼覽切堅也用蕡扶云切輕爂孚照切脆也用犬凡所以糞種者皆謂煮取汁也此謂占地形色為之種者一取牛羊等汁以溲種而化之使美則得其宜矣若今之善農者審方域田壤之異以分其類參土化土會之法以辨其種如此可不失種土之宜而能盡稼穡之利是圖之成非獨使民視為訓則抑亦望當世之在民上者按圖考傳隨地所在悉知風土所别種藝所宜雖萬里而遙四海之廣舉在目前如指掌上庶乎得天下農種之總要國家教民之先務此圖之所以作也幸試覽焉孝弟力田篇第三孝弟力田古人曷為而並言也孝弟為立身之本力田為飬身之本二者可以相資而不可以相離也蓋自民受天地之中以生莫不有是理亦莫不有是氣愛之理為仁宜之理為義自其仁而用之親親為孝自其義而用之長長為悌皆其得於良知良能之素人人之所同也特其氣稟有清濁之異其清者為士而濁者為農為工為商士以眀其仁義農以贍其衣食工以制其器用商以通其貨賄此四民者皆天之所設以相資焉者聖人樹其法度制其品節以教而飬之使天下之人莫不衣其衣而食其食親其親而長其長然其教之者莫先於士飬之者莫重於農士之本在學農之本在耕是故士為上農次之工商為下本末輕重昭然可見古者田有井黨有庠遂有序家有孰新穀既入子弟始入孰距冬至四十五日而出聚則行射飲正齒位讀教法散則從事於耕故天下無不學之農詩曰黍稷薿薿攸介攸止蒸我髦士即漢力田之科是已帝舜聖人也萬世而下言孝莫加焉而耕於歷山伊尹之訓曰立愛惟親立敬惟長而耕於莘野其他如冀缺長沮桀溺荷蓧丈人之徒皆以耕為事故天下亦少不耕之士周官大司徒三嵗大比考其德行道藝而先孝友即漢孝悌之科是已夫天下之務本莫如士其次莫如農農者被蒲茅飯粗糲居蓬藋逐牛豕戴星而出帶月而歸父耕而子饁兄作而弟隨公則奉租稅給征役私則飬父母育妻子其餘則結親姻交鄰里有淳朴之風者莫農若也至於工逞技巧商操贏餘轉徙無常其於終飬之義友于之情必有所不逮雖世所不可缺而聖人不以加於農也是以古者崇本抑末其教民也以孝弟為先其制刑也亦以不孝不弟為重加意於立身之本如此當其生也宅不毛者有里布田不耕者出屋粟民無職事者出夫家之征及其死也不畜者祭無牲不耕者祭無盛不樹者無槨不蠶者不帛不績者不衰加意於飬生之本又如此于斯時也家給人足上下有序親踈有禮末作之流亦鮮矣又安有遊惰者哉至于瘖聾跛躃斷者侏儒各以其器食之彼廢疾之人猶有所事而後食况於手足耳目無故者哉漢代去古未逺立為孝弟力田之科髙帝令賈人不得衣絲乘車重租稅以困辱之惠帝雖稍弛商賈之禁然猶市井子孫不得為官仕皆所以崇本而抑末也至文帝時風俗之靡公私之匱賈誼尚以為言帝感其説乃耕藉田嘗詔曰孝弟天下之大順也其遣謁者勞賜又詔曰力田民生之本也其賜力田帛二匹而以户口率置力田常員各率其意以導民焉唐太宗亦詔民有見業農者不得轉為工賈工賈舍見業而力田者免其調夫末作之民尚有益於世用古人且若是抑之而况世降俗末又有出於末作之外者舍其人倫惰其身體衣食之費反侈於齊民以有限之物供無益之人上之人不惟不抑之反從而崇之何哉且一夫不耕民有飢者一女不蠶民有寒者乃若一夫耕衆人坐而食之欲民之無飢不可得也一女蠶衆人坐而衣之欲民之無寒不可得也飢寒切於民之身體其所以仰事俯育飬生送死者皆無所資欲其孝弟不可得也故曰倉廪實知禮節衣食足知榮辱豈不信乎農夫受飢寒之苦見遊惰之樂反從而羡之至去隴畝棄耒耜而趨之是民之害也又豈特逐末而已哉夫孝弟者本性之所固有力田者本業之所當為民失其業且失其性者豈其本然哉直徇於流俗惑於他岐以至是耳今國家纍降詔條如有勤務農桑增置家業孝友之人從本社舉之司縣察之以聞於上司嵗終則稽其事或有遊惰之人亦從本社訓之不聽則以聞於官而别徴其役此深得古先聖人化民成俗之意使有職於牧民者悉意奉行眀仁義之實以教之課農桑之利以飬之則民志專一風俗還淳可使人有曾閔之行而家為堯舜之民矣歐陽永叔有云莫若修其本以勝之此之謂也農書卷一
