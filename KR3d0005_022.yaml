body:
  text: 農書卷二十二元王禎撰農器圖譜二十麻苧門麻苧之有用具南北不無異同民俗豈能通變如南人不解刈麻北人不知治苧及有漚浸審生熟之莭車紡分大小之工凡絺綌繩綆皆其所出今幷所附類一一條列庶使南北互相為法云漚烏侯切池漚浸漬也池猶泓也詩云東門之池可以漚麻凡蓻麻之鄉如無水䖏則當掘地成池或甃以塼石蓄水于内用作漚所齊民要術云漚欲清水生熟合宜注説云濁水則麻黒水少則麻脆生則難剝太爛則不任此漚法也汜勝之書曰夏至後二十日漚枲枲和如絲大凡北方治麻刈倒即䇿之卧置池内水要寒煖得宜麻亦生熟有節湏人體測得法則麻皮潔白柔韌可績細布南方但連根㧞麻遇用則旋浸旋剝其麻片黄皮粗厚不任細績雖南北習尚不同然北方隨刈即漚于池可為上法又詩云東門之池可以漚苧以此知苧亦可漚問之南方造苧者謂苧性夲難輭與漚麻不同必先績苧已紡成纑乃用乾石灰拌和累日夏天三日冬天五日春秋約中既畢抖去别用石灰煑熟待冷于清水中濯净然後用蘆簾平鋪水面如水逺則用大盆盛水鋪簾或草攤纑浸曝每日換水亦可攤纑于上半浸半曬遇夜収起瀝乾次日如前候纑極白方可起布此治苧池漚之法湏假水浴日曝而成北人未之省也今録之冀南北通用竊讀孟子所謂江漢以濯之秋陽以暴之皜皜乎不可尚已今漚苧雖曰小技亦此理歟詩曰解變常麻作雪衣詩云麻衣如雪好將漚法教民知若憑地利江南易是䖏人家近水湄刈刀穫麻刄也或作両刄但用䥥柌似咨切旋插其刄俯身控刈取其平穏便易北方種麻頗多或至連頃另有刀工各具其器割刈根莖劖削梢葉甚為速效齊民要術曰麻勃如灰便刈䇿欲小􅀈欲薄穫欲浄此刈麻法也南方惟用㧞取頗費工力故録於此示其便也詩云森森麻榦覆隂濃頃畆方期一捲空説似吴儂初未信中原隨地有刀工苧刮刀刮苧皮刄也煆鐡為之長三寸許捲成小槽内插短柄兩刄向上以鈍為用仰置手中将所剥苧皮横覆刄上以大指就按刮之苧膚即蜕農桑輯要云苧刈倒時用手剥下皮以刀刮之其浮皴七旬切自去又曰苧剥取其皮以竹刮其表厚䖏自脱得裡如筋者煑之用績今制為兩刄鐡刀尤便于用詩云刮苧由来要愈工柄頭雙刄就為銎形模外若無他伎掌握中能効此功捲去膚皴見精粹退餘梗澁得輕鬆作麻已付金釵績更為珍藏用不窮績􅦶去中切盛麻績器也績集韻云緝也􅦶説文曰籠也又姑簍也字從竹或以條莖編之用則一也大小深淺隨其所宜制之麻苧蕉葛等為之絺綌皆本于此有日用生財之道也詩云績麻如之何以器為縈蟠初認飛霰落次若層雲屯功成在良筌日新䒭銘槃詩人有深刺勿傚南方原小紡車紡妃両切此車之制凡麻苧之鄉在在有之前圖具陳兹不復述隋書鄭善果母清河崔氏恒自紡績善果曰母何自勤如是耶荅曰紡績婦人之務上自王后下至大夫妻各有所製若惰業者是為驕逸吾雖不知禮其可自敗名乎今士大夫妻妾衣去聲被纎美曽不知紡績之事聞此鄭母之言當自悟也詩云忩間荆布踏車人紡具維持總一身旋績纒綿分衆縷各隨莩繀轉上聲孤輪無窮運用資生業不礙繁喧徹近隣從此輸功到機杼年年絺綌為誰新大紡車其制長餘二丈闊約五尺先造地柎木框四角立柱各髙五尺中穿横桄上架枋木其枋木両頭山口卧受捲纑長軖鐡軸次于前地柎上立長木座座上列臼以承􅩺底鐡簨夫􅩺用木車成筩子長一尺二寸圍一尺二寸計三十二枚内受績纒􅩺上俱用杖頭鐡環以拘􅩺軸又于額枋前排置小鐡义分勒績條轉上聲上長軖仍就左右别架車輪兩座通絡皮弦下經列􅩺上拶轉軖旋鼓或人或畜轉上聲動左邊大輪弦隨輪轉衆機皆動上下相應緩急相宜遂使績條成緊去聲纒于軖上晝夜紡績百斤或衆家績多乃集于車下秤績分纑不勞可畢中原麻布之鄉皆用之今特圖其制度欲使他方之民視此機栝闗楗倣傚成造可為普利又新置絲線紡車一如上但差小耳比之露地桁架合線特為省易因附于此詩云大小車輪共一絃一輪才動各相連績隨衆􅩺方齊轉上聲纑上長軖却自纒可代女工兼倍省要供布縷未征前畫圖中土規模在更欲他方得共傳蟠車纒纑具也又謂之撥車南人謂撥柎又云車柎南北人皆慣用習見已圖于前兹不必述詩云績紡功才畢蟠纑得此車行桄運樞臬交輳寄横义宛轉荆釵手周旋里布家豈知羅綺軰惟務撥琵琶纑刷䟽布縷器也束草根為之通柄長可尺許圍可尺餘其纑縷杼軸既畢架以义木下用重物掣之纑縷已均布者以手執此就加漿糊順下刷之即增光澤可授機織此造布之内雖曰細具然不可闕詩云績麻經紡即為纑功用都歸一刷餘纔與機頭借光潤已聞催布有征胥布機釋名曰布列諸縷淮南子曰伯余之初作衣也伯余黄帝臣也緂他甘切麻索縷手經指挂案淮南子此句下有其成猶網羅一句後世為之機杼幅匹廣長踈宻之制存焉農家春秋績織最為要具詩云誰家績紡成札札㺯機杼大布可以衣絺縠安用許哀彼度梭人辛苦織如霧坐令鄉落間長歌二東句行臺監察御史詹雲卿造布之法印行今抄附于此毛絁布法㨂一色白苧麻水潤分成縷粗細任意旋緝旋搓本俗于腿上搓作纑逗成鋪不必車紡亦勿熟漚只經生纑論帖穿苧如常法以發過稀糊調細豆麵刷過更用油水刷之于天氣濕潤時不透風處或地窨子中洒地令潤經織為佳若風日髙燥則纑縷乾脆難織每織必先以油水潤苧及潤纑經織成生布于好灰水中浸蘸㬠乾再蘸再㬠如此二日不得揉搓再蘸濕了於乾灰内周徧渗浥兩時久納于熱灰水内浸濕於甑中蒸之文武火飬二三日頻頻翻覷要識灰性及火候𦂳慢次用净水澣濯天晴再三𢃄水搭㬠如前不計次數惟以潔白為度灰湏上等白者落黎桑柴豆稭等灰入少許炭灰妙鐡勒布法将揀下襍色苧麻水潤分縷隨緝隨搓經織皆如前法水煑過便是先將生苧麻折作二尺五寸長不斷㬠乾蒸過帯濕剥下去粗皮如常法水潤緝搓如前麻鐡黎布法将襍色老火麻帯濕曲折作二尺五寸長㬠乾収之欲用時旋于木甑中蒸過趂濕剥下㬠乾以木椑子兩個夾麻順歴數次至麻性頗軟堪緝為度水潤緝績紡作纑生織成布水煑便是此布妙處唯在不搓揉了麻之骨力好灰水蘸㬠布子潔白而已雖曰蘸㬠頗煩而省纒縈熟纑等工亦多比之南布或有價髙數倍者真良法也鏤板印布與存心治生君子共之䋔車續麻枲想里切䋔俗冩作麻䋔廣韻並無此字今姑從俗紴廣韻作仄聲緊去聲具也造作簨虡簨思尹切虡其舉切髙二尺上穿横軸長可二尺餘貫以軖轂左手引麻牽軖既轉右手續接麻皮成緊去聲縱纒軖上䋔縷既盈乃脱軖付之繩車或作别用詩云形如紖籰却輕便平聲麻縷牽来日萬旋料得䋔成付它具作繩功力已居先繩車絞合古㳫切䋔緊作繩也其車之制先立簨虡一座植木止之簨上加置横板一片長可五尺闊可四寸横板中間排鑿八竅或六竅各竅内置掉枝或鐡或木皆彎如牛角又作横木一莖列竅穿其掉枝復别作一車亦如上法兩車相對約量逺近將所成䋔緊去聲各結于兩車掉枝之足車首各一人将掉枝所穿横木俱各攪轉候䋔股匀緊却将三股或四股撮而為一各結于掉枝一足計成二繩然後將另制𤓰木置于所合入聲䋔緊之首復攪其掉枝使䋔緊成繩𤓰木自行繩盡乃止凡農事中用繩頗多故田家習制此具遂列于農譜之内詩云車頭䋔縷各牽連糺索初因匠手傳一緊去聲續来通似脉兩端相掣直如弦機憑裊掉供旋轉股入行𤓰作緊圓資爾屈伸功用畢莫将良器䓁忘筌紉車紉尼隣切繟繩器也通俗文曰單繟曰紉揉木作棬中貫軸柄長可尺餘以棬之上角用單麻皮右手執柄轉上聲之左手績麻股既成緊去聲則纒于棬上或隨繩車用之以助糺絞䋔緊去聲又農家用作經織麻屨牛衣簾箔等物此紉車復有大小之分也詩云身惟軸柄首惟棬麻縷紉来儘自纒簾箔織餘仍有用牛衣經緯輭于毯旋平聲椎掉麻紴具也截木長可六寸頭徑三寸許兩間斫細様如腰鼔中作小竅插一鉤簨長可四寸用繫麻皮于下以左手懸之右手撥旋麻既成緊去聲就纒椎上餘麻挽于鉤内復續之如前所成經緯可作麤布亦可織履農隙時老稚皆能作此雖係𤨏細之具然於貧民不為無補故繋于此詩云鉤椎髙挈作懸虗麻緊去聲成来布有纑近喜鄉人更他用却旋毛縷造氍毹耕索牛所輓繩也古名綯牛索也爾雅曰綯絞也謂紏絞繩索也詩云宵爾索綯郭注云綯繩之别名方言曰車紂自闗而東謂之䋺或謂之曲綯或謂之曲綸自闗而西謂之紂農家紉麻合古㳫切之以輓耕犂按舊説遼東犂轅長可四尺回轉相妨今秦晉之地亦用長轅犂其轅端横木如古車之制以駕二牛然平田則可至於山隈水曲轉折費力如山東及淮漢䓁䖏用三牛四牛大小不等髙下不齊既難並駕動作之間終不若用索之便也詩云農家蓺麻枲耕繩皆自繟槃軛憑後先牛力利囬轉卷去跡若藏伸来力還展或者駕長轅彊去聲直殊未善呼鞭驅牛具也字從革從便曰䇿曰鞓曰鞘偹則成之春秋傳云鞭長不及馬腹此御車鞭也今牛鞭犂後用亦如之農家紉麻合鞭鞭有鳴鞘人則以聲相去聲之用警牛行不專于撻世云呼鞭即其義也詩云何物耕牛服並驅長鞭輕裊配歌呼寄聲莫作鳴鞘急飼飬曽添宿料無牛衣顔師古曰編亂麻為之即今呼為䪊具者前漢王章𫝊嘗卧牛衣中晉書劉寔好學少貧苦口誦手繩賣牛衣以自給據牛之有衣舊矣以此見古人重畜不忘農之本故也今牧飬中唯牛毛疎最不耐寒每近冬月皆宜以冗麻續作䋔緊去聲編織毯叚衣去聲之如䄈市主切褐然以禦寒冽不然必有凍慄之患農耕之家不可不預為儲備王荆公詩云百獸冬自煖獨牛無氄毛無衣與卒嵗坐恐得空牢主人覆護恩豈啻一綈袍問汝何以報黐黐滿東臯案農務集作黍離滿東臯法製長生屋天生五材民並用之而水火皆能為災火之為災尤其暴者也春秋左氏傳曰天火曰災人火曰火夫古之火正或食于心或食于咮咮為鶉火心為大火天火之孽雖曰氣運所感亦必假于人火而後作焉人之飲食非火不成人之寝處非火不明人火之孽失于不慎始于毫髪終于延綿且火得木而生得水而熄至土而盡故木者火之母人之居室皆資于木易于生患水者火之牡而足以勝火人皆知之土者水之子而足以禦火而人未之知也水者救于已然之後土者禦于未然之前救于已然之後者難為功禦于未然之前者易為力此曲突徙薪之謀所以愈于焦頭爛額之功也吾嘗觀古人救火之術宋災樂喜為政使伯氏司里火所未至撤小屋塗大屋陳畚挶具綆缶備水器蓄水潦積土塗表火道此救療之法也鄭災公孫僑為政郊人助園史除于國北禳火于元𡨕回禄祈于四鄘此祈禳之法也是皆救于已然之後嘗見徃年腹裏諸郡所居瓦屋則用磚裹杣簷草屋則用泥圬上下既防延燒且易救護又有别置府藏外䕶磚泥謂之土庫火不能入竊以此推之凡農家居屋厨屋蠶屋倉屋牛屋皆冝以法製泥土為用先宜選用壮大材木締構既成椽上鋪板板上傅泥泥上用法製油灰泥塗餙待日曝乾堅如瓷石可以代瓦凡屋中内外材木露者與夫門忩壁堵通用法製灰泥圬墁之務要匀厚固宻勿有罅隙可免焚焮之患名曰法製長生屋是乃禦於未然之前誠為長䇿又豈特農家所宜哉今之髙堂大厦危樓傑閣所以居珍寳而奉身體者誠為不貲一旦患生於不測釁起于㣲眇轉盻揺足化為煨燼之區瓦礫之場千金之軀亦或不保良可哀憫平居暇日誠能依此製造不惟歴刼火而不壊亦可防風雨而不朽至若闤闠之市居民輳集雖不能盡依此法其間或有一焉亦可以間隔火道不至延燒安可惜一時之費而不為永久萬全之計哉賛曰上棟下宇從古而然衣食之利農家攸先維彼倉廪食之所寄維彼蠶室衣之所繋矧兹居室于焉寝䖏一有遺燎化為焦土嗟爾農夫豫戒不虞製泥和灰是墁是塗何畏畢方何愁回禄棟宇恒存衣食恒足匪直農家此䇿是宜凡百居宅可倣作之法製灰泥用磚屑為末白善泥桐油枯如無桐油枯以油代之莩炭石灰糯米膠以前五件䓁分為末將糯米膠調和得所地靣為磚則用磚模脱出趂濕于良平地面上用泥墁成一片半年乾硬如石磚然圬墁屋宇則加紙筋和匀用之不致折裂塗飾材木上用帶筋石灰如材木光䖏則用小竹釘簮麻鬚惹泥不致脱落造活字印書法伏羲氏畫卦造契以代結繩之政而文籍生焉注云書字于木刻其側以為契各持其一以相考合黄帝時倉頡視鳥跡以為篆文即古文科斗書也周宣王時史籕變科斗而為大篆秦李斯損益之而為小篆程邈省篆而為𨽻由𨽻而楷由楷而草則又漢魏間諸賢變體之作此書法之大概也或書之竹謂之竹簡或書于縑帛謂之帛書厥後文籍寖廣縑貴而簡重不便于用又為之紙故字從巾按前漢皇后紀已有赫蹏紙至後漢蔡倫以木膚麻頭敝布魚網造紙稱為蔡倫紙而文籍資之以為卷軸取其易于卷舒目之曰卷然皆冩本學者艱于傳録故人以藏書為貴五代唐明宗長興二年宰相馮道李愚請令判國子監田敏校正九經刻板印賣朝廷從之鋟梓之法其本于此因是天下書籍遂廣然而板木工匠所費甚多至有一書字板功力不及數載難成雖有可傳之書人皆惮其工費不能印造傳播後世有人别生巧技以鐡為印盔界行内用稀瀝青澆滿冷定取平火上再行煨化以燒熟瓦字排于行内作活字印板為其不便又有以泥為盔界行内用薄泥将燒熟瓦字排之再入窑内燒為一叚亦可為活字板印之近世又有鑄錫作字以鐡條貫之作行嵌于盔内界行印書但上項字様難于使墨率多印壊所以不能久行今又有巧便之法造板木作印盔削竹片為行雕板木為字用小細鋸鎪開各作一字用小刀四面修之比試大小髙低一同然後排字作行削成竹片夾之盔字既滿用木㨝㨝先結切之使堅牢字皆不動然後用墨刷印之冩韻刻字法先照監韻内可用字數分為上下平上去入五聲各分韻頭校勘字様抄冩完備擇能書人取活字様製大小冩出各門字様糊于板上命工刋刻稍留界路以憑鋸截又有如助辭之乎者也字及數目字并尋常可用字様各分為一門多刻字數約有三萬餘字冩畢一如前法今載立號監韻活字板式于後其餘五聲韻字俱要倣此一東通侗恫桐同仝童僮曈朣瞳銅峒橦絧罿筒穜潼犝􅩫詷艟籠㰍聾曨朧櫳瓏礱瀧芃篷髼蒙冡幪􅞲濛雺曚艨矇懵悤蔥聰驄騣豵緵鬷叢䕺藂潨洪洚紅䜫鴻訌烘空悾箜公功工攻㓚翁豐酆灃風楓馮渢嵩娀菘崧充㤝珫忡終螽戎禯駥狨崇漴中𠂻忠蟲沖冲种爞翀隆癃窿融􅀢肜雄熊弓躬躬宫芎窮藭二冬彤鼕農儂宗鬆竇悰琮潨慒淙攻三鍾鐘橦舂樁憃衝衝罿憧艟鱅慵茸樅鏦從蓯蹤樅松丰夆鋒鏠烽逢峯蠭蜂桻重穜龍蘢醲濃穠檂容溶蓉庸墉鎔鄘鏞封葑逄傭恭共供龔胷匈凶洶訩詾跫邕噰雍雝灉癰饔壅顒喁禺蛩邛筇􅀢四江扛杠矼釭玒腔椌降悾缸缻瓨洚訌虹邦龎尨庬哤雙艭􅋏瀧牕忩囱鏦樁憃幢五支枝肢巵梔觝氐榰搘禔祇祇祇秖祗秪砥跂施葹鍦鉇釃廝籭襹吹龡炊差衰匙􅬾垂陲倕腄兒痿斯祈凘澌虒褫雌貲髭觜疵訾玼胔隨遺隋知摛螭縭馳池邸箎褫錘鎚槌搥甀離离蠡劙􅀈黎䕻䄜纚罹籬縭醨漓璃灕鸝驪鵹孋梨藜犁黧来俫徠釐甃嫠犛狸貍霾羸鈹被陂羆碑卑痺裨錍鈚禆埤箄鞞皮疲罷鎪字修字法将刻訖板木上字様用細齒小鋸每字四方鎪下盛于筐筥器内每字令人用小裁刀修理齊整先立凖則於凖則内試大小髙低一同然後另貯别器作盔嵌字法于元寫監韻各門字數嵌於木盔内用竹片行行夹住擺滿用木榍輕㨝之排於輪上依前分作五聲用大字標記造輪法用輕木造為大輪其輪盤徑可七尺輪軸髙可三尺許用大木砧鑿竅上作横架中貫輪軸下有鑽臼立轉輪盤以圎竹笆鋪之上置活字板面各依號數上下相次鋪擺凡置輪兩面一輪置監韻板面一輪置雜字板面一人中坐左右俱可推轉摘字盖以人㝷字則難以字就人則易此轉輪之法不勞力而坐致字數取訖又可補還韻内兩得便也取字法将元冩監韻另冩一冊編成字號每面各行各字俱計號數與輪上門類相同一人執韻依號數喝字一人於輪上元布輪字板内取摘字隻嵌於所印書板盔内如有字韻内别無隨手令刋匠添補疾得完備作盔安字刷印法用平直乾板一片量書面大小四圍作欄右邊空候擺滿盔面右邊安置界欄以木㨝㨝之界行内字様湏要個個修理平正先用刀削下諸様小竹片以别器盛貯如有低邪隨字形襯㼭徒念切㨝之至字體平稳然後刷印之又以㯶刷順界行竪直刷之不可横刷印紙亦用㯶刷順界行刷之此用活字板之定法也前任宣州旌徳縣縣尹時方撰農書因字數甚多難於刋印故尚已意命匠創活字二年而工畢試印本縣志書約計六萬餘字不一月而百部齊成一如刋板使知其可用後二年予遷任信州永豐縣絜而之官是農書方成欲以活字嵌印今知江西見行命工刋板故且収貯以待别用然古今此法未有所𫝊故編録于此以待世之好事者為印書省便之法傳於永久本為農書而作因附于後農書卷二十二
