body:
  text: 農書卷二十一元王禎撰農器圖譜十七蠶桑門夫蠶之用桑必有鉤筐等器以供其事然逺近之間習俗不通故其制度巧拙絶異彼有併力而不及此或一工而兼倍今特采輯去短從長使知所擇夫桑具蠶之用也故次于蠶事之後桑几狀如髙凳平穿二桄就作登級凡柔桑不勝梯附須登几上乃易得葉齊民要術云採桑必須髙几士農必用云擔負髙几繞樹上下今蠶家採彼女桑兹為便器梅聖俞詩云柔桑不倚梯摘葉賴髙几每于得葉易曾靡憂枝披上聲躋升類拾級下上異緣蟻間置草舍傍雞鳴或棲止桑梯說文曰梯木階也夫桑之稚者用几採摘其桑之髙者須梯剶丑全切削去也斫梯若不長未免攀附旁條不還則鳩腳多亂樛居秋切枝折垂則乳液旁出必欲趁于髙下隨意去留須梯長可也齊民要術云採桑必須長梯梯不長則髙枝折正謂此也詩云貫木取諸漸為梯利用晉附彼墻下桑如躡平地迅女枝既不攀逺揚亦可刃何當展所施摘蓮華峯峻斫斧桑斧也其斧銎曲容切匾而刃闊與樵斧不同詩謂蠶月條桑取彼斧斨以伐逺揚士農必用云轉身運斧條葉偃落于外即謂以伐逺揚也凡斧所剶斫不煩再刃者為上至遇枯枝徑節不能拒遏又為上如剛而不闕利而不乏尤為上也然用斧有法必須轉腕回刃向上斫之枝查既順津脉不出則葉必復茂故農語云斧頭自有一倍葉以此知科斫之利勝惟在夫善用斧之效也梅聖俞詩云科桑持野斧乳濕新磨刃繁枿一以除肥條更豐潤魯葉大如掌吳蠶食若駿始時人謂斨利俗今乃信桑鉤採桑具也凡桑者欲得逺揚枝葉引近就摘故用鉤木以代臂指板普班切援之勞昔后妃世婦以下親蠶皆用筐鉤採桑唐肅宗上元初獲定國寶十三內有採桑鉤一以此知古之採桑皆用鉤也然北俗伐桑而少採南人採桑而少伐嵗歲伐之則樹脉易衰久久採之則枝條多結欲南北隨宜採斫互用則桑斧桑鉤各有所施故兩及之不致偏廢梅聖俞詩云長鉤扳桑枝短鉤挂桑籠南陌露氣寒東方日光動少婦首且笄幼女角已總競用採葉歸曾非事梳櫳桑籠集韻云籠大篝古侯切也今謂有係筐也桑者便于携挈古樂府云羅敷善採桑案今本作羅敷善蠶桑採桑城南隅方言叶韵青絲為籠繩案今本作青絲為籠係桂枝為籠鉤今南方桑籠頗大以擔負之尤便于用梅聖俞詩云采采向桑郊盈盈自持筥桂鉤帶月往稚葉和煙貯一心恐蠶饑搔首促儔侣到家傾嫩緑刀几為㕮咀桑網盛葉繩兜也先作圈木緣圈繩結網眼圓垂三尺有餘下用一繩紀為網底桑者挈之納葉于內網腹既滿歸則解底繩傾之或人挑負或用畜力䭾送比之筐籃甚為輕便北方蠶家多置之詩云厥初結網功豈知兼水陸制用有異同隨宜可伸縮一網作領圈衆目寬甕腹蠶家急葉時歸來傾萬緑劖士咸切刀剶桑刃也刀長尺餘闊約二寸木柄一握南人所桑剶桑俱用此刃北人斫桑用斧劖桑用鎌鎌刃雖利終非本器不若劖刀之輕且順也若南人斫桑用斧北人劖葉用刀去短就長兩為便也詩云晶熒一尺鐡煆以赫連鋼剶斫有餘用功最在蠶桑樛附日以戕新枝日以長胡為豳人歌獨取斧與斨切刀斷桑刃也蠶蟻時用小刀蠶漸大時用大刀或用漫䥷蠶多者又用兩端有柄長刃切之名曰懶刀懶刀如皮匠刮刀長三尺許兩端有短木柄以手按刀半裁半切斷葉雲積可供十筐先于長凳上鋪葉勻厚人于其上俯按此刀左右切之一刃之利可桑百箔詩云煆金作懶刀形制半圭璧一食飫十筐雙柲便兩扼切之復裁之斷桑如雲積刀作千握絲功成在三尺䥷查轄切秦云切草也又作䈟桑砧爾雅曰砧謂之榩音䖍郭璞曰砧木礩也砧從石榩從木即木砧也砧截木為碢圓形竪理切物乃不拒刃此北方蠶小時用刀切葉砧上或用几或用夾南方蠶無大小切桑俱用砧也詩云團團几上砧尋常間月魄蠶月切柔桑纎纎雲縷積飼飬槃篚多收去淨無跡不必在庖厨鼓刀刃聲剨案原本剨訛作割謹改正桑夾挾桑具也用木礩上仰置叉股髙可二三尺于上順置䥷刃左手茹葉右手按刃切之此夾之小者若蠶多之家乃用長椽二莖駢竪壁前中寬尺許乃實納桑葉髙可及丈人則躡梯上之兩足後踏屋壁以胸前向壓住兩手緊按長刃向下裁切此桑夾之大者南方切桑唯用刀砧不識此等桑具故特歷說之以廣其利詩云沃葉緑雲多吐出掌握內刃頭風雨聲紛然落呀喙材良用有餘力小功輒倍春蠶食急時籧筐誠有待農器圖譜十八織絍門織絍婦人所親之事傳曰一女不織民有寒者古謂庶士以下各衣去聲其夫秋而成事蒸而獻功愆則有辟是也凡紡絡經緯之有數梭繀機杼之有法雖一絲之緒一綜之交各有倫叙皆須積勤而得纍功而至日夜精思不致差互然後乃成幅匹如閨閫之屬務之不惟防間驕逸又使知其服被之所自不敢易也絲籰玉縛切絡絲具也方言曰楥音爰兖豫河濟之間謂之轅郭璞注云所以絡絲說文曰籰收絲者也或作􅀈從角間聲今字從竹又從矍竹器從人執之矍矍然此籰之義也然必竅貫以軸乃適于用為理絲之先具也耕織圖詩云兒夫督機絲輸官趂時節向來催租瘢正為坐踰越獨來掉籰勤寧復辭腕脫辛勤夜未眠敗屋燈明滅經架牽絲具也先排絲籰于下上架橫竹列環以引衆緒總于架前經􅑉與牌同一人往來挽而歸之紖軸然後授之機杼前人織圖詩云素絲頭緒多羡君巧安排青鞋胡街切不動塵緩步交去來脉脉意欲亂眷眷首重回王言正如絲亦付經綸才緯織絲也車方言曰趙魏之間謂之歷鹿車東齊海岱之間謂之道軌今又謂繀音碎車通俗文曰織纎謂之繀蘇內切受緯曰莩其拊上立柱置輪輪之上近以鐡條中貫細筒乃周輪與筒繚環繩右手掉輪則筒隨輪轉左手引絲上筒遂成絲繀以充織緯孫德施賦云惟工藝之多門偉英麗乎創形擬老氏之一轂兮應天運以回行秉轉屈以成規兮不辭勞以自傾故其用同造物巧參天地軒轅垂衣因其以濟衮冕龍旗用康上帝勳存王室惠我皂𨽻觀其微風興于軸端霧雨散于􅭿輻制以靈木絡以竒竹規朝日以為圓兮凖暈月以造象若洪輪之在碓兮似蜘蛛之結網爾乃才藝妻妾工巧是嘉或織錦組或匠綾羅一作紗舒皓腕于輕輪兮換擬景乎鏡華絲成妙于指端清籟幽而相和象蟋蟀之鳴户兮類寒蟬之吟家絡車方言曰河濟之間絡謂之給郭璞注曰所以轉籰給事也說文云車柎方無切為柅易姤曰繫于金柅柅女履切金者堅剛之物柅者制動之主通俗文曰張絲曰柅蓋以脫軖之絲張于柅上上作懸鉤引致緒端逗于車上其車之制必以細軸穿籰措于車座兩柱之間謂一柱獨髙中為通槽以貫其籰軸之首一柱下而管其籰軸之末人既繩牽軸動則籰隨軸轉絲乃上籰此北方絡絲車也南人但習掉籰取絲終不若絡車安且速也今宜通用詩云軖絲張柅復相牽絡婦車成用具全座上通槽連簨臼軸頭引籰逗繩圈一鉤遞控防偏度獨縷依循入卧纒幾向華筵曾誤認箜篌人坐理氷絃織機織絲具也按黃帝元妃西陵氏曰嫘祖始勸蠶稼月大火而浴種夫人副禕而躬桑乃獻繭稱絲遂成織絍之功因之廣織以給郊廟之服見路史傅子曰舊機五十綜者五十躡六十綜者六十躡馬鈞者天下之名巧也患其遺日喪功乃易以十二躡今紅音工女織繒惟用二躡又為簡要凡人之衣去聲被于身者皆其所自出也王逸賦曰案此賦已經刪節織機功用大矣上自太始下訖羲皇案今本漢王逸賦無此三句帝軒龍躍伯余是創案今本作庶業是昌俯亶聖思案今本作俯覃聖思仰攬三光悟彼織女終日七襄案今本無此二句爰制布帛始垂衣裳于是取衡山之孤桐南嶽之洪樟賸復回轉刻象乾形大庭淡泊擬則川平光為日月蓋取昭明三軸列布上法台星兩驥齊首儼若將征方圓綺錯極妙窮竒兔耳跧伏若安若危猛犬相守竄身匿蹄髙樓雙峙下臨清池遊魚銜餌瀺灂其陂鹿盧並起織纎俱垂宛若星圖屈膝推移案今本作一往一來匪勞匪疲梭通俗文曰織具也所以行緯之莎蘇戈切藝苑曰陶侃嘗捕魚得一梭還插著壁有頃雷雨梭變赤龍躍去蓋梭得魚之象有化龍之義焉梅聖俞詩云給給機上梭往返如度日一經復一絲成寸遂成匹虛腹鋭兩端素手投未畢陶家挂壁間雷雨龍飛出砧杵搗練具也東宫舊事曰太子納妃有石砧一枚又搗亦作搗衣杵十荆州記曰秭歸縣有屈原宅女嬃廟搗衣石猶存蓋古之女子對立各執一杵上下搗練于砧其丁東之聲互相應答今易作卧杵對坐搗之又便且速易成帛也魏璀賦云細腰杵兮木一枝女郎砧兮石五彩聞後響而已續聽前聲而猶在夜如何其秋兮已半于是拽魯縞攘皓腕始于搖揚終于凌亂四振五振驚飛鴈之兩行六舉七舉遏彩雲而一斷隱髙閣而如動度遙城而如散夜有露兮秋有風杵有聲兮衣可縫佳人聽兮意何窮步逍遙于凉景暢容與于晴空黃金叉兮碧雲髮白素巾兮青女月佳人聽兮良未歇擘長虹而乍開凌倒景而將越是時也餘響未畢微影方流逶迤洞房半入宵夢窈窕間館方增客愁李都尉以胡笳動泣向子期以鄰笛增憂古人獨感于聽今者况兼乎秋案搗練賦此下尚有二聨此本節去願君無按龍泉色誰道明珠不可投農器圖譜十九纊絮門木棉附纊絮禦寒古今所尚然制造之法南北互有所長故特總輯庶知通用近世以來復以木棉為助今附于後絮車構木作架上控鉤繩滑車下置煮繭湯甕絮者掣繩上轉滑車下徹甕內鉤繭出沒灰湯漸成絮段莊子謂洴澼絖者疏云洴浮也澼漂也絖絮也古者纊絮綿一也今以精者為綿粗者為絮因蠶家退繭造絮故有此車煮之法常民藉以禦寒次于綿也彼有搗繭為胎謂之牽縭者較之車煮工拙懸絶矣詩云世有洴澼纊架構以車名下上輪繩滑牽聨甕繭烹濟貧寒可禦售業價還輕會遇不龜手百金為爾榮撚綿軸制作小碢或木或石上插細軸長可尺許先用叉頭挂綿左手執叉右手引綿上軸懸之撚作綿絲就纒軸上即為紬縷閨婦室女用之可代紡績之功詩云朵綿髙執玉叉頭細作垂絲撚復收待得功成付機杼不知誰解衣去聲新紬綿矩以木框方可尺餘用張繭綿是名綿矩又有揉竹而彎者南方多用之其綿外圓內空謂之猪肚綿及有用大竹筒謂之筒子綿就可改作大綿裝時未免扡池解切折物也裂北方大小用瓦蓋各從其便然用木矩者最為得法酈善長水經注曰房子城西出白土細滑如膏可用濯綿霜鮮雪曜異于常綿世俗云房子之纊也抑亦類蜀郡之錦得江津矣今人張綿用藥使之膩白亦其理也但為利者因而作僞反害其真不若不用之為愈詩云有繭盈頃筐置矩臨清溪綱繀由我張邉幅須爾齊用裝身上衣輕暖衷晴霓迆邐棄墻角未可同筌蹄木棉序附桑土既蠶之後唯以繭纊為務殊不知木棉之為用夫木棉産自海南諸種藝制作之法駸駸北來江淮川蜀既獲其利至南北混一之後商販于此服被漸廣名曰吉布又曰棉布異物志云木棉之為布曰班布繁縟多巧者曰城次粗者曰文縟又次粗者名曰烏驎其幅匹之制特為長闊茸密輕暖可扺繒帛又為毳服􅂒假足代本物按裴淵廣州記云蠻夷不蠶採木棉為絮又諸畨雜志云木棉吉貝木所生占城闍婆諸國皆有之今已為中國珍貨但不自本土所産不能足用且比之桑蠶無採飬之勞有必收之效埒之枲苧免績緝之工得禦寒之益可謂不麻而布不繭而絮雖曰南産言其適用則北方多寒或繭纊不足而裘褐之費此最省便夫種植之法已載穀譜製造之具復列于此庶逺近滋習助桑麻之用兼蠻夷之利將自此始矣木棉攪車木棉初採曝之隂或焙乾南州異物志班布吉貝木所生熟時狀如鵝毳細過絲綿中有核如珠玽公後切用之則治出其核昔用輾軸今用攪車尤便夫攪車四木作框上立工小柱髙約尺五上以方木管之立柱各通一軸軸端俱作掉拐軸末柱竅不透二人掉軸一人喂上棉英二軸相軋則子落于內棉出于外比用輾軸工利數倍今特圖譜使民易效凡木棉雖多今用此法即去子得棉不致積滯詩云二木相摩運兩端宛如造物沒機關霜棉山積珠論斗只在思樞柄用間木棉彈弓以竹為之長可四尺許上一截頗長而彎下一截稍短而徑控以繩絃用彈棉英如彈氈毛法務使結者開實者虛假其功用非弓不可詩云主射由來彀此弓豈知弦法有他功却將一掬香棉朵彈作晴雲滿座中木棉捲筳徒丁切淮民用薥黍梢莖取其長而滑今他處多用無節竹條代之其法先將棉毳條于几上以此筳捲而扞之遂成棉筒隨手抽筳每筒牽紡易為勻細皆捲筳之效也詩云折得修筳捲毳茸就憑瑩滑脫圓筒作棉匠具雖多巧獨有天然造物功木棉紡車其制比麻苧紡車頗小夫輪動弦轉莩繀隨之紡人左手握其棉筒不過二三續于莩繀牽引漸長右手均撚俱成緊去聲縷就繞繀上欲作線織置車在左再將兩繀棉絲合紡可為線棉南州異物志曰吉貝木熟時狀如鵝毳但紡不績在意小抽牽引無有斷絶此即紡車之用也詩云莩繀隨輪共一弦車頭霜縷入周旋已知單緊去聲勻堪愛更欲雙聨作線棉木棉撥車其制頗肖麻苧蟠車但以竹為之方圓不等特更輕便按舊說先將紡訖棉繀于稀糊盆內度過稍乾然後將棉繀頭縷撥于車上遂成棉􅀈詩云造形隨意作方圓終日悠悠聽撥旋待爾􅀈成足經緯却教機杼得功全木棉軖床其制如所坐交椅但下空一軖四股軖軸之末置一掉枝上椅竪列八繀下引棉絲動轉掉枝分絡軖上絲􅀈既成次第脫䣃比之撥車日得八倍始出閩建今欲傳之他方同趨省便詩云八繀棉絲絡一軖巧憑坐椅作軖床試將觸類深思索麻苧鄉中用亦良木棉線架以木為之下作方座長濶尺餘卧列四繀座上鑿置獨柱髙可二尺餘柱下橫木長可二尺用竹篾均列四彎內引下座四繀紡于車上即成棉線舊法先將此繀絡于籰上然後紡合今得此制甚為速妙詩云絲牽卧繀上拘聮雙縷俱成合線棉便向車頭施捷巧紡人特喜勝于先木棉總具木棉總具其法自撥車軖床棉􅀈既成用漿糊煮過仍以木杖兩端掣之日㬠不時手搓乾濕得所絡于籰上而後經緯制度一倣紬類織絍機杼並與布同詩云棉絲經絡比紬工織絍機張與布同既可為衣代紬布便知器用兩相通農書卷二十一
