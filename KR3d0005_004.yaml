body:
  text: 農書卷四元王禎撰農桑通訣四勸助篇第十書曰相小人厥父母勤勞稼穡厥子不知稼穡之艱難乃逸盖惡勞好逸者常人之情偷惰茍且者小人之病上之人茍不眀示賞罰以勸助之則何以奬其勤勞而率其怠勌音倦歟周禮載師凡宅不毛者有里布謂罰以一里二十五家之泉也田不耕者出屋粟謂罰以三家之稅粟也凡民無職事者出夫家之征謂雖閑民猶當出夫稅家稅也閭師言無職者出夫布不畜者祭無牲不耕者祭無盛不樹者無槨不蠶者不帛不績者不衰先王之於民如此豈為厲農夫哉凡欲振發而飭其蠱弊使之率作興事耳是以地無遺利民無趨末田野治而禾稼遂倉廪實而府庫充則斯民寧復有餓莩流離之患哉月令孟春之月命田司相去聲土地所宜五榖所植以教導民必躬親之孟夏勞去聲農勸民無或失時命農勉作無休於都仲秋乃勸種麥無或失時其有失時行罪無疑季冬命田官告民出五種命農計耦耕事古人之於農盖未嘗一日忘也後世勸助之道不眀其民往往去本而趨末故諺曰以貧求富農不如工工不如商刺繡紋不如倚市門此說一興天下之民男子棄耒耜而爭販鬻婦人舍機杼而習歌舞惰㳺末作習以成俗一遇凶飢食不足以充其口腹衣不足以蔽其身體懐金形鵠立以待盡者比比皆是善乎王符之言曰一夫耕百人食之一婦桑百人衣之以一奉百誰能供之時君世主亦有加意於農桑者大則營田有使次則勸農有官似知所以勸助矣然而田野未盡闢倉廩未盡實游惰之民未盡歸農何哉意者徒示之以虛文而未施之以實政歟古者春而省耕非但行阡陌而已資力不足者誠有以補之也秋而省歛非但觀刈穫而已食用不給者誠有以助之也成王適于田以其婦子之饁彼南畆攘其左右而嘗其㫖否愛民如此田野安得而不治黍稷安得而不豐文帝所下三十六詔力田之外無他語减租之外無異說逐末之民安得而不務本太倉之粟安得而不紅腐此上之人重農如此至於承流宣化之官又在於守令之賢各盡其職勤加勸課務求實效及覽古之循吏如黄覇之治潁川勸種樹樹謂樹藝五榖龔遂之治渤海課農耕何武行部必問墾田茨充為令益治桑柘召信臣治南陽開溝瀆為民利任延治九真易射獵為牛耕張堪守漁陽開稻田皇甫隆治燉煌教耬犂此先賢勸助之迹載諸史冊今略舉其著者皆可為後世治民之良規誠使人君能法周成漢文之治以表倡於上公卿守令能法龔黄諸賢之事以奉承於下省徭役以寛民力驅游惰以趨農業又何患民之不勸案此篇一遇凶飢至又何患民之不勸共四百六十四字原本誤入収穫篇盖謂収之欲速也之下謹改正田之不治乎今天下之民寒而思衣皆知有桑麻之事飢而思食皆知有稼穡之功則男務耕鋤女事紡織盖有不待勸而後加勤者况乎諄諄然諭之懇懇然勞之哉又况加實意行實恵驗實事課實功哉如或不然上之人作無益以妨農時歛無度以困民力般樂怠傲不能以身率先於下雖課督之令家至而户說之民亦不知所勸也故古者天子親耕皇后親蠶下逮公卿侯伯之國與夫守令之家俱當親執耒耜躬務農桑以率其民如此野夫田婦庸有不勤者乎今夫在上者不知衣食之所自惟以驕奢為事不思已之日用寸絲口飯皆出於野夫田婦之手甚者苛歛不已朘削脂膏以肥己寧肯勉力以勸之哉今長官皆以勸農署銜農作之事巳猶未知安能勸人借曰勸農比及命駕出郊先為文移使各社各鄉預相告報期會齎歛祇為煩擾耳桞子厚有言雖曰愛之其實害之雖曰憂之其實讎之種樹之喻可以為戒庶長民者鑒之更其宿弊均其恵利但具為教條使相勉勵不期化而民自化矣又何必命駕鄉都移文期會欺下誣上而自徼功利然後為定典哉敢告於有司請著為常法以免親詣煩擾之害斯民幸甚収穫篇第十一孔氏書傳曰種曰稼歛曰穡種歛者嵗之終始也食貨志云力耕數耘収穫如盗賊之至盖謂収之欲速也故物理論曰稼農之本穡農之末本輕而末重前緩而後急稼欲熟収欲速此良農之務也記曰種而不耨耨而不穫譏其不能圖功攸終也是知収穫者農事之終為農者可不趨時致力以成其終而自廢其前功乎月令仲秋之月命有司趨民収歛季秋之月農事備収孟冬之月循行積聚無有不歛至於仲冬農有不収藏積聚者取之不詰皆所以督民収歛使無失時也禹貢曰二百里納銍三百里納秸服盖納銍者截禾穗而納之納秸者去穗而刈其藳納之也詩言刈穫之事最多臣工詩曰命我衆人庤乃錢鎛奄觀銍艾銍艾二器見農器譜七月詩云九月築場圃十月納禾稼言農工之備也載芟之詩云載穫濟濟有實其積萬億及秭良耜之詩云穫之挃挃積之栗栗其崇如墉其比如櫛以開百室皆言収穫之富也凡農家所種宿麥早熟最宜早収故韓氏直說云五六月麥熟帶青収一半合熟収一半若候齊熟恐被暴風急雨所催必致抛費每日至晚即便載麥上場堆積用苫宻覆以防雨作如搬載不及即於地内苫積天晴乘夜載上場即攤一二車薄則易乾碾過一遍翻過又碾一遍起稭下塲揚子収起雖未净直待所収麥都碾盡然後将未净稭再碾如此可一日一場比至麥収盡已碾訖三之一矣大抵農家忙併無似蠶麥古語云収麥如救火若少遲慢一值隂雨即為災傷遷延過時秋苗亦悞鋤治今北方収麥多用釤杉去聲刄麥綽釤麥覆於腰後籠内籠滿則載而積於場一日可収十餘畆較之南方以鎌刈者其速十倍麥籠麥綽釤刄並見農具譜凡北方種粟秋熟當速刈之齊民要術云収榖而熟速刈乾速積刈早則鎌傷刈晚則穗折遇風則収減濕積則藁爛積晚則耗損連雨則生耳南方収粟用粟鋻古甸反摘穗北方収粟用鎌并藁刈之粟鋻與鎌並見農器譜田家刈畢稇苦本切而束之以十束積而為􅀈力科切然後車載上場為大積積之視農功稍隙解束以旋旋鑱士咸切穗撻之南方水地多種稻秫早禾則宜早収六月七月則収早禾其餘則至八月九月詩云十月穫稻齊民要術曰稻至霜降穫之此皆言晚禾大稻也故稻有早晚大小之别然江南地下多雨上霖下潦劖刈之際則必湏假之喬扦多則置之笐架待晴乾曝之可無耗損之失喬扦笐架見農器譜齊民要術云収禾之法熟過半斷之刈穄欲早刈黍欲晚皆即濕踐穄踐訖即蒸而浥之黍宜曬之令燥凡麻有黄𡋯則刈刈畢則漚之漚麻法見榖譜刈菽欲晚葉落盡然後刈脂麻欲小束以五六束為一叢斜倚之候口開乘車詣田抖擻還叢之三日一打四五遍乃盡耳粱秫収刈欲晚早刈損實大抵北方禾黍其収頗晚而稻熟亦或宜早南方稻秫其収多遲而陸禾亦或宜早通變之道宜審行之今按古今書傳所載南北習俗所宜具述而偹論之庶不失早禾先後之節也夫田家作苦令収穫以時了無遺滯黍稷富倉箱之望足慰勤勞鄉社結閭里之歡逓相慶勞有以見國家龍恩之所被而民俗樂業之無窮也蓄積篇第十二古者三年耕必有一年之食九年耕必有三年之食雖有旱乾水溢民無菜色豈非節用預偹之效歟冡宰眂音視年之豐凶以制國用量入以為出祭用數之仂而又以九貢九賦九式均節之取之有制用之有度此理財之法有常而國家之蓄積所以無闕也國無九年之蓄曰不足無六年之蓄曰急無三年之蓄曰國非其國矣蓄積者豈非有國之先務也周禮倉人掌粟入之藏辨九榖之物以待邦用若榖不足則止餘灋用有餘則藏之以待凶而頒之遺人掌邦之委積以待施惠鄉里之委積委積並去聲以恤民之囏阨門闗之委積以養老孤郊里之委積以待賔客野鄙之委積以待羇旅縣都之委積以待凶荒以此見先王蓄積皆為民計非徒曰藏富於國也彼有損下以自益剝民以自豐如商王鉅橋之粟隋人洛口之倉所積雖多豈先王預備憂民之意哉大抵無事而為有事之備豐嵗而為歉嵗之憂是故國有國之蓄積民有民之蓄積當粒米狼戾之年計一嵗一家之用餘多者倉箱之富餘少者儋音檐石之儲莫不各節其用以濟凶乏此固知堯之時有九年之水湯之時有七年之旱而國亡捐瘠所為蓄積多而備先具者豈皆藏於國哉盖必有藏於民者矣今之為農者見小近而不慮久逺一年豐稔沛然自足侈費妄用以快一時之適所収榖粟耗竭無餘一遇小歉則舉貸出息於兼并之家秋成倍稱而償之嵗以為常不能振㧞其間有収刈甫畢無以餬口者其能給終嵗之用乎嘗聞山西汾晋之俗居常積榖儉以足用雖間有饑歉之嵗庶免夫流離之患也傳曰収歛蓄藏節用御欲則天不能使之貧信斯言也近世利民之法如漢之常平倉榖賤則增價糴之不至於傷農榖貴則减價而糶之不使之傷民唐之義倉計墾田頃畆多寡豐年納榖而藏之凶年出榖以賙貧乏官為主之務使均平是皆歛其餘以濟不足雖遇儉嵗而不憂饑殍也然嘗考之漢史賈生言於文帝曰漢之為漢㡬四十年公私之積猶可哀痛彼一時也自文帝躬行節儉以化天下至景帝末年太倉之粟陳陳相因而民亦富庶人徒見古之蓄積常有餘後之蓄積常不足豈天之生物不如古之多人之謀事不如古之智盖古之費給有限而後之費給無窮無怪乎有餘不足之不同也誠使天下之耕者因人力之所至盡地力之所出食之以時用之以禮則男有餘粟女有餘布上之人復眀大學生財之道以御之公私兩裕君民俱足又何患蓄積之不如古哉故歴論之敢以此言佐時政云農書卷四
