body:
  text: 農書卷十八元王禎撰農器圖譜十三灌溉門灌溉之利大矣江淮河漢及所在川澤皆可引而及田以為沃饒之資但人情拘於常見不能通變間去聲有知其利者又莫得其用之具今特多方捜摘既述舊以增新復隨宜而制物或設機械而就假其力或用挑浚而永頼其功大可下潤於千頃髙可飛流於百尺架之則逺逹穴之則潛通世間無不救之田地上有可興之雨其用水有法槩可見矣故輯諸篇庻資農事云水柵排木障水也集韵云柵倉格切說文云竪木立柵也若溪岸稍深田在髙處水不能及則於溪之上流作柵遏水使之旁出下溉以及田所其制當流列植樹樁樁上枕以伏牛擗脾役切以拉盧合切木仍用塊石髙壘衆楗斜撐平聲以邀水勢此柵之小者如秦雍之地所拒川水率用巨柵其䝉利之家嵗例量力均辦所需工物乃深植樁木列置石囤長或百歩髙可㝷丈以横截中流使傍入溝港凡所溉田畆計千萬號為陸海此柵之大者其餘各處境域雖有此水而無此柵非地利素不彼若葢工所未及也今特列於圖譜以示大小規制庶彼方傚之俾水為有用之水田為不旱之田由此柵也詩云山源洄洑溪澗空兩岸對峙直里切如崇墉傍田救旱無由供上流作障憑地崇支分下灌畦磴重卧邀沛澤真伏龍復有川水波濤洪枚樁列植當要衝仍制石廪如合縦即容切要約中流無必東穿渠逺溉波溶溶至今陸海稱秦中畎澮距川惟禹功岡閒濬治方成農後世拒水能傍通却資沃灌開田封向來陂堨皆餘蹤海内萬水空朝宗餘波倘使膏潤同縱有湯旱無饑凶坐令嵗嵗歌時豐富民有具今始逄此柵功利将無窮水閘乙甲切開閉水門也間去聲有地形髙下水陸不均則必跨據津要高築堤埧匯水前立斗門甃石為壁疊木作障以備啟閉如遇旱涸則撤水灌田民頼其利又得通濟舟楫轉上聲激碾磑五對切實水利之總揆也詩云陂岸人呼古閘頭萬夫工役見重修禹門似是崇三級巫峽還同束衆流少擘溝渠供碾磑每通膏澤到田疇休将層閾輕抽去恐有他時旱暵憂陂塘説文曰陂野池也塘猶堰也陂必有塘故曰陂塘周禮以瀦蓄水以防止水說者謂瀦者蓄流水之陂也防者瀦旁之隄也今之陂塘即與上同考之書傳廬江有芍七畧切陂潁川有鴻隙陂廣陵有雷陂愛敬陂陽平沛郡有鉗廬陂餘難徧舉其各溉田大則數千頃小則數百頃後世故跡猶存因以為利今人有能别度地形亦效此制足溉田畆千萬比作田圍特省工費又可畜育魚鼈栽種菱藕之類其利可勝言哉詩云陂水塘髙復袤延拒流寧使迅如川斗門解洩三時旱尺澤能添十倍田裴延雋復修燕地故戾陵諸堨溉田為利十倍沃野號稱今陸海煙波分得小江天便當卜此成歸計魚稻鄉中好度年水塘即洿池也因地形坳下用之瀦蓄水潦或修築甽堰以備灌溉田畆兼可畜育魚鱉栽種蓮芡俱各獲利累倍大凡陸地平田别無溪澗井泉以溉田者救旱之法非塘不可夫江淮之間在在有之然官民異屬各為永業嵗收産利誠用水之多便者詩云自是江淮地利同預瀦塘水助吾農一泓積潦能施潤數頃良疇儘可供頓使稻禾無旱涸更教魚鱉足涵容年來無闕重脩築都水田官不爾慵翻車甫煩切今人謂龍骨車也魏畧曰馬鈞居京都城内有地可為園無水以灌之乃作翻車令兒童轉上聲之而灌水自覆漢靈帝使畢嵐作翻車設機引水洒南北郊路則翻車之制又起於畢嵐矣今農家用之溉田其車之制除壓欄木及列檻樁外車身用板作槽長可二丈闊則不等或四寸至七寸案四寸七寸制太狹疑有誤髙約一尺槽中架行道板一條隨槽闊狹比槽板兩頭俱短一尺用置大小輪軸同行道板上下通週以龍骨板葉其在上大軸兩端各帶拐木四莖置於岸上木架之閒人憑架上踏動拐木則龍骨板隨轉去聲循環行道板刮水上岸此翻車之制關楗頗多必用木匠可易成造其起水之法若岸髙三丈有餘可用三車中間去聲小池倒都皓切水上之足救三丈已上髙旱之田凡臨水地段皆可置用但田髙則多費人力如數家相助計日趨工俱可濟旱水具中機械巧㨗惟此為最東坡詩云翻翻聨聨銜尾鴉犖吕角切犖确胡角切确蛻骨蛇分畦翠浪走雲陣刺水緑秧抽稻芽洞庭五月欲飛沙鼉鳴窟中如打衙天公不念老農泣喚取阿香推雷車筒車流水筒輪凡制此車先視岸之髙下可用輪之大小須要輪髙於岸筒貯於槽乃為得法其車之所在自上流排作石倉斜擗水勢急凑筒輪其輪就軸作轂軸之兩傍閣於樁柱山口之内輪輻之間除受水板外又作木圏縛繞輪上就繫竹筒或木筒謂小輪則用竹筒大輪則用木筒於輪之一週水激輪轉衆筒兠水次第下傾於岸上所横木槽謂之天池以灌田稻日夜不息絶勝人力智之事也若水力稍緩亦有木石制為陂柵横約溪流旁出激輪又省工費或遇流水狹處但壘石斂水凑之亦為便易此筒車大小之體用也有流水處俱可置此但恐他境之民未始經見不知制度今列為圖譜使倣傚通用則人無灌溉之勞田有常熟之利輪之功也張安國詩云象龍喚不應竹龍起行雨聨綿十車輻咿軋百舟櫓轉此大法輪救汝旱嵗苦横江鎻巨石濺瀑叠城鼓神機日夜運甘澤髙下普老農用不知瞬息了千畆抱孫帶黄犢但看翠浪舞餘波及井臼舂玉飲酥乳江吴誇蹋車足繭要背僂此樂殊不知吾歸當教汝牛轉翻車如無流水處用之其車比水轉翻車卧輪之制但去下輪置於車傍岸上用牛拽轉輪軸則翻車隨轉比人踏功将倍之與後水轉翻車皆出新制欲逺近傚之俱省工力詩云日日車頭踏萬回重勞人力亦堪哀從今壠首澆田浪都自烏犍領上來水轉張兖切後同翻車其制與人踏翻車俱同但於流水岸邊掘一狹塹置車於内車之踏軸外端作一竪輪竪輪之傍架木立軸置二卧輪其上輪適與車頭竪輪輻支相間去聲乃擗水傍激下輪既轉則上輪隨撥車頭竪輪而翻車隨轉倒水上岸此是卧輪之制若作立輪當别置水激立輪其輪輻之末復作小輪輻頭稍闊以撥車頭竪輪此立輪之法也然亦當視其水勢隨宜用之其日夜不止絶勝踏車東坡踏車詩畧云天公不念老農泣喚取阿香推雷車范至能詩云地勢不齊人力盡丁男多在踏車頭此皆憫人事之勞也今以水力代之工役既省所利又溥其殆仁智事歟詩云從來激浪轉筒輪却恨翻車智未仁誰識人機盗天巧因憑水力貸疲民衛案驢一名衛轉筒車即前水轉筒車但於轉軸外端别造竪輪竪輪之側岸上復置卧輪與前牛轉翻車之制無異凡臨坎井或積水淵潭可用澆灌園圃勝於人力汲引詩云世間機械巧相因水利居多用在人可是要津難必遇却将畜力轉筒輪髙轉筒車其髙以十丈為凖上下架木各竪一輪下輪半在水内各輪徑可四尺輪之一週兩傍髙起其中若槽以受筒索其索用竹均排三股通穿為一隨車長短如環無端索上相離五寸俱置竹筒筒長一尺筒索之底托以木牌長亦如之通用鉄線縛定隨索列次絡於上下二輪復於二輪筒索之間架刳口孤切木平底行槽一連上與二輪相平以承筒索之重或人踏或牛拽轉上輪則筒索自下兠水循槽至上輪輪首覆水空筒復下如此循環不已日所得水不减平地車戽若積為池沼再起一車計及二百餘尺如田髙岸深或田在山上皆可及之今平江虎邱寺劍池亦類此制但小小汲飲不足溉田故不録此近創此法已經較試庻用者述之所轉上輪形如軭制易繳筒索用人則於輪軸一端作掉枝用牛則制作竪輪如牛轉翻車之法或於輪軸兩端造作拐木如人踏翻車之制若筒索稍慢則運移上輪其餘措置當自忖度不能悉陳詩云戽車㝷丈舊知名誰料飛空效建上聲瓴力丁切一索繳輪升碧澗衆筒兠水上青㝠溉田農父無虞旱負汲山人頼乆寧顛倒救時霖雨手却從平地起清泠水轉髙車遇有流水岸側欲用髙水可用此車其車亦髙轉筒輪之制但於下輪軸端别作竪輪傍用卧輪撥之與水轉翻車無異水輪既轉則筒索兠水循槽而上餘如前例又須水力相稱如打輾磨之重然後可行日夜不息絶勝人牛所轉上聲此誠秘術今表暴之以諭來者詩云通渠激浪走轟雷激轉筒車幾萬回水械就携多水上天池還㵼半天來竹龍解吐無雲雨前人有象龍喚不應竹龍起行雨之句旱魃潛消此地灾安得臨流施此技樓居滌去暑天埃今都城已有髙車用水飛上樓閣散若霧雨頗聞費力故有上句連筒以竹通水也凡所居相離水泉頗逺不便汲用乃取大竹内通其節令本末相續連延不斷閣之平地或架越澗谷引水而至又能激而髙起數尺注之池沼及庖湢之間如葯畦蔬圃亦可供用杜詩所謂連筒灌小園詩云刳竹作連筒流泉一脉通勢雖由上下用不限西東逺借居人便常資沛澤功伊誰憑好手扶赴卧龍公架槽木架水槽也間有聚落去水既逺各家共力造木為槽遞相嵌接不限髙下引水而至如泉源頗髙水性趨下則易引也或在窪下則當車水上槽亦可逺逹若遇髙阜不免避礙或穿鑿而通若遇坳險則置之叉木駕空而過若遇平地則引渠相接又左右可移隣近之家足得借用非惟灌溉多便抑可瀦蓄為用詩云刳木作槽身架水自泉口逺引無崇卑量移能左右梯空越澗壑穴髙穿培塿人能禦天災豈非霖雨手戽斗戽侯古切挹水器也唐韵云戽抒上與切也抒水器挹也凡水岸稍下不容置車當旱之際乃用戽斗控以雙綆兩人掣之抒水上岸以溉田稼其斗或柳筲或木罌從所便也詩云虐魃乆為妖田夫心獨苦引水瀦陂塘爾器數吞吐繘居律切綆古杏切屢挈提項背頻傴僂搰搰古忽切弗暫停俄作甘澤溥焦槁意悉甦物用豈無補毋嫌量云小于中有倉庾刮車上時掌切水輪也其輪髙可五尺輻頭闊止六寸如水陂下田可用此具先於岸側掘成峻槽與車輻同闊然後立架安輪輪輻半在槽内其輪軸一端擐以鉄鈎木拐一夫執而掉之車輪隨轉則衆輻循槽刮水上岸溉田便於車戽詩云創物須憑智巧先泝流能使迅如川一輪隨手供翻轉衆輻循槽入斡旋已藉機衡欹矮岸頓教膏澤上枯田桔橰戽斗雖云舊試向車頭較湧泉桔橰桔古屑切橰古刀切挈水械也通俗文曰桔橰機汲水也說文曰桔結也所以固屬橰臯也所以利轉又曰臯緩也一俯一仰有數存焉不可速也然則桔其植者而橰其俯仰者與荘子曰子貢過漢隂見一丈人方将為圃畦鑿隧而入井抱甕而出灌搰搰然用力甚多而見功寡子貢曰有械於此一日浸百畦鑿木為機後重前輕挈水若抽數如沃湯案荘子作數如泆湯其名為橰又曰獨不見夫桔橰者乎引之則俯舍之則仰彼人之所引非引人者也故俯仰不得罪於人今瀕水灌園之家多置之實古今通用之器用力少而見功多者王契賦云智者濟時以設功強名之曰桔橰何樸斵之太簡俾役力兮不勞作固兮為我之身臨深兮是我之理若虞機張如鳥斯企山有木用工見汲引之能巽乎水自我成潤物之美不羸瓶而上出何抱甕之勤止執虚趨下雖自屈於勞形持滿因髙終見伸於知己鄭圃之側潘園之旁溝塍綺錯畎畝相望帶嘉蔬兮映芳草背古岸而靣垂楊欲建標以取别能舉直而自強若垂竿兮匪釣象爟火兮無光不忘機以棄俗乃習坎而為常隨用舍而俯仰應淺深而短長重泉之水兮不滯九畹之蘭兮益芳雖欲絶學以棄智其若得存而失亡歌曰大道隠兮世人薄無為守拙空寂寞老圃之道可行何耻見幾而作轆轤轆力木切轤力胡切纒綆械也唐韵云圓轉木也集韵作櫝轤汲水木也井上立架置軸貫以長轂其頂嵌以曲木人乃用手掉轉上聲纒綆於轂引取汲器或用雙綆而逆順交轉所懸之器虚者下盈者上更相上下次第不輟見功甚速凡汲於井上取其俯仰則桔橰取其圎轉則轆轤皆挈水械也然桔橰綆短而汲淺獨轆轤深淺俱適其宜也仲子陵賦云木徳標象金行效事與桔橰之用則同比簨虡之形不異井之弗幕瓶亦汔至當於要路之津存乎兼濟之地忠也陳力而就列孝也致飬而不匱圓轉則智士之心通流乃仁者之志故轆轤之體一有君子之道四觀其得位攸處居中特立從繩以寸工假器以尺汲自上至下者念兹以有成虚往實來者釋此而何執利物不言利急人之所急捨之則其道可卷而懷用之則其功可俯而給案唐仲子陵賦作用之則其功可俯而拾及夫挈瓶所施懸綆所統崇朝以聞乎三㨗永日何啻乎七縱為萬人仰與天下共其靜也則無機之機其動也則有用之用徳必不孤賢亦有凖泉䝉者道為之慶案唐仲子陵賦慶作發井深者心為之軫案易井渫不食為我心惻深字當是渫字之誤無忘乎牽攣葢存乎汲引斯亦惠而不費乎賢人之業於是乎盡也瓦竇泄水器也又名函管以瓦筒兩端牙鍔五各切相接置於塘堰之中時放田水須預於塘前堰内叠作石檻以䕶筒口令可啟閉不然則水湊其䖏非惟難於窒塞抑亦衝激滲漏不能乆穏必立此檻其竇乃成唐韋丹為江南西道觀察使築堤扞江竇以疏漲此雖竇之大者亦其類也詩云坡塘泄水瓦為筒好在田夫啟閉中守口如瓶常處靜剸犀脫鞘忽為通髙低獨限淵源地早晚能施沛澤功若道此中能救旱只疑窟宅接龍宫石籠力董切又謂之卧牛判竹或用藤蘿或木條編作圈眼大籠長可三二丈髙約四五尺以籖樁止之就置田頭内貯塊石用擗暴水或相接連延逺至百歩若水勢稍髙則壘作重籠亦可遏止如遇隈岸盤曲尤宜周折以禦犇浪併作洄流不致衝蕩埂岸農家瀕溪䕶田多習此法比於起叠堤障甚省工力又有石𥫱擗水與此相類詩云誰編藤竹作長籠盧紅切塊石填來勢自雄螮丁計切蝀丁孔切有形横巨􅒓鯤鯨無力戰秋風波濤已捲犇騰勢壠畆都歸扞禦功擬喚六丁鞭爾去若為能障百川東浚渠浚與濬同開治也深也凡川澤之水必開渠引用可及於田考之古有溝洫畎澮以治田水書云濬畎澮距川是也逮夫疏鑿已逺井田變古後世則引川水為渠以資沃灌按史記秦鑿涇為渠又關西有鄭國白公六輔之渠外有龍首渠河内有史起十二渠范陽有督亢渠河北有廣戾渠朗州有古史渠今懷孟有廣濟渠俱各溉田千百餘頃利澤一方永無旱暵所謂人能勝天豈不信哉後之人有能因其地利水勢繼此而作益國富民可見速效凡長民者宜審行之詩云疏鑿為渠趁地形昔時遺跡見經營井田既廢阡陌作水利還從畚臿成㨗要濟時通漕運㝷常决雨致豐盈即將導逹為長䇿願溉膏腴富上京漢武帝時白公復穿渠溉田民得饒足其歌畧曰鄭國在前白渠起後舉臿如雲决渠為雨且溉且糞長我禾黍衣食京師億萬之口今燕地有後魏裴延儁所修舊督亢渠及故戾陵諸堨溉田百萬餘畆遺跡猶在故有上句隂溝行水暗渠也凡水陸之地如遇髙阜形勢或隔田園聚落不能相通當於川岸之傍或溪流之曲穿地成穴以磚石為圏去聲引水而至若别無隔礙則當踏視地形用䇿索度其髙下及經由䖏所畫為界路先引濬犁耕過後復浚掘及作甃穴上覆元土亦是一法如灌溉之餘常流不絶又可蓄為魚塘蓮蕩其利亦博或貫穿域邑巷陌及注之園囿池沼悉周於用雖逺近大小深淺曲直不同然皆洑流内逹膏澤傍通水利之中最為永便此皆泉源在上或在平地易以通流如水在溝下當車水上之溉田則一也或遇田澇則反能撤水下之此又隂溝用水之變法詩云川陸由來迥不同豈知穴地得潛通深邀别境無窮力逺濟吾鄉不旱功花徑有同流暗水桃源誤認出殘紅却嗟疏鑿勞民力安得鞭驅萬鬼工井穴地出水也說文曰清也易曰井冽寒泉食甃之以石則潔而不泥汲之以器則飬而不窮井之功大矣按周書云黄帝穿井又世本云伯益作井堯民鑿井而飲湯旱伊尹教民田頭鑿井以溉田今之桔橰是也此皆人力之井也若夫巖穴泉竇流而不窮汲而不竭此天然之井也皆可灌溉田畆水利之中所不可闕者薛能詩云源逺匠難㝷加欄底更深汲新聞土氣鑿徹見天心滴亂瓶初發痕移甃漸沉雲雷如震用飛出便為霖水篣薄庚切集韵云竹箕也又籠也夫山田利於水源在上間有流泉飛下多經磴級不無混濁泥沙淤壅畦埂農人皆編竹為籠或木條為捲芭承水透溜乃不壞田詩云瀑布中懸䕶土沙飛流聚沫白生華即㸔器用成天巧積雪巖前走浪花農書卷十八
