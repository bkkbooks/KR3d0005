body:
  text: 農書卷十四元王禎撰農器圖譜五銍艾門傳曰種曰稼斂曰穯稼為農之本穡為農之末本輕而末重先緩而後急故農法曰熟欲速穫此銍艾等器所以為田農收斂之要務也仍以斧鋸等附亦農事之不可緩者銍知栗切穫禾穗刃也臣工詩曰奄觀銍艾書禹貢曰二百里納銍注刈禾半藁也小爾雅云截穎謂之銍截穎即穫也據陸氏釋文云銍穫禾短鎌也纂文云江湖之間以銍為刈說文云此則銍器斷禾聲也故曰銍管子曰一農之事必有一椎一銍然後成為農此銍之歷見于經傳者如此誠古今必用之器也詩云制形類短鐮名義因聲聞總秸既異賦禾藁惟中分雖云一鉤鐡解空千畝雲小材有大用乘時策竒勳茍無遽棄捐磨厲以須君艾魚肺切穫器今之􅧉鐮也方言刈鉤江淮陳楚之間謂之銘音昭或謂之鐹音果自關而西或謂之鉤或謂之鐮或謂之鍥音結詩奄觀銍艾陸氏釋文音乂芟草亦作刈賈策若艾草菅注艾讀曰刈古艾從草今刈從刀字宜通用詩云艾也著周詩一物兩用備始資芟蔓草終賴斂秉穟磨淬擬工利收穫疾寇至毋謂雪翻匙腰月棄塵翳鐮力詹切刈禾曲刀也釋名曰鐮亷也薄其所刈似亷者也又作鎌禮剃氏掌殺草春始生而萌之夏日至而夷之鄭康成謂夷之鉤鐮迫地芟之也若今取茭矣風俗通曰鐮刀自揆積芻蕘之效然鐮之制不一有佩鐮有兩刃鐮有袴鐮有鉤鐮有鐮柌鐮柄楔其刃也之鐮皆古今通用芟器也詩云利器從來不獨工鐮為農具古今同芟餘禾稼連雲逺除去荒蕪捲地空低控一鉤長似月輕揮尺刃捷如風因時殺物皆天道不爾何收嵗杪功推鐮斂禾刃也如蕎麥熟時子易焦落故制此具便於收斂形如偃月用木柄長可七尺首作兩股短叉架以橫木約二尺許兩端各穿小輪圓轉中嵌鐮刀前向仍左右加以斜杖謂之蛾眉杖以聚所劖之物凡用則執柄就地推去禾莖既斷上以蛾眉杖約之乃回手左擁成􅀈以離舊地另作一行子既不損又速於刀刈數倍此推鐮體用之效也詩云北方寒早多晚木赤莖烏粒連山阿霜餘日薄熟且過脆落不耐揮刈何因物制器用靡他田夫已見伐長柯一鉤偃月鐮新磨置之叉頭行兩碢仍加修杖雙眉蛾推擁捷勝輪走坡左捩忽若持橫戈原頭積􅀈雲長拖秋成助斂知時和欲充糲食無飢魔北風捲地翻長河此時鐮也收功多試向田翁唱此歌粟鋻古賢切截禾頴刃也集韻云鋻剛也其刃長寸許上帶圓銎穿之食指刃向手內農人收穫之際用摘禾穗與銍形制不同而名亦異然其用則一此特加便捷耳詩曰截然小刃帶圓銎禾頴還分掌握中總道詩人能博物好將題詠繼臣工䥛古節切似刀而上彎似鐮而下直其背如指厚刃長尺許柄盈二握江淮之間恆用之方言云自關而西謂之鉤江南謂之鍥音結鍥䥛集韻通用又謂之彎刀以刈草禾或斫柴篠可代鐮斧一物兼用農家便之詩云弟鎌兄鏺不須猜呼䥛為名有自來賦物詩人還可取器兮不器擅兼材鏺蒲末切集韻云鏺兩刃刈也其刃長餘二尺闊可三寸橫插長木柄內牢以逆楔先結切農人兩手執之遇草萊或麥禾等稼折腰展臂匝地芟之柄頭仍用掠草杖以聚所芟之物使易收束太公農器篇云春鏺草棘又唐有鏺麥殿今人亦云芟曰鏺蓋體用互名皆此器也詩云摩地寧論草與禾雲隨風捲一劖過田頭曾聽農夫說功比􅧉鐮十倍多􅟮郎計切刀集韻與劙同闢荒刃也其制如短鎌而背則加厚嘗見開墾蘆葦蒿萊等荒地根株駢密雖强牛利器鮮不困敗故於耕犂之前先用一牛引曵小犂仍置刃裂地闢及一隴然後犂鑱隨過覆墢截然省力過半又有於本犂轅首裏邉就置此刃比之别用人畜尤省便也詩云萑葦根駢密若封耕犂借爾作前鋒欲知牛力寬多少萬垡翻雲看不供案看不供三字難解疑有誤斧釋名曰斧甫始也凡將制器始以斧伐木已乃制之也周書曰神農作陶冶斧破木為耒耜鋤耨以墾草莽然後五榖興其柄為柯然樵斧桑斧制頗不同樵斧狹而厚桑斧闊而薄蓋隨所宜而制也今農夫耕作之際修整佃具隨身尤不可闕者王荆公詩云百金聚一冶所賦以所遭此豈異鏌鎁奈何獨當樵朝出在人手暮歸在人腰用舍各有時此心兩無邀鋸解截木也古史考曰孟莊子作鋸說文曰鋸槍唐也莊子曰禮若亢鋸之柄亢舉也禮有所斷猶舉鋸之柄以斷物也又曰天下好智而百姓求竭矣於是乎釿音斤鋸制焉太公農器篇云钁鍤斧鋸此鋸為農器尚矣今接博桑果不可闕者詩云百鍊出煆工修薄見良鐡架木作梁橫錯刃成齒列直斜隨墨絃來去霏輕屑儻遇盤錯間利器乃能别䥷查轄切秦云切草也又作􅀈俗作䈟非也凡造䥷先煆鐡為背厚可指許內嵌䥷刃如半月而長下帶鐡袴以插木柄截木作砧長可三尺有餘廣可四五寸砧首置木簨髙可三五寸穿其中以受首案此條闕詩疑軼去礪磨刃石也書曰揚州厥貢礪砥砥細於礪皆磨石也廣志曰礪石出首陽山有紫白粉色出南昌者最善山海經曰髙梁之山多砥礪今隨處間去聲亦有之但上數處為佳耳尸子曰鐡使於越之工鑄之以為劍而勿加砥礪則以刺不入擊不斷磨之以礱加之以黃砥則刺也無前擊也無下自是觀之礪與弗礪其相去逺矣今農器鐮斧䥛鏺之類非礪不可大小之家所必用也蔡雍銘曰木以繩直金以淬剛必須砥礪就其鋒鋩農器圖譜六杷杷門農譜以杷杷命篇取世所通用內多收斂等具故叙於銍艾之後自田家築場納禾之間所用非一器今特列次雖有巨細之分然其趨功便事各有所效無得而間焉及乎歲事既終田夫野老不無樂戲乃以擊壤繼之杷蒲巴切鏤鏉器也方言云宋魏間謂之渠拿女余切或謂之渠疏直柄橫首柄長四尺首闊一尺五寸列鑿方竅以齒為節夫畦畛之間鎪剔塊壤疏去瓦礫場圃之上耬聚麥禾擁積秸穗此亦農之功也復有榖杷或謂透齒杷用攤曬榖又耘杷以木為柄以鐡為齒用耘稻禾竹杷場圃樵野間用之王褒僮約曰揉竹為杷大杷詩云直躬橫首制為杷入土初疑巨爪爬解與當途除瓦礫且將踈跡混塵沙操持有要從耰柄􅘜􅜒惟勤利齒牙去惡從來類忠讜惜哉獨用野夫家榖杷詩云曬槃留跡以杷名翻覆能令五榖平毋訝晴隂不恆德舍之藏則用之行竹杷詩云揉竹為杷指爪如强于穰藁易渠疏僕僮有約供薪㸑一務誰知用有餘耘杷詩云鐡作渠疏代爪耘幾將踈質效微勳纒綿蔓草知多少輒為良苗一解紛案圖有小杷而此條未詳言之蓋杷雖有大小之别而其用則一故條中不復縷分而詩亦祗以大杷槩之非闕文也杷博拔切無齒杷也所以平土壤聚榖實說文云無齒為杷禾譜字作戞訖黠切周生烈曰夫忠謇朝之杷杷正人國之掃篲秉杷執篲除凶掃穢國之福主之利也杷杷之為器也見於書傳至今不替其用為不負紀録矣杷詩云長柄為身首闊橫似杷無齒杷為名補填罅漏坤無缺推擁泥汙坎易盈每與渠疏供壠畝解收狼戾作囷京從今柄用多餘力未許人間有不平平板平摩種秧泥田器也用滑靣木板長廣相稱上置兩耳繫索連軛駕牛或人拖之摩田須平方可受種即得放水􅒓漬勻停秧出必齊田家或仰坐凳代之終非本器詩云小於食案大於砧畦靣勻拖恐不任材厚似難浮水動體寬原不墊泥深一行已見光如拭再過都無跡可尋世道迓衡方汝用一區毋為滯蹄涔田蕩他浪切均泥田器也用叉木作柄長六尺前貫橫木五尺許田方耕耙尚未勻熟須用此器平著其上蕩之使水土相和凹凸各平則易為秧蒔農書種植篇云凡水田渥漉精熟然後踏糞入泥蕩平田靣乃可撒種此亦蕩之用也夫田蕩與上篇耘蕩徒浪切之蕩字同音異所用亦各不類因辨及之耘蕩見錢鎛門詩云農事方殷春已歸緑雲滿握春秧齊秧馬既具田成畦尚缺有物平水泥橫木叉頭手自擕蕩磨泥靣如排擠人畜一過饒足蹄却行一抹前踪迷瑩滑如展黃玻瓈插蒔足使無高低處汙不染濯清溪歸來自潔從髙棲一遇詩人經品題附名農譜名始躋願言永用同鋤犁輥古本切軸輥碾草禾軸也其軸木徑可三四寸長約四五尺兩端俱作轉簨挽索用牛拽之夫江淮之間凡漫種稻田其草禾齊生並出則用此輥碾使草禾俱入泥內再宿之後禾乃復出草則不起又嘗見北方稻田不解插秧惟務撒種却於軸間交穿板木謂之雁翅狀如礰礋而小以􅀈打水土成泥就碾草禾如前江南地下易於得泥故用輥軸北方塗田頗少放水之後欲得成泥故用雁翅􅀈打此各隨地之所宜用也詩云稻田荒薉與苖同都入機衡輥碾中本擬助禾輕著力却慿偃草重於風一畨泥滓重加熟幾倍薅耘可並功思巧何人添雁翅聨翩更覺用尤工秧彈平聲秧壠以篾為彈彈猶弦也世呼船牽去聲曰彈字義俱同蓋江鄉匱田內平而廣農人秧蒔漫無凖則故制此長篾掣於田之兩際其直如弦循此布秧了無欹斜猶梓匠之繩墨也詩云塍埂寬長有匱田秧彈依約不容偏物情自是宜標凖苗壠回看直似弦杈初加切箝禾具也揉木為之通長五尺上作三股長可二尺上一股微短皆形如彎角以箝取禾􅀈也又有以木為幹以鐡為首二其股者利如戈㦸唯用叉取禾束謂之鐡禾杈集韻云權杷農器也詩云竪若戈㦸森用與戈㦸異彼能禦外侮此則供稼事願言等鋤耰非因為戰備今遇太平時叉也即農器笐下浪切架也集韻作􅀢竹竿也或省作笐今湖湘間收禾並用笐架懸之以竹木構如屋狀若麥若稻等稼穫而刊音繭之悉倒其穗控於其上久雨之際比於積垜不致鬱浥江南上雨下水用此甚宜北方或遇霖潦亦可倣此庶得種糧勝於全廢今特載之冀南北通用詩云江鄉臨老稻收天笐架棲禾豈棄捐多稼一川歸偉構祥雲萬疊表豐年有同巨廪成髙積要與饑民解倒懸稼畢莫辭零落去從來萬事等蹄筌喬扦音千挂禾具也凡稻皆下地沮濕或遇雨潦不無淹􅒓其收穫之際雖有禾􅀈不能卧置乃取細竹長短相等量水淺深每以三莖為數近上用篾縳之叉於田中上控禾把又有用長竹橫作連脊挂禾尤多凡禾多則用笐架禾少則用喬扦雖大小有差然其用相類故并次之詩云江鄉新霽稻初收縛竹為扦可寄留白水有時深鼎足黃雲隨意挂叉頭豐年有象居人喜滯穗無遺寡婦愁稼事畢時仍有用不妨場圃作量籌禾鉤斂禾具也用木鉤長可二尺嘗見壠畝及荒蕪之地農人將芟倒禾􅀈或草􅀈用此匝地約之成稇則易於就束比之手摙力展切甚速便也詩云物性縱橫本自由不經約束浩難收荒原草木知多少㑹見芟夷入此鉤搭爪上用鐡鉤帶袴中受木柄通長尺許狀似彎爪用如爪之搭物故曰搭爪以擐草禾之束或積或擲日以萬數速於手挈可謂智勝力也詩云非鉤非刃亦非鉗挈物風生利爪尖草束禾頭千萬計不煩手指一親拈禾擔都濫切負禾具也其長五尺五寸剡匾木為之者謂之軟擔斫圓木為之者謂之楤擔集韻云楤音聰尖頭擔也匾者宜負器與物圓者宜負薪與禾釋名曰擔任也力所勝任也凡山路﨑嶇或水陸相半舟車莫及之處如有所負非擔不可又田家收穫之後塍埂之上禾積星散必欲登之場圃荷此尤便詩云纍纍禾積大田秋都入農夫荷擔頭才使頳肩到場圃主家倉廪又催收連耞古牙切擊禾器國語曰權節其用耒耜耞殳耞拂也以擊草廣雅曰拂謂之架說文曰拂架也拂擊禾連架釋名曰架加也加杖於柄頭以撾陟爪切穗而出榖也其制用木條四莖以生革編之長可三尺闊可四寸又有以獨梃為之者皆於長木柄頭造為擐軸舉而轉之以撲禾也方言云僉宋魏之間謂之攝殳音殊自關而西謂之棓蒲項切齊楚江淮之間謂之柍音怏或謂之桲音勃今呼為連耞南方農家皆用之北方穫禾少者亦易取辦也耕織圖詩云霜時天氣佳風徑木葉脫持穗及此時連耞聲亂發黃雞啄遺粒烏鳥喜聒聒歸家抖塵埃夜屋燒榾柮刮板剗土具也用木板一葉濶二尺許長則倍之或煆鐡為舌板後釘直木二莖髙出板上槩以橫柄板之兩傍係二鐡鐶以鐶拽索兩手推按或人或畜挽行以剗壅腳土凡修閘埧起堤防填汙坎積邱垤均土壤治畦埂疊場圃聚子粒擁糠籺胡骨切除瓦礫郎擊切雖若泛用然農家之事居多也詩云廣舌橫短柄雙環繫長紖却行乍斂蹤前排如擁盾食尹切起堰作陂塘分田立畦畛章忍切人間不平地所到略能盡擊壤釋名曰擊壤野老之戲蓋擊塊壤之具因以為戲也藝苑曰擊壤古戲也又曰壤以木為之前廣後鋭長尺四寸濶三寸其形如履將戲先側一壤於地遙於三四十步以手中壤敲之中去聲者為上風土記曰擊壤以木為之其形如履臘節僮少以為戲分部如摘博也元晏先生皇甫謐號元晏先生曰十七年與姑從子果栁等擊壤於路此非直野老僮少之戲至於逸人隱士亦有時而為此戲也逸士傳曰堯時有壤父五十人擊壤於康衢觀者曰大哉堯之為君壤父作色曰吾日出而作日入而息鑿井而飲耕田而食帝何力於我哉此有以見其時平歲熟不知樂之所自信哉堯之德蕩蕩乎民無能名焉宜壤父有此答也吳盛彥擊壤賦云論衆戲之為樂獨擊壤之可娛因風托勢罪一殺兩藝文曰以磚二枚長七寸相去三十步立為標或以塊壤為標蓋田夫擊壤之意也各以磚一枚方圓一尺擲之主人擲籌隨多少甲先擲破則得一籌後破則奪先破者又今村陌中張梃為戲者皆其遺制歟詩云泰和民如何戲適因塊壤相從雜稚耋峙立越尋丈乘平初側一得雋終殺兩徒歌足歡愈至意自融盎帝力既不知大德日蕩蕩爾來幾千年古俗遂長往雖云遺制在淳風邈難想誰能陶真樂返古如指掌懷哉壤父歌三復有遺響農書卷十四
