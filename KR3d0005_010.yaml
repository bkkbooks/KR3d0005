body:
  text: 農書卷十元王禎撰百榖譜九竹木竹荀附種竹宜髙平之地近山阜尤是所宜下田得水即死黄白輭土為良正月二月中斸取西南引根并莖芟去葉於園内東北角種之令阬深二尺許覆土厚五寸竹性愛向西南引故於園東北角種之數嵗之後自當滿圉諺云東家種竹西家治地為滋蔓而來生也其居東北角者老竹種不生生亦不能滋荗故湏取其西南引少根也稲麥糠糞之二糠各自堪糞不令和雜不用水澆澆則淹死勿令六畜入園三月食淡竹筍四月五月食苦竹筍其欲作器者經年乃堪殺未經年者輭未成也移竹多用辰日又用臘月非此時移栽則不活惟五月十三日謂之竹醉日又謂之竹迷日栽竹則茂盛種竹宜去梢葉作稀泥於坑中下竹栽以土覆之杵築定勿令脚踏土厚五寸竹忌手把及洗手面脂水澆著即枯死月庵種竹法深闊掘溝以乾馬糞和細泥填髙一尺無馬糞礲糠亦得夏月稀冬月稠然後種竹湏三四莖作一叢亦湏土鬆淺種不可增土於株上泥若用钁打實則筍不生夢溪云種竹但林外取向陽者向北而栽盖根無不向南必用雨下遇火日及有西風則不可花木亦然諺云栽竹無時雨下便移多留宿土記取南枝志林云竹有雌雄雌者多筍故種竹常擇雌者物不逃於隂陽可不信哉凡欲識雌雄當自根上第一枝觀之有䨇枝者乃為雌竹獨枝者為雄竹若竹有花輙槁死花結實如稗謂之竹米一竿如此久之則舉林皆然其治之之法於初米時擇一竿稍大者截去近根三尺許通其節以糞實之則止鎻碎録云引竹法隔籬埋貍或猫於牆下眀年筍自迸出竹以三伏内及臘月中斫者不蛀一云用血忌日筍陸佃云字從勹從日包之日為筍解之日為竹又曰字從竹從旬旬内為筍旬外為竹也採筍之法視其叢中斜密者芟取之竹鞭方行處不宜採採則竹不繁採時可避露日出後掘深土取之半折取鞭根旋得投蜜器中以油單覆之勿令見風風吹則堅筍味甘羙有毒惟香油與薑能殺其毒煑宜久熟生則損人然食品之中最為珍貴故禮云加豆之實筍葅魚醢詩云其䔩伊何維筍及蒲盖貴之也松杉栢檜附事類全書云栽松春社前帶土栽培百株百活舍此時决無生理也斫松木湏五更初便削去皮則無白蟻血忌日尤好山人斫老松根取松眀燃之以代油燭亦貧家之利挿杉用驚蟄前後五日斬新枝斸阬入枝下泥杵緊相視天隂即挿遇雨十分生無雨即有分數種松栢法八九月中擇成熟松子栢子同去臺収頓至來春春分時甜水浸子十日治畦下水土糞漫撒子於畦内如種菜法或單排㸃種上覆土厚二指許畦上搭短棚蔽日旱則頻澆常令濕潤至秋後去棚長髙四五寸十月中夾薥稭籬以禦北風畦内亂撒麥糠覆樹令梢上厚二三寸止南方宜㣲盖至榖雨前後手爬去麥糠澆之次冬封盖亦如此二年之後三月中帶土移栽先撅區用糞土相合内區中水調成稀泥植栽於内擁土令區滿下水塌實毋用杵築脚踏次日有裂縫處以脚躡合常澆令濕至十月祛倒以土覆蔵毋使露樹至春去土次年不湏覆栽大樹者於三月中移廣留根土謂如一丈樹留土三尺地逺移者二尺五寸一丈五尺樹留土三尺或三尺五寸用草繩纒束根土樹大者從下剸去枝三二層樹記南北運至區處栽如前法檜種如松法挿枝二三月檜芽蘖動時先熟斸黄土地成畦下水飲畦一遍渗定再下水候成泥漿斫下細如小指檜枝長一尺五寸許下削成馬耳状先以杖刺泥成孔挿檜枝於孔中深五七寸以上栽宜稠密常澆令潤澤上搭矮棚蔽日至冬換作暖廕次年二三月去後候樹髙移栽如松栢法榆榆白枌也榆曰藲荎直之切詩所謂山有榆是也榆性扇地其隂下五榖不植隨其髙下廣狹東西北三方所扇各與樹等種者宜於園地北畔秋耕令熟至春榆荚落時収取漫散犂細畊勞之眀年正月初附地芟殺以草覆上放火燒之一根上必十數條俱生留一根强者餘悉搯去之一嵗之中長八九尺矣不燒則長遲也後年正月二月移栽之初生即移者喜曲故湏叢林長之三年乃移種初生三年不用採葉尤忌戕心戕心則科茹不長更湏依法燒之則依前茂矣不用剶沐剶者長而細又多瘢㾗不剶雖短麄而無病諺曰不剶不沐十年成轂言易麄也必欲剶者宜留二寸許於壍阬中種者以陳屋草布壍上散榆荚於草上以土覆之燒亦如法陳草速朽肥良勝糞無陳草者用糞糞之亦佳不糞雖生而痩既栽移者燒亦如法也又種榆法其於地畔種者致雀損榖既非叢林率多曲戾不如割地一方種之其白土薄地不宜五榖者唯宜榆地湏近市賣柴炭葉省功也白榆梜榆刺榆凡榆三種色别種之勿令和雜梜榆荚葉味苦凡榆荚味甘甘者春時将煑賣是以湏别也耕地収荚一如前法先耕地作壟然後散榆荚壟者看科理又易五寸一荚稀穊得中散訖勞之榆生共草俱長未湏科理眀年正月附地芟殺放火燒之亦任生長又至眀年正月斸去惡者其一株上有七八根生者悉皆斫去唯留一根麄直好者三年春可将荚葉賣之五年之後便堪作椽不梜者即可斫賣梜者鏇作盞十年之後魁椀瓶榼器皿無所不任十五年後中為車轂及蒲桃􅀢崔寔曰二月榆荚成及青収乾以為㫖蓄旨羙也蓄積也収青荚小蒸爆之至冬以釀酒滑香宜飬老詩云我有㫖蓄亦以御冬色變白将落可作􅛙䤅􅛙音牟䤅音頭即榆醤也能助肺殺諸蟲下氣隨節早晏勿失其適榆葉曝乾搗羅為末鹽水調匀日中炙曝天寒於火上熬過拌菜食之味頗辛羙榆皮去上皺澁乾枯者将中間嫩處剉乾磑為粉當歉嵗亦可代食昔豐沛嵗飢民以榆皮作屑煑食之人頼以濟焉栁說文曰栁小楊也從木夘聲種栁以正月二月中取弱栁枝大如臂長一尺半燒下頭二三寸埋之令没常足水以澆之必數條俱生留一根茂者餘悉搯之别竪一柱以為依主以繩欄之若不欄必為風所摧不能自立一年中即髙一丈餘其旁生枝葉即搯去令宜聳上髙下任人取足便搯去正心即四散下垂婀娜可愛如不搯心則枝不四散或邪或曲生亦不佳也六七月中取春生少枝種則長倍疾少枝葉青色壮故長疾也種綿桞下田停水不得五榖之處及山澗河旁至春凍釋於山陂河坎之旁刈取箕柳三寸截之漫散即勞勞訖引水停之至秋収刈任為箕箱之類山栁赤而脆河栁白而韌慿栁可以為楯車輞雜材及椀陶朱公曰種柳千樹則足柴又堪屋材十年以後髠一樹得一載每嵗髠二百樹五年一周其材用柴薪不可勝用柞棟附柞爾雅云栩杼也注云柞樹案俗人呼杼為橡子以橡殻為杼斗以剜剜似斗故也橡子儉嵗可食者為飯豐年放猪食之可以致肥也宜於山阜之曲三徧熟耕漫散橡子即再勞之生則薅治常令浄潔一定不移十年之中逆順各一到􅡡中寛狭正似葱壟從五月初盡七月末每天雨時即觸雨折取春生少枝長一尺已上者挿著壟中二尺一根數日即生少枝長疾三嵗成椽比如餘木雖㣲脆亦足堪事嵗種三十畝三年種九十畝嵗賣三十畝終嵗無窮楝音練說文曰苦楝木也鵷雛食其實以楝子於平田耕熟作壟種之其長甚疾五年後可作大椽北方人家欲構堂閣先於三五年前種之其堂閣欲成則棟木可椽榖楮說文云榖者楮也有二種一種皮有斑花文謂之斑榖今人用為冠者一種皮白無花枝葉相類或云斑者是楮白者是榖楮宜澗谷間種之地欲極良秋上候楮子熟時多収浄淘曝令燥耕地令熟二月耬耩之和麻子漫散之即勞秋冬仍留麻勿刈為楮作暖若不和麻子種率多凍死眀年正月初附地芟殺放火燒之一嵗即没人不燒者痩而長亦遲三年便中斫未滿三年者皮薄不任用斫法十二月為上四月次之非此兩月而斫者楮多枯死也每嵗正月常放火燒之自有乾葉在地足得火燃不燒則不滋茂也二月中間劚去惡根移栽者二月蒔之亦三年一斫三年不斫者徒失錢無益也指地賣者省功而利少煑剥賣皮者雖勞而利大其柴足以供燃自能造紙其利又多種三十畝者嵗斫十畝三年一遍嵗収絹百匹南方鄉人以榖皮作衾甚堅好鬻之實為貧家之利焉皂莢皂莢有二種生雍州川谷及魯鄒縣今處處有之如猪牙者良其角亦有長尺一二寸者種者二三月種不結角者南北二面去地一尺鑚孔用木釘釘之泥封竅即結或云樹不結鑿一大孔入生鐡三五斤以泥封之便開花結子既實以篾束其夲數匝木楔之一夕自落用以洗垢滌膩最良角與刺俱堪入藥亦物之利益於世者葦荻附葦爾雅云蒹葭蘆葦也荻一名菼說文曰蘆荻也葦四月苖髙尺許選好家葦連根栽成土墩如碗口大於下濕地内掘區栽之縱横相去一二尺欲疾得力則密栽至冬放火燒過次年春芽出便成好葦十月後刈之一法二月熟耕地作壟取根卧栽以土覆之次年成葦又壓栽法其葦長時掘地成渠将莖按倒以土壓之露其梢凡葉向上者亦植令出土下便生根上便成笋與壓桑無異五年之後根交當隔一尺許斸一钁即滋旺矣荻栽與葦同吕氏春秋云季秋之月命虞人材葦供國郭璞傳云不宜焚荻地理志云名山大川不封盖欲與民同利也以是觀之葦荻雖㣲物亦可以供國利民如此漆漆樹皮白葉似椿花如槐子今處處有之而梁蜀者為勝春分前後移栽後樹髙六七月以剛斧斫其皮開以竹管承之汁滴則成漆用漆在燥熱及霜冷時則難乾得隂濕雖寒月亦易乾物之性也若霑漬人以油治之凡騐惟稀者以物蘸起細而不斷斷而急収起及塗於乾竹上䕃之速乾者乃佳樊宏父甞欲作器物先種梓漆時人嗤之積以嵗月皆得其用向之笑者皆求假焉貲至鉅萬盖漆易成而利博故也百榖譜十雜類苧麻苧麻有二種一種紫麻一種白苧其根舊不載所出州土夲南方之物近河南亦多藝之不可以風土所宜例論也皮可以績布苖髙七八尺葉如楮葉面或青或紫背則皆白有短毛夏秋間著細穗青花其根黄白而輕虚又有一種山苧亦頗相似農桑輯要云栽種苧麻法三四月種子者初用沙薄地為上兩和地為次園圃内種之如無園者瀕河處亦得先倒斸地一二遍然後作畦闊半歩長四歩再斸一遍用濕潤畦土半升子粒一合相和匀撒子一合可種六七畦撒畢不用土覆土覆則不出於畦内用極細稍杖三四根撥刺令平可畦搭二三尺髙棚上用細箔遮盖五六月炎熱時箔上用苫加覆惟要隂密不致曬死稍乾用炊帚細灑水於棚上常令其下濕潤如遇天隂及早夜撤去覆箔苖出有草即㧞苖髙三指不湏用棚如地稍乾用㣲水輕澆約長三寸却擇比前稍壮地别作畦移栽臨移時隔宿先将有苖畦澆過眀早亦将做下空畦澆過将苧麻苖用刃器帶土撅出轉移在内相離四寸一栽務要頻鋤三五日一澆如此愛䕶二十日後十日半月一澆至十月後用驢馬生糞厚盖按陸機草木䟽云苧一科數十莖宿根在地中至春自生不湏栽種荆揚間嵗三刈每刈時湏根傍小芽出土髙五分其大麻即可割大麻既割小麻榮長即是下次再割麻也大麻不割不惟小芽不旺又失已成之麻大約五月初一鎌六月半一鎌八月一鎌鎌畢剥取其皮用竹刀或鐡刀從梢分批開用手剥下皮即以刀刮其白瓤其浮上皴皮自去其漚暴之法刮製之具亦甞具述見農器圖譜若值隂雨即於屋底風道内搭凉去聲恐經雨黒漬故也或又謂孕婦胎損方所湏又主白丹濃煑水浴之日四三瘥韋宙療癰疽發背初覺未成膿者以苧根葉熟𢷬敷上日夜數易之腫消則瘥矣夫苧初種若成宿根自在土培之糞壅之又加以鋤治之工有三刈之可収實一勞而永利按之夲草根葉亦足療人績為布衣寒暑俱可被體其利溥哉木綿木綿一名吉貝榖雨前後種之立秋時隨獲所収其花黄如葵其根獨而直其樹不貴乎髙長其枝榦貴乎繁衍不由宿根而出以子撒種而生所種之子初収者未實近霜者又不可用惟中間時月収者為上湏經日曬燥帶綿収貯臨種者再曬旋碾即下其種夲南海諸國所産後福建諸縣皆有近江東陕右亦多種滋茂繁盛與本土無異種之則深荷其利悠悠之論率以風土不宜為說按農桑輯要云雖托之風土種藝不謹者有之種藝雖謹不得其法者有之信哉言也夫種木綿擇兩和地不下濕肥地於正月地氣透時深耕三遍擺盖調熟然後作成畦畛每畦長八歩闊一歩内半歩作畦背上堆積土至榖雨前後揀好天氣日下種先一日将已成畦畛連澆三次用水淘過子粒堆於濕地上用少灰搓得伶俐看稀稠撒於澆過畦内将元起出覆土覆厚一指再勿澆待六七月苖長齊時早則澆溉鋤治常要潔浄稠則移栽稀則不湏每歩只留兩苖稠則不結實苖髙二尺之上打去衝天心傍條長尺半亦打去心葉葉不空開花結實直待綿欲落時旋熟旋摘隨即攤於箔上日曝夜露待子粒乾取下製造其器用見農器圖譜夫木綿為物種植不奪於農時滋培易為於人力接續開花而成實可謂不蠶而綿不麻而布又兼代氊毯之用以補衣褐之費可謂兼南北之利也檾檾邱頴切說文云枲屬從􅀈熒省聲􅀈匹刃切麻片也爾雅翼檾髙四五尺或六七尺葉似苧而薄實如大麻子或作䔛周禮典枲麻草注草葛䔛也集韻或作苘當從􅀈非從林也種與麻同法但科行頗稀其長也如竹葉大如扇上團如盖花黄結子蓬如橡斗然與黄麻同時熟刈作小束池内漚之爛去青皮取其麻片潔白如雪耐水不爛可織為毯被及作汲綆牛索或任牛衣雨衣草覆等具農家嵗嵗不可無者茶茶經云一曰茶二曰檟三曰蔎舒列切四曰茗五曰荈音舛早採曰茶次曰檟又其次曰蔎晚曰茗至荈則老葉矣盖以早為貴也爾雅云檟苦荼注云樹似梔子早採為茶晚曰茗蜀人名苦茶六經中無茶字盖荼即茶也詩云誰謂荼苦其甘如薺以其苦而甘味也閩浙蜀荆江湖淮南皆有之惟建溪北苑所産為勝四時類要云茶熟時収取子和濕土拌匀筐籠盛之穰草盖覆不即凍死不生至二月中出種之樹下或北隂之地開坎圓三尺深一尺熟斸著糞土每坑中種六七十顆畏日宜桑下竹隂地種子二年外方可芸治㣲以火糞薄壅之多則傷根峻坡為宜平地則兩畔深溝以洩水水浸即死種之三年即収其利此種藝之法茶之為物釋滯去垢破睡除煩功則著矣其或採造蔵貯之無法碾焙煎試之失宜則雖建芽浙茗袛為常品故採之宜早率以清眀榖雨前者為佳過此不及然茶之羙者質良而植茂新芽一發便長寸餘其細如針斯為上品如雀舌麥顆特次材耳採訖以甑㣲蒸生熟得所生則味澀熟則味減蒸已用筐箔薄攤乘濕略揉之入焙匀佈火烘令乾勿使焦編竹為焙裹篛覆之以収火氣茶性畏濕故宜篛収蔵者必以篛籠剪篛雜貯之則久而不浥宜置頓髙處令常近火為佳凡煎試湏用活水活火烹之故東坡云活水仍将活火烹者是也活水謂山泉水為上江水次之井水為下活火謂炭火之有焰者當使湯無妄沸始則蟹眼中則魚目纍然如珠終則泉湧皷浪此候湯之法非活火不能爾東坡云蟹眼已過魚眼生颼颼欲作松風聲盡之矣茶之用有三曰茗茶曰末茶曰蠟茶凡茗煎者擇嫩芽先以湯泡去熏氣以湯煎飲之今南方多效此然末子茶尤妙先焙芽令燥入磨細碾以供㸃試凡㸃湯多茶少則雲脚散湯少茶多則粥面聚鈔茶一錢七先注湯調極匀又添注入廽環擊拂視其色鮮白著盞無水㾗為度其茶既甘而滑南方雖産茶而識此法者甚少蠟茶最貴而製作亦不凡擇上等嫩芽細碾入羅雜腦子諸香膏油調齊如法印作餅子製様任巧候乾仍以香膏油潤飾之其製有大小龍團帶胯之異此品惟充貢獻民間罕見之始于宋丁晋公成於蔡端眀間有他造者色香味俱不及蠟茶珍蔵既久㸃時先用温水㣲漬去膏油以紙裹槌碎用茶鈐㣲炙旋入碾羅旋碾則色白經宿則色昏新者不用漬茶鈐屈金鐡為之砧用石椎用木茶之用芼核挑松實脂麻杏仁栗任用雖失正味亦供咀嚼然茶性冷多飲則能消陽山谷益以薑鹽煎飲其亦以是歟因併及之夫茶靈草也種之則利博飲之則神清上而王公貴人之所尚下而小夫賤𨽻之所不可闕誠民生日用之所資國家課利之一助也枸杞枸杞爾雅云枸杞檵注云枸杞也詩云集于苞杞䟽云一名地骨春夏採葉秋採莖實冬採根枸杞千嵗其形如犬朱孺子㓜事道士王元正居大若巖汲于溪見二花犬因逐之入于枸把叢下掘之根形如二犬食之忽覺身輕種枸杞法秋冬間収子浄洗日乾春耕熟地作畦闊五寸紐草稕如臂大置畦中以泥塗草稕上然後種子以細土及牛糞盖令徧苖出頻水澆之又可挿種葉作菜食子根入藥輕身益氣諺云去家千里勿食蘿摩枸杞言其補精氣也種紫草紫草爾雅謂之藐廣雅謂之茈䓞苖似蘭香節青種紫草宜黄白輭良之地青沙地亦善開荒黍穄下大佳性不耐水必湏髙田秋耕地至春又轉耕之三月種之耬耩地逐壠手下子良田一畝用子二升薄田用子三升下訖勞之鋤如榖法潔浄為佳其壠底草則㧞之壠底用鋤則傷紫草九月中子熟刈之候桴芳蒲反燥載聚打去取子濕載子則浥欝即深細耕不細不深則失草矣㝷壠以杷耬取整理収草宜併手力速竟為良遭雨則損草也一扼隨以茅結之擘葛彌善四扼為一頭當日則斬齊顛倒十重許為長行置堅平之地以板石鎮之令扁濕鎮直而長燥鎮則碎折不鎮賣難售也兩三宿竪頭著日中曝之令浥浥然不曬則欝黒太燥則碎折五十頭作一洪洪十字大頭向外以葛纒絡著厰屋下隂凉處棚棧上其棚下勿使驢馬糞及人溺又忌烟皆令草失色其利勝藍若欲久停者入五月内著屋中閉户塞向密泥勿使風入漏氣過立秋然後開出草色不異若經夏在棚棧上草便變黒不復任用種訖拖瓶擺之或以輕鈍碾過秋深子熟傍去其土連根取出就地鋪穧頗乾輕振其土以茅琹束切去虚稍以之染紫其色殊羙紅花紅花一名黄藍葉頗似藍故有藍名生於西域張騫所得今處處有之花地欲得良熟二月末三月初種也種法欲雨後速下或漫散種或耬下一如種麻法亦有鋤培而掩種者子科大而易料理花出日日乘凉摘取不摘則乾摘必湏盡留餘即合五月子熟㧞曝令乾打取之子亦不用欝浥五月種晚花春初即㽞子入五月便種若待新花熟後取子則又晚也七月中摘深色鮮眀耐久不黦紆物反色壊也勝春種者収子與麻子同價既任車脂亦堪為燭一頃花日湏百人摘以一家手力十不充一但駕車地頭每旦當有小兒僮女十百為羣自來分摘正湏平量中半分是以單夫隻婦亦得多種曬紅花法摘取即碓搗使熟以水淘布袋絞去黄汁更搗以粟飯漿清而醋者淘之又以布袋絞去汁即収取染紅勿棄也絞訖著瓮器中以布盖上鷄鳴更𢷬令均於席上攤而曝乾勝作餅花作餅者不得乾令花浥欝也以染真紅及作臙脂其利殊博也藍藍染草也爾雅云葴馬藍藍有數種有木藍有松藍可以為澱者有蓼藍但可染碧不堪作澱藍一夲而有數色刮竹青緑雲碧青藍黄豈非青出於藍而青於藍者乎種藍之法藍地欲良三徧細耕三月中浸子令芽生乃畦種之治畦下水一同葵法藍三葉澆之晨夜再澆薅治令浄五月中新雨後即接濕耬耩㧞栽之三莖作一科相去八寸栽時宜併力急手無令地燥也白背即急鋤栽時既濕白背不即鋤則堅確也五徧為良七月中作藍澱崔寔曰榆荚落時可種藍五月可刈藍六月可種冬藍冬藍木藍也藍非獨可染青絞其汁飲之能觧虫豸諸藥等毒不可闕也百榖譜十一飲食類案飲食類内尚有豳七月詩說食時五觀二篇今皆軼去止存偹荒論一篇偹荒論盖聞天灾流行國家代有堯有九年之水湯有七年之旱雖二聖人亦不能逃其適至之數也春秋二百四十二年書大有年僅二而水旱螽蟲屢書不絶然則年榖之豐盖亦罕見為民父母者當為思患豫防之計故古者三年耕必有一年之食九年耕必有三年之食以三十年之通制國用雖有旱乾水溢而民無菜色者蓄積多而偹先具也其蓄積之法北方髙亢多粟宜用竇窖可以久蔵南方墊濕多稲宜用倉廪亦可歴逺年倉廪竇窖詳見農器譜其偹旱荒之法則莫如區田區田者起自湯旱時伊尹所制斸地為區布種而灌溉之救水荒之法莫如櫃田櫃田者於下澤沮洳之地四圍築土形髙如櫃種蓻其中水多浸滛則用水車出之可種黄緑稲地形髙處亦可陸種諸物區田櫃田詳見農器譜此皆救水旱永逺之計也􅊀蟲荒之法惟捕之乃不為灾然蝗之所至凡草木葉靡有遺者獨不食芋桑與水中菱芡宜廣種此其餘則果食之脯米豆之麨棲於山者有葛粉取葛根肉為粉蕨萁取蕨根𢷬碎以水淘汰停粉為萁蒟篛橡栗之利瀕於水者有魚鱉蝦蟹蛤螺芹藻之饒皆可以濟飢救儉其或懐金立鵠易子炊骸荒饑之極則辟榖之法亦可用之辟榖方者出於晋惠帝時黄門侍郎劉景先遇太白山隐士所傳曽見石夲後人用之多騐今録于此昔晋惠帝時永寕二年黄門侍郎劉景先表奏臣遇太白山隐士傳濟飢辟榖僊方上進言臣家大小七十餘口更不食别物惟水一色若不如斯臣一家甘受刑戮今将真方鏤板廣傳見下大豆五斗浄淘洗蒸三遍去皮又用大麻子三斗浸一宿漉出蒸三遍令口開右件二味豆黄搗為末麻仁亦細𢷬漸下豆黄同搗令匀作團子如拳大入甑内蒸從初更進火蒸至夜半子時住火直至寅時出甑午時㬠乾搗為末乾服之以飽為度不得食一切物第一頓得七日不飢第二頓得四十九日不飢第三頓得三百日不飢第四頓得二千四百日不飢更不服永不飢也不問老少但依法服食令人强壮容貌紅白永不憔悴渇即研大麻子湯飲之轉更滋潤臓腑若要重喫物用葵子三合許為末煎冷服取下其藥如金色任喫諸物並無所損前知隨州朱崸教民用之有驗序其首尾勒石于漢陽軍大别山太平興國寺又傳冩方用黒豆五斗淘净蒸三遍㬠乾去皮細末秋麻子三斗温浸一宿去皮㬠乾為細末細糯米三斗做粥熟和搗前二味為劑右件三味合搗作團如拳大入甑中蒸一宿從一更發火蒸至寅時日出方才取出甑㬠至日午令乾再搗為末用小棗五斗煑去皮核同前三味為劑如拳頭大再入甑中蒸一夜服之以飽為度如渇者淘麻子水飲之便更滋潤臓腑無芝蔴汁白湯亦得少飲不得别食一切之物又許真君方武當山李道人傳累試有騐避難歇食方用白麫六兩黄蠟三兩白膠香五兩右件将麫冷水煉令熟如打麫一同然後為圓如黒豆大日㬠乾再将蠟溶成汁了将圓子投入内打令匀候冷單子裹安在浄處如服時每日早晨空心可服三五十丸冷水嚥下不得熱食如要喫物任意不妨又服蒼术方用蒼术一斤好白芝蔴香油半斤右件将术用白米泔浸一宿取出切成片子前香油炒令熟用瓶盛取每日空心服一撮用冷水湯嚥下大能壮氣駐顔色辟邪又能行履飢即服之詳此數方其間所用品味雖不出乎榖而民間亦難卒得若官中預蓄品味饑嵗荒年給賜飢民無資糧賑濟之勞而可延餓殍時月之命實益世之方安可秘而不流傳哉農書卷十
