body:
  text: 農書卷五元王禎撰農桑通訣五種植萹第十二司馬遷貨殖傳曰山居千章之楸安邑千樹棗燕秦千樹栗蜀漢江陵千樹橘齊魯千樹桑其人皆與千户侯等其言種植之利博矣觀桞子厚郭槖駞𫝊稱駞所種樹或移徙無不活且碩茂早實以蕃他人效之莫能如也又知種樹之不可無法也考之於詩帝省其山柞棫斯㧞松栢斯兌周之所以受命也樹之榛栗椅桐梓漆衛文公之所以興其國也夫以王侯之富且貴猶以種樹為功况於民乎周禮太宰以九職任萬民一曰三農生九糓二曰園圃之職次於三農其為民事之重尚矣然則種植之務其可緩乎種植之類夥矣民生濟用莫先於桑故首述而備論之桑種甚多不可徧舉世所名者荆與魯也荆桑多椹魯桑少椹葉薄而尖其邉有瓣者荆桑也凡枝幹條葉堅勁者皆荆之類也葉圓厚而多津者魯桑也凡枝幹條葉豐腴者皆魯之類也荆之類根固而心實能乆逺宜為樹魯之類根不固心不實不能乆逺宜為地桑然荆之條葉不如魯葉之盛茂當以魯桑條接之則能乆逺而又盛茂也魯為地桑而有壓條之法傳轉無窮是亦可以乆逺也荆桑所飼蠶其絲堅韌中去聲紗羅用禹貢稱厥篚檿絲注曰檿山桑此荆之産而尤佳者也魯桑之類宜飼小蠶齊民要術曰收椹之黒者剪去兩頭惟取中間一截盖兩頭者其子差細種則成鷄桑花桑中間一截其子堅栗則枝榦堅强而葉肥厚将種之時先以柴灰淹揉次日水淘去輕秕不實者曬令水脉才乾種乃易生按收椹一條乃節取陳旉農書非齊民要術也下慎勿採沐五十二字方是引齊民要術耳仍當畦種常薅令净慎勿採沐大如臂許正月中移之十歩一樹行欲少掎角不用正相當凡耕桑田不用近樹犂不着處斸土令起斫去浮根以蠶矢糞之剶桑十二月為上時正月次之二月為下大抵桑多者宜苦斫桑少宜省剶農桑要㫖云平原淤壤土地肥虛荆桑魯桑種之俱可若地連山陵土脉赤硬正宜荆桑士民必用云種藝之宜惟在審其時月又合地方之宜使之不失其中盖謂栽培之宜春分前後十日及十月並為上時春分前後以其發生也十月號陽月又曰小春木氣長生之月故宜栽培以養元氣此洛陽方左千里之所宜其他地方隨宜取中可也大抵春時及寒月必於天氣晴明巳午時藉其陽和如其栽子已出元土忽變天寒風雨即以熱湯調泥培之暑月則必待晚凉仍預於園中稀種麻麥為䕃惟十一月種栽不生活種桑之次則種材木果核按龔遂為渤海太守令民口種一樹榆秋冬課収歛益蓄果實菱芡民皆富實黄覇治潁川使民務耕桑種樹治為天下第一後漢樊重欲作器物先種梓漆時人嗤之然積以嵗月皆得其用向之笑者咸求假焉李衡於武陵龍陽洲上種柑橘千樹勅兒曰吾洲上有千頭木奴不責汝衣食嵗得絹一疋亦可足用矣橘成嵗得絹數千疋此栽植之明效也使今之時上之勸課皆如龔黄下之力本皆如樊李材木不可勝用果實不可勝食矣齊民要術言種榆者三年之後便可将荚葉賣之五年之後便堪作椽即可斫賣十年後魁椀瓶榼器皿無所不任十五年後可為車轂其嵗嵗科簡剶治之功指柴雇人賣柴之利己自不貲况諸般器物其利十倍斫後復生不勞更種所為一勞永逸務本直言云近聞諸般材木比之徃年價直重貴盖因不種不栽一年少於一年可為深惜古人云木奴千無凶年木奴者一切樹木皆是也自生自長不費衣食不憂水旱其果木材植等物可以自用有餘又可以易換諸物若能多廣栽種不惟無凶年之患抑亦有乆逺之利焉齊民要術云凡栽一切樹木欲記其隂陽不令轉易大樹髠之小樹則不髠先為深坑納樹訖以水沃之着土令如薄泥東西南北揺之良乆然後下土堅築埋之欲深勿令撓動栽訖皆不用手捉及六畜觝突凡栽樹正月為上時二月為中時三月為下時然棗鷄口槐兎目桑蝦蟆眼榆負瘤自餘雜木䑕耳䖟翅各以其時種樹既多不可一一備舉凡桑果以接博為妙一年後便可獲利昔八以之譬螟子者取其速肖之義也凡接枝條必擇其美宜用宿條向陽者氣壮而易茂嫩條向隂者氣弱而難成根株各從其類然荆桑亦可接魯桑梅可接杏桃可接李接工必有用具細齒截鋸一連厚脊利刄小刀一枚要當心手欵穏又必趂時以春分前後十日為宜或取其條襯青為期然必待時暄可接盖欲藉陽和之氣也一經接博二氣交通以惡為美以彼易此其利有不可勝言者夫接博其法有六一曰身接先用細鋸截去元樹枝莖作盤砧髙可及肩以利刄小刀際其盤之兩旁微啓小罅深可寸半先用竹㩥之測其深淺却以所接條約五寸長一頭削作小篦子先噙口中假津溢以助其氣却内之罅中皮肉相對挿之訖用樹皮封繫寛𦂳得所用牛糞和泥斟酌封裹之勿令透風外仍用留二眼以泄其氣二曰根接鋸截斷元樹身去地五寸許以所接條削篦挿之一如身接法就以土培封之以棘枝圍䕶之三曰皮接用小刃刀子於元樹身八字斜􅞑之以小竹㩥測其淺深以所接枝條皮肉相向挿之封䕶如前法俟接枝發茂以漸去其元樹枝莖使之莖茂耳四曰枝接如皮接之法而差近枝耳五曰靨於協切接小樹為宜先於元樹横枝上截了留一尺許於所取接條樹上眼外方半寸刀尖刻斷皮肉至骨併欵揭皮肉一方片須𢃄芽心揭下口噙少時取出印濕痕於横枝上以刀尖依痕刻斷元樹靨處大小如之以按接之上下兩頭以桑皮封繫𦂳慢得所仍用牛糞泥塗䕶之隨樹大小酌量多少接之六曰搭接将已種出芽條去地三寸許向上削作馬耳将所接條併削馬耳相搭接之封繫糞壅如前法今夫種植之功其利既溥又加之以接博猶變稂莠而為嘉禾易碔􅭏而為美玉世之欲業其生者其可不務之哉又有去蠧之法几桑果不無蟲蠧宜務去之其法用鐵線作鈎取之一法用硫黄及雄黄作烟薰之即死或用桐油紙燃塞之亦騐夫既已種植復接博之既接博矣復剔其蟲蠧桞子所謂吾問養樹得養人術此長民為國者所當視傚也夫民為國本本斯立矣既興其利而復除其害為治之道無以外是茍審行之不惟得勸民之法抑亦知政敎之本歟畜養篇第十四養馬類陶朱公曰子欲速富當畜五牸疾利切五牸之中惟馬為貴其飲食之節有六食有三芻飲有三時何謂也一曰惡芻二曰中芻三曰善芻何為三時一曰朝飲少之二曰晝飲則胷饜水三曰暮極飲之驢騾大槩類馬不復别起條端今農家以牛為本雖以馬為首略叙于此養牛類牛之為物切於農用善畜養者必有愛重之心有愛重之心必無慢易之意然何術能使民如此哉必也在上之人愛重嚴禁使民不敢輕視妄殺若夫農之於牛也視牛之饑渴猶己之饑渴視牛之困苦羸瘠猶己之困苦羸瘠視牛之疫癘若己之有疾視牛之字育若己之有子也若能如此則牛必蕃盛矣奚患田疇之荒蕪衣食之不繼哉今夫牛之為畜其氣血與人均也勿犯寒暑其性情與人均也勿使太勞固之以牢揵順之以凉燠時其饑飽以適其性情節其作息以養其血氣若然則皮毛潤澤肌體肥腯力有餘而老不衰其何困苦羸瘠之有於春之初必去牢欄中積滯蓐糞自此以後但旬日一除免穢氣蒸鬰為患且浸漬蹄甲易以生疾又當以時祓除不祥净爽乃善方舊草凋朽新草未生之時宜取㓗净藁草細剉之和以麥麩糓糠碎豆之屬使之微濕槽盛而飽飼之春秋草茂放牧飲水然後與草則腹不脹至冬月天氣積隂風雪嚴凛即宜處之煖燠之地煑糜粥以啖之又當預收豆楮之葉舂碎而貯積之以米泔和剉草糠麩以飼之古人有卧牛衣而待旦則知牛之寒盖有衣矣飯牛而牛肥則知牛之餒盖啖以菽粟矣衣以褐薦飯以菽粟古人豈重畜如此哉以此為衣食之本故耳此所謂時其饑飽以適性情者也每遇耕作之月除已牧放夜復飽飼至五更初乘日未出天氣凉而用之則力倍於常半日可勝一日之功日髙熱喘便令休息勿竭其力以致困乏此南方晝耕之法也若夫北方陸地平逺牛皆夜耕以避晝熱夜半仍飼以芻豆以助其力至明耕畢則放去此所謂節其作息以養其血氣也且古者分田之制必有萊牧之地稱田為等差故養牧得宜而無疾苦觀宣王考牧之詩可見矣其詩曰誰謂爾無牛九十其犉而純切爾牛來斯其耳濕濕或降于阿或飲于池或寝或訛以見字育蕃滋而寝食適宜也今夫藁秸不足以充其饑水漿不足以濟其渴凍之曝之困之瘠之役之勞之又從而鞭箠之則牛斃者過半矣饑欲得食渴欲得飲物之情也至於役使困乏氣喘汗流耕者急於就食或放之山或逐之水牛困得水動輙移時毛竅空踈困而乏食以致疾病生焉放之髙山筋力疲乏顛蹶而僵仆者往往相藉也利其力而傷其生烏識其為愛養之道哉牛之為病不一其用藥與人相似但大為劑以飲之無不愈者便溺有血傷於熱也以治便血之藥治之冷結則鼻乾而不喘以發散藥投之熱結即鼻汗而喘以解利藥投之其或天行疫癘率多薫蒸相染其氣然也愛之則當離避他所祓除沴音戾氣而救藥或可偷生傳曰養備動時則天不能使之病畜牛之家誠能節適養䕶如前所云則自無病然有病而治猶愈於不治若夫醫治之宜則亦有説周禮獸醫掌療獸病凡療獸病灌而行之以發其惡然後藥之其來尚矣今諸處自有獸工相病用藥不必預陳方藥恐多差誤也養羊類羊當留臘月正月生羊羔為種者第一十一月二月生者次之大率十口一羝羝無角者更佳擬供厨者宜剰之牧羊者必須老人其心性宛順起居以時調其宜適卜式云牧民何異於是惟逺水為良二日一飲緩緩驅行勿使停息春夏早放秋冬晩出圏渠院切不厭近必須與人居相連開䆫向圏架北牆為厰圏中作臺開竇勿令停水二日一除勿使糞穢圏内須貼牆竪柴栅令周匝羊一千口者三四月中種大豆一頃雜榖并草留之不須鋤治八九月中刈作青茭若不種豆穀者初草實成時收刈秋青雜草薄鋪使乾勿令鬱浥既至冬寒多饒風霜或春初雨落春草未生時則須飼不宜出放此牧羊之大要其羊每嵗得羔可居大羣多則販鬻及所剪毫毛作氊并得酥乳皆可供用博易其利甚多諺云養羊不覺富正謂此也養猪類母猪取短喙無柔毛者良牝者子母不同圈牡者同圈則無嫌圈不厭穢亦須小厰以避雨雪春夏草生隨時放牧糟糠之屬當日别與八九十月放而不飼所有糟糠則蓄待窮冬春初初產者宜煑穀飼之其子三日便搯尾六十日後犍供食豚乳下者佳簡取别飼之嘗謂江南水地多湖泊取萍藻及近水諸物可以飼之養猪凡占山皆用橡食或食藥苗謂之山猪其肉為上江北陸地可種馬齒約量多寡計其畝數種之易活耐旱割之比終一畝其初已茂用之䥷查鎋切切以泔糟等水浸於大檻中令酸黄或拌麩糠雜飼之特為省力易得肥腯前後分别嵗嵗可鬻足供家費養鷄類鷄種取桑落時生者良春夏生者則不佳春夏雛二十日内無令出窠飼以燥飯鷄栖宜據地為籠籠内著棧雖鳴聲不朗而安穏易肥又免狐狸之患若任之樹木一遇風寒大者損痩小者或死燃桞柴小者死大者盲園中築小屋下懸一簀令鷄宿上或於墻内作龕又以草縛窠令鷄伏抱其園傍可種蜀黍畝許以取蔽隂至秋收子又可飼鷄易以肥長其母春秋可得兩窠鷄雛若養二十餘鷄得雛與卵足供食用又可博換諸物養生之道亦其一也養鵝鴨類鵝鴨取一嵗再伏扶又切菢子也者為種大率鵝三䳄一雄鴨五雌一雄鵝初軰生子十餘鴨生數十後軰皆漸少矣欲於厰音敞屋之下作窠多着細草於窠中令煖先刻白木為卵形窠别着一枚以誑之生時㝷即收取别着一煖處以柔細草覆藉之伏時大鵝一十子大鴨二十子小者减之數起者不任為種其貪伏不起者須五六日一與食起之令洗浴鵝鴨皆一月雛出量雛欲出之時四五日内不用聞打鼔紡車大呌豬犬及舂聲又不用器淋灰又不用見新產婦雛既出作籠籠之先以粳米為粥糜一頓飽食之名曰填嗉然後以粟飯切苦菜蔓菁英為食以清水與之濁則有泥恐塞鼻孔小鵝泥塞鼻則死入水中不用停乆㝷宜驅出於籠中髙處敷細草令寝處其上十五日後乃出籠鵝惟食五榖稗子及草萊不食生蟲鴨靡不食矣水稗實成時尤是所便㗖此足得肥充供厨者子鵝百日以外子鴨六七十日佳過此肉硬大率鵝鴨六年以上老不復生伏矣宜去之少者恐不慣習宿者乃善伏也純取雌鴨無令雜雄足其粟豆常令肥飽一鴨可生百卵夫鵝鴨之利又倍於鷄居家養生之道不可闕也養魚類陶朱公養魚經曰夫治生之法有五水畜第一水畜所謂魚池也以六畝地為池池中作九洲求懐子鯉魚長三尺者二十頭牡鯉魚長三尺者四頭以二月上庚日内池中令水無聲魚必生至四月内一神守六月内二神守八月内三神守守者鼈也所以内鼈者魚滿三百六十則蛟龍為之長而将魚飛去内鼈則魚不復去在池中週遶九洲無窮自謂江湖也至來年二月得鯉魚長一尺者一萬五千枚三尺者四萬五千枚二尺者萬枚至明年得長一尺者十萬枚長二尺者五萬枚長三尺者五萬枚長四尺者四萬枚留長二尺者二千枚作種所餘皆貨候至明年不可勝計也池中有九洲八谷谷上立水二尺又谷中立水六尺所以養鯉者鯉不相食易長又貴也凡育魚之所須擇泥土肥沃蘋藻繁盛為上然必召居人築舍守之仍多方設法以防獺害凡所居近數畝之湖如依上法畜之可致速富此必然之效也今人但上江販魚種塘内畜之飼以青蔬嵗可及尺以供食用亦為便法養蜜蜂類人家多於山野古窯中收取盖小房或編荆囤兩頭泥封開一二小竅使通出入另開一小門泥封時時開却掃除常净不令他物所侵及於家院掃除蛛網及闗防山蜂土蜂不使相傷秋花彫盡留冬月可食蜜脾餘者割取作蜜蠟至春三月掃除如前常於蜂窠前置水一器不致渴損春月蜂盛一窠止留一王其餘摘之其有蜂王分窠羣蜂飛去用碎土撒而收之别置一窠其蜂即止春夏合蜜及蠟每窠可得大絹一疋有收養分息數百窠者不必他求而可富也農書卷五
